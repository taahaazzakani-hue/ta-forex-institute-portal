/* ── VIDEO DETECTION ─────────────────────────────────────────────────────── */
function detect(url) {
  if (!url) return null;
  const u = url.trim();
  // Handle any HTML that contains an iframe (e.g. Bunny wraps iframe in a <div>)
  if (u.startsWith("<") && u.includes("<iframe")) {
    const m = u.match(/src=["']([^"']+)["']/i);
    return m ? { type: "iframe", src: m[1], platform: "bunny" } : null;
  }
  if (u.startsWith("<iframe") || u.startsWith("<IFRAME")) {
    const m = u.match(/src=["']([^"']+)["']/i);
    return m ? { type: "iframe", src: m[1], platform: "bunny" } : null;
  }
  if (u.includes("mediadelivery.net") || u.includes("bunnycdn.com") || u.includes("b-cdn.net"))
    return { type: "iframe", src: u, platform: "bunny" };
  if (u.includes("drive.google.com")) {
    // Extract file ID and always build a clean /preview URL
    const m = u.match(/\/d\/([a-zA-Z0-9_-]+)/);
    const src = m ? "https://drive.google.com/file/d/" + m[1] + "/preview" : u;
    return { type: "iframe", src, platform: "drive" };
  }
  if (u.includes("youtube.com") || u.includes("youtu.be"))
    return { type: "ext", src: u, platform: "youtube", label: "YouTube" };
  if (u.includes("vimeo.com"))
    return { type: "ext", src: u, platform: "vimeo", label: "Vimeo" };
  if (u.includes("zoom.us") || u.includes("zoom.com"))
    return { type: "ext", src: u, platform: "zoom", label: "Zoom" };
  if (/\.(mp4|webm|mov|m4v)(\?.*)?$/i.test(u))
    return { type: "native", src: u, platform: "file" };
  return { type: "iframe", src: u, platform: "embed" };
}

const PC = { youtube: "#FF0000", vimeo: "#1AB7EA", zoom: "#2D8CFF", drive: C.gold };

function CastButton({ url, title }) {
  const [status, setStatus] = React.useState("idle");
  const [tip, setTip] = React.useState(false);
  const [castAvailable, setCastAvailable] = React.useState(false);

  React.useEffect(() => {
    // Check if Cast API is available (Chromecast)
    const checkCast = () => {
      if (window.chrome && window.chrome.cast) setCastAvailable(true);
    };
    window.__onGCastApiAvailable = (isAvailable) => { if (isAvailable) setCastAvailable(true); };
    const script = document.createElement("script");
    script.src = "https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1";
    script.onload = checkCast;
    document.head.appendChild(script);
    // Also check AirPlay
    const vid = document.createElement("video");
    if (vid.webkitShowPlaybackTargetPicker) setCastAvailable(true);
  }, []);

  const castToTV = async () => {
    const videoEls = Array.from(document.querySelectorAll("video"));
    // Try AirPlay (Safari/iOS)
    for (const v of videoEls) {
      if (v.webkitShowPlaybackTargetPicker) {
        v.webkitShowPlaybackTargetPicker();
        setStatus("casting");
        return;
      }
    }
    // Try Remote Playback API
    for (const v of videoEls) {
      if (v.remote && v.remote.state !== "disconnected") {
        try { await v.remote.prompt(); setStatus("casting"); return; } catch(e) {}
      }
    }
    // Try Picture-in-Picture
    for (const v of videoEls) {
      if (document.pictureInPictureEnabled && !v.disablePictureInPicture) {
        try { await v.requestPictureInPicture(); setStatus("pip"); v.addEventListener("leavepictureinpicture", () => setStatus("idle"), { once: true }); return; } catch(e) {}
      }
    }
    setTip(true);
    setTimeout(() => setTip(false), 6000);
  };

  return (
<div style={{ position: "relative", display: "inline-block" }}>
    <button onClick={castToTV} title="Cast to TV" style={{
      display: "inline-flex", alignItems: "center", gap: 7,
      background: (status !== "idle") ? C.goldDim : "rgba(255,255,255,.06)",
      color: (status !== "idle") ? C.gold : C.grey,
      border: "1px solid " + ((status !== "idle") ? C.gold + "50" : "rgba(255,255,255,.1)"),
      borderRadius: 8, padding: "8px 16px", fontSize: 12, fontWeight: 600,
      cursor: "pointer", transition: "all .2s", letterSpacing: ".03em"
    }}>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"/>
        <path d="M2 12a9 9 0 0 1 8 8"/>
        <path d="M2 16a5 5 0 0 1 4 4"/>
        <line x1="2" y1="20" x2="2.01" y2="20"/>
      </svg>
      {status === "pip" ? "▶ Pop Out" : status === "casting" ? "Casting..." : "🖥 Cast to TV"}
    </button>
    {tip && (
      <div style={{ position: "absolute", bottom: "calc(100% + 8px)", right: 0, background: C.card, border: "1px solid " + C.border, borderRadius: 10, padding: "12px 14px", width: 260, zIndex: 100, fontSize: 12, color: C.dim, lineHeight: 1.7 }}>
        <strong style={{ color: C.white, display: "block", marginBottom: 4 }}>How to cast to your TV:</strong>
        📱 <strong>iPhone/iPad:</strong> Tap the AirPlay icon in your browser<br/>
        🤖 <strong>Android:</strong> Tap ⋮ menu → Cast<br/>
        💻 <strong>Chrome:</strong> Click ⋮ → Cast…<br/>

}

function VideosTab({ courses, sections, videos, addVideo, deleteVideo, patchVideo }) {

  const [vC, setVC] = React.useState(""); const [vS, setVS] = React.useState(""); const [vErr, setVErr] = React.useState("");
  const [moveVid, setMoveVid] = React.useState(null); const [moveSec, setMoveSec] = React.useState("");
  const fSecs = sections.filter(s => s.courseId === vC);
  const detected = vU.trim() ? detect(vU) : null;
  const addVid = () => {
    if (!vT.trim() || !vU.trim() || !vC || !vS) { setVErr("All fields are required."); return; }
    addVideo({ id: uid(), courseId: vC, sectionId: vS, title: vT.trim(), url: vU.trim(), desc: vD.trim(), createdAt: Date.now() });
    setVT(""); setVU(""); setVD(""); setVErr("");
  };
  const delVid = id => deleteVideo(id);
  const doMove = (v) => {
    if (!moveSec) return;
    const sec = sections.find(s => s.id === moveSec);
    if (!sec) return;
    patchVideo(v.id, { sectionId: moveSec, courseId: sec.courseId });
    setMoveVid(null); setMoveSec("");
  };
  const moveUp = (v, sv) => {
    const idx = sv.findIndex(x => x.id === v.id);
    if (idx === 0) return;
    const other = sv[idx - 1];
    patchVideo(v.id, { createdAt: other.createdAt - 1 });
  };
  const moveDown = (v, sv) => {
    const idx = sv.findIndex(x => x.id === v.id);
    if (idx === sv.length - 1) return;
    const other = sv[idx + 1];
    patchVideo(v.id, { createdAt: other.createdAt + 1 });
  };

    <div>
      <Card style={{ padding: 24, marginBottom: 28 }}>

              style={{ height: 110, resize: "vertical", lineHeight: 1.65, background: C.navy, border: "1.5px solid " + C.border, borderRadius: 10, padding: "12px 14px", color: C.white, width: "100%", outline: "none", fontFamily: D, fontSize: 13 }} />
            {detected && (
              <div style={{ marginTop: 8, padding: "8px 12px", borderRadius: 8, fontSize: 12, border: "1px solid", ...(detected.type === "iframe" || detected.type === "native" ? { background: "#081A0E", borderColor: C.green + "40", color: C.green } : { background: "#0A1020", borderColor: C.gold + "40", color: C.gold }) }}>
                {(detected.type === "iframe" || detected.type === "native") ? "✓ Will play directly inside the portal" : "↗ Will open in " + detected.label}
              </div>
            )}
          </div>
          <div><label>Description (optional)</label><input value={vD} onChange={e => setVD(e.target.value)} placeholder="Brief summary of this lesson…" /></div>
          {vErr && <div style={{ color: C.red, fontSize: 12 }}>{vErr}</div>}
          <Btn onClick={addVid} style={{ justifySelf: "start" }}>Add Video</Btn>
        </div>
      </Card>

/* ── VIDEO COMMENTS / Q&A ───────────────────────────────────────────────── */
function VideoComments({ videoId, videoTitle, user, comments, addComment, deleteComment }) {
  const [text, setText] = React.useState("");
  const [timestamp, setTimestamp] = React.useState("");
  const [replyTo, setReplyTo] = React.useState(null);
  const [replyText, setReplyText] = React.useState("");
  const [activeTab, setActiveTab] = React.useState("all"); // all | timestamped
  const [saving, setSaving] = React.useState(false);

  const videoComments = comments.filter(c => c.videoId === videoId && !c.parentId)
    .sort((a, b) => a.createdAt - b.createdAt);

  const getReplies = (parentId) => comments.filter(c => c.videoId === videoId && c.parentId === parentId)
    .sort((a, b) => a.createdAt - b.createdAt);

  const submit = async () => {
    if (!text.trim()) return;
    setSaving(true);
    await addComment({ id: uid(), videoId, userId: user.id, userName: user.name, text: text.trim(), parentId: null, isAdmin: false, timestamp: timestamp.trim() || null, createdAt: Date.now() });
    setText(""); setTimestamp(""); setSaving(false);
  };

  const submitReply = async () => {
    if (!replyText.trim() || !replyTo) return;
    setSaving(true);
    await addComment({ id: uid(), videoId, userId: user.id, userName: user.name, text: replyText.trim(), parentId: replyTo.id, isAdmin: false, createdAt: Date.now() });
    setReplyText(""); setReplyTo(null); setSaving(false);
  };

  const timeAgo = (ts) => {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return "just now";
    if (s < 3600) return Math.floor(s/60) + "m ago";
    if (s < 86400) return Math.floor(s/3600) + "h ago";
    return Math.floor(s/86400) + "d ago";
  };

  const Avatar = ({ name, isAdmin, size = 36 }) => (
    <div style={{ width: size, height: size, borderRadius: "50%", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: size * .38,
      background: isAdmin ? `linear-gradient(135deg,${C.goldLt},${C.gold})` : `linear-gradient(135deg,#1a3a6e,#0D1B3E)`,
      color: isAdmin ? "#08090E" : C.white, border: isAdmin ? "none" : "1px solid " + C.border }}>
      {name.charAt(0).toUpperCase()}
    </div>
  );

  return (
    <div style={{ margin: "36px 20px 0", borderTop: "1px solid " + C.border, paddingTop: 28 }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 24 }}>
        <div style={{ fontSize: 18 }}>💬</div>
        <div>
          <h3 style={{ fontFamily: S, fontSize: 18, fontWeight: 700, color: C.white }}>Questions & Discussion</h3>
          <p style={{ fontSize: 12, color: C.grey, marginTop: 2 }}>{videoComments.length} question{videoComments.length !== 1 ? "s" : ""} · Ask anything about this lesson</p>
        </div>
      </div>

      {/* Post a question */}
      <div style={{ display: "flex", gap: 12, marginBottom: 28 }}>
        <Avatar name={user.name} isAdmin={false} />
        <div style={{ flex: 1 }}>
          <textarea value={text} onChange={e => setText(e.target.value)}
            placeholder={"Ask a question or share your thoughts about this lesson…"}
            style={{ width: "100%", background: C.navy, border: "1.5px solid " + C.border, borderRadius: 10, padding: "12px 14px", color: C.white, fontFamily: D, fontSize: 13, lineHeight: 1.6, resize: "vertical", minHeight: 72, outline: "none" }}
            onFocus={e => e.target.style.borderColor = C.gold}
            onBlur={e => e.target.style.borderColor = C.border}
          />
          <div style={{ display: "flex", gap: 8, marginTop: 6, alignItems: "center" }}>
            <input value={timestamp} onChange={e => setTimestamp(e.target.value)} placeholder="Timestamp (e.g. 2:45)" style={{ width: 120, padding: "7px 10px", borderRadius: 8, fontSize: 12, flexShrink: 0 }} />
            <span style={{ fontSize: 11, color: C.faint }}>optional</span>
          </div>
          {text.trim() && (
            <div style={{ display: "flex", gap: 8, marginTop: 8, justifyContent: "flex-end" }}>
              <button onClick={() => setText("")} style={{ background: "transparent", color: C.grey, border: "1px solid " + C.border, borderRadius: 8, padding: "7px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Cancel</button>
              <Btn onClick={submit} disabled={saving} sz="sm">{saving ? "Posting..." : "Post Question"}</Btn>
            </div>
          )}
        </div>
      </div>

      {/* Tab selector */}
      <div style={{ display: "flex", gap: 4, marginBottom: 20, background: C.bg, borderRadius: 9, padding: 3 }}>
        {[["all", "All Comments"], ["timestamped", "⏱ Timestamped"]].map(([k, l]) => (
          <button key={k} onClick={() => setActiveTab(k)} style={{ flex: 1, padding: "7px 0", borderRadius: 7, fontSize: 12, fontWeight: 700, background: activeTab === k ? C.goldDim : "transparent", color: activeTab === k ? C.gold : C.grey, border: "none", cursor: "pointer" }}>{l}</button>
        ))}
      </div>

      {/* Comments list */}
      {videoComments.filter(c => activeTab === "timestamped" ? c.timestamp : true).length === 0 && (
        <div style={{ textAlign: "center", padding: "32px 0", color: C.faint, fontSize: 13 }}>
          No questions yet. Be the first to ask!
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
        {videoComments.filter(c => activeTab === "timestamped" ? c.timestamp : true).map(c => {
          const replies = getReplies(c.id);
          const isOwn = c.userId === user.id;
          return (
            <div key={c.id}>
              {/* Main comment */}
              <div style={{ display: "flex", gap: 12 }}>
                <Avatar name={c.userName} isAdmin={c.isAdmin} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5, flexWrap: "wrap" }}>
                    <span style={{ fontWeight: 700, fontSize: 14, color: c.isAdmin ? C.gold : C.white }}>{c.userName}</span>
                    {c.isAdmin && <span style={{ fontSize: 10, background: C.goldDim, color: C.gold, border: "1px solid " + C.gold + "40", padding: "2px 8px", borderRadius: 20, fontWeight: 700, letterSpacing: ".06em" }}>COACH</span>}
                    <span style={{ fontSize: 11, color: C.faint }}>{timeAgo(c.createdAt)}</span>
                    {c.timestamp && <span style={{ fontSize: 11, background: C.goldDim, color: C.gold, border: "1px solid " + C.gold + "40", padding: "1px 8px", borderRadius: 20, fontWeight: 700, cursor: "pointer" }}>⏱ {c.timestamp}</span>}
                  </div>
                  <p style={{ fontSize: 14, color: C.dim, lineHeight: 1.75, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{c.text}</p>
                  <div style={{ display: "flex", gap: 12, marginTop: 8 }}>
                    <button onClick={() => { setReplyTo(c); setReplyText(""); }}
                      style={{ background: "transparent", color: C.grey, border: "none", fontSize: 12, fontWeight: 600, cursor: "pointer", padding: 0, letterSpacing: ".03em" }}>
                      ↩ Reply
                    </button>
                    {isOwn && <button onClick={() => deleteComment(c.id)}
                      style={{ background: "transparent", color: C.faint, border: "none", fontSize: 12, cursor: "pointer", padding: 0 }}>Delete</button>}
                  </div>

                  {/* Reply box */}
                  {replyTo?.id === c.id && (
                    <div style={{ marginTop: 12, display: "flex", gap: 10 }}>
                      <Avatar name={user.name} isAdmin={false} size={28} />
                      <div style={{ flex: 1 }}>
                        <textarea value={replyText} onChange={e => setReplyText(e.target.value)}
                          placeholder={"Reply to " + c.userName + "…"}
                          autoFocus
                          style={{ width: "100%", background: C.navy, border: "1.5px solid " + C.gold, borderRadius: 9, padding: "10px 12px", color: C.white, fontFamily: D, fontSize: 13, lineHeight: 1.5, resize: "vertical", minHeight: 56, outline: "none" }}
                        />
                        <div style={{ display: "flex", gap: 8, marginTop: 6, justifyContent: "flex-end" }}>
                          <button onClick={() => { setReplyTo(null); setReplyText(""); }} style={{ background: "transparent", color: C.grey, border: "1px solid " + C.border, borderRadius: 8, padding: "6px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Cancel</button>
                          <Btn onClick={submitReply} disabled={saving || !replyText.trim()} sz="sm">{saving ? "..." : "Reply"}</Btn>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Replies */}
                  {replies.length > 0 && (
                    <div style={{ marginTop: 14, paddingLeft: 16, borderLeft: "2px solid " + C.border, display: "flex", flexDirection: "column", gap: 14 }}>
                      {replies.map(r => (
                        <div key={r.id} style={{ display: "flex", gap: 10 }}>
                          <Avatar name={r.userName} isAdmin={r.isAdmin} size={28} />
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                              <span style={{ fontWeight: 700, fontSize: 13, color: r.isAdmin ? C.gold : C.white }}>{r.userName}</span>
                              {r.isAdmin && <span style={{ fontSize: 10, background: C.goldDim, color: C.gold, border: "1px solid " + C.gold + "40", padding: "2px 8px", borderRadius: 20, fontWeight: 700 }}>COACH</span>}
                              <span style={{ fontSize: 11, color: C.faint }}>{timeAgo(r.createdAt)}</span>
                            </div>
                            <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.7, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{r.text}</p>
                            {(r.userId === user.id) && (
                              <button onClick={() => deleteComment(r.id)} style={{ background: "transparent", color: C.faint, border: "none", fontSize: 11, cursor: "pointer", padding: 0, marginTop: 4 }}>Delete</button>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── STUDENT JOURNAL ─────────────────────────────────────────────────────── */
function StudentJournal({ user, journals, addJournal, deleteJournal }) {
  const [title, setTitle] = React.useState("");
  const [pair, setPair] = React.useState("");
  const [direction, setDirection] = React.useState("Long");
  const [risk, setRisk] = React.useState("");
  const [gain, setGain] = React.useState("");
  const [result, setResult] = React.useState("Win");
  const [pnl, setPnl] = React.useState("");
  const [analysis, setAnalysis] = React.useState("");
  const [lesson, setLesson] = React.useState("");
  const [image, setImage] = React.useState(null);
  const [view, setView] = React.useState("list"); // list | new | detail | edit
  const [selected, setSelected] = React.useState(null);
  const [err, setErr] = React.useState("");
  const [editing, setEditing] = React.useState(null); // journal being edited

  const myJournals = journals.filter(j => j.userId === user.id).sort((a,b) => b.createdAt - a.createdAt);

  const submit = async () => {
    if (!title.trim() || !pair.trim() || !analysis.trim()) { setErr("Title, pair and analysis are required."); return; }
    setErr("Saving...");
    const entry_obj = { id: uid(), userId: user.id, userName: user.name, title: title.trim(), pair: pair.trim(), direction, risk: risk.trim(), gain: gain.trim(), result, pnl: pnl.trim(), analysis: analysis.trim(), lesson: lesson.trim(), image: image || null, createdAt: Date.now(), adminComment: null, adminCommentAt: null, adminSeen: false };
    try {
      await addJournal(entry_obj);
      setTitle(""); setPair(""); setDirection("Long"); setRisk(""); setGain(""); setResult("Win"); setPnl(""); setAnalysis(""); setLesson(""); setImage(null); setErr(""); setView("list");
    } catch(e) {
      setErr("Failed to save. Please try again.");
    }
  };

  const deleteEntry = id => deleteJournal(id);

  const openEdit = (j) => {
    setEditing(j);
    setTitle(j.title); setPair(j.pair); setDirection(j.direction);
    setRisk(j.risk||""); setGain(j.gain||""); setResult(j.result);
    setPnl(j.pnl||""); setAnalysis(j.analysis); setLesson(j.lesson||"");
    setImage(j.image||null); setErr(""); setView("edit");
  };

  const saveEdit = async () => {
    if (!title.trim() || !pair.trim() || !analysis.trim()) { setErr("Title, pair and analysis are required."); return; }
    setErr("Saving...");
    const updated = { ...editing, title: title.trim(), pair: pair.trim(), direction, risk: risk.trim(), gain: gain.trim(), result, pnl: pnl.trim(), analysis: analysis.trim(), lesson: lesson.trim(), image: image||null };
    try {
      // Delete old and re-insert with updated data
      await deleteJournal(editing.id);
      await addJournal(updated);
      setEditing(null); setTitle(""); setPair(""); setDirection("Long"); setRisk(""); setGain(""); setResult("Win"); setPnl(""); setAnalysis(""); setLesson(""); setImage(null); setErr(""); setSelected(updated.id); setView("detail");
    } catch(e) { setErr("Failed to save. Please try again."); }
  };

  const resultColor = r => r === "Win" ? C.green : r === "Loss" ? C.red : C.gold;

  if (view === "new") return (
    <div style={{ maxWidth: 700, margin: "0 auto", padding: "28px 16px 80px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 28 }}>
        <button onClick={() => setView("list")} style={{ background: "transparent", color: C.gold, fontSize: 13, fontWeight: 700, cursor: "pointer", border: "none" }}>← Back</button>
        <h2 style={{ fontFamily: S, fontSize: 24, fontWeight: 700 }}>New Trade Journal</h2>
      </div>
      <div style={{ display: "grid", gap: 16 }}>
        <div><label>Trade Title</label><input value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. XAUUSD Long — NYC Open" /></div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div><label>Currency Pair</label><input value={pair} onChange={e => setPair(e.target.value)} placeholder="XAUUSD, EURUSD…" /></div>
          <div><label>Direction</label>
            <select value={direction} onChange={e => setDirection(e.target.value)}>
              <option>Long</option><option>Short</option>

          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>

          <div><label>Potential Gain (Pips)</label><input value={gain} onChange={e => setGain(e.target.value)} placeholder="e.g. 60" /></div>
          <div><label>P&L</label><input value={pnl} onChange={e => setPnl(e.target.value)} placeholder="+$120" /></div>
        </div>
        <div><label>Result</label>

<div style={{ display: "flex", gap: 8 }}>

          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(130px,1fr))", gap: 10, marginBottom: 22 }}>
            {[["Pair", j.pair], ["Direction", j.direction], ["Risk (Pips)", j.risk||"—"], ["Gain (Pips)", j.gain||"—"], ["P&L", j.pnl||"—"]].map(([k,v]) => (

            {image ? (

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>

function AdminJournalTab({ users, journals, patchJournal, loadAll }) {
  const [selected, setSelected] = React.useState(null);
  const [comment, setComment] = React.useState("");
  const [filterUser, setFilterUser] = React.useState("all");

  const approvedUsers = users.filter(u => u.status === "approved");
  const filtered = (filterUser === "all" ? journals : journals.filter(j => j.userId === filterUser))
    .sort((a,b) => b.createdAt - a.createdAt);

  const j = selected ? journals.find(x => x.id === selected) : null;
  const userName = j ? (users.find(u => u.id === j.userId)?.name || "Unknown") : "";

  const submitComment = () => {
    if (!comment.trim()) return;
    patchJournal(selected, { adminComment: comment.trim(), adminCommentAt: Date.now(), adminSeen: true });
    setComment(""); setSelected(null);
  };

  const markSeen = id => patchJournal(id, { adminSeen: true });

  const resultColor = r => r === "Win" ? C.green : r === "Loss" ? C.red : C.gold;

  if (j) return (
    <div>
      <button onClick={() => { setSelected(null); setComment(""); }} style={{ background: "transparent", color: C.gold, fontSize: 13, fontWeight: 700, cursor: "pointer", border: "none", marginBottom: 20, display: "block" }}>← Back to All Journals</button>
      <div style={{ background: C.card, border: "1.5px solid " + C.border, borderRadius: 16, padding: "24px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 10, marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 11, color: C.white, fontWeight: 700, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 4 }}>Entry by {userName}</div>
            <h3 style={{ fontFamily: S, fontSize: 20, fontWeight: 700 }}>{j.title}</h3>
            <div style={{ fontSize: 12, color: C.grey, marginTop: 2 }}>{new Date(j.createdAt).toLocaleDateString("en-ZA", { year:"numeric", month:"long", day:"numeric" })}</div>
          </div>
          <span style={{ background: resultColor(j.result) + "20", color: resultColor(j.result), border: "1px solid " + resultColor(j.result) + "40", padding: "5px 14px", borderRadius: 20, fontSize: 13, fontWeight: 700 }}>{j.result}</span>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(120px,1fr))", gap: 8, marginBottom: 18 }}>
          {[["Pair", j.pair], ["Direction", j.direction], ["Risk (Pips)", j.risk||"—"], ["Gain (Pips)", j.gain||"—"], ["P&L", j.pnl||"—"]].map(([k,v]) => (
            <div key={k} style={{ background: C.bg, border: "1px solid " + C.border, borderRadius: 9, padding: "10px 12px" }}>
              <div style={{ fontSize: 10, color: C.grey, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 3 }}>{k}</div>
              <div style={{ fontSize: 14, fontWeight: 700 }}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase", marginBottom: 6 }}>Analysis</div>
          <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.8, whiteSpace: "pre-wrap" }}>{j.analysis}</p>
        </div>
        {j.image && (
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase", marginBottom: 6 }}>Chart Screenshot</div>
            <img src={j.image} alt="chart" style={{ width: "100%", borderRadius: 10, border: "1px solid " + C.border, display: "block" }} />
          </div>
        )}
        {j.lesson && <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase", marginBottom: 6 }}>Lesson Learned</div>
          <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.7 }}>{j.lesson}</p>
        </div>}
        {j.adminComment && (
          <div style={{ background: "rgba(201,168,76,.06)", border: "1px solid rgba(201,168,76,.2)", borderRadius: 10, padding: "14px 16px", marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.gold, marginBottom: 6 }}>Your Previous Comment:</div>
            <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.7 }}>{j.adminComment}</p>
          </div>
        )}
        <div style={{ marginTop: 20 }}>
          <label>{j.adminComment ? "Update Your Comment" : "Add Coach Comment (only visible to this student)"}</label>
          <textarea value={comment || j.adminComment || ""} onChange={e => setComment(e.target.value)}
            placeholder="Write your feedback, advice or encouragement for this trade…"
            style={{ height: 100, resize: "vertical", background: C.navy, border: "1.5px solid " + C.border, borderRadius: 10, padding: "12px 14px", color: C.white, width: "100%", outline: "none", fontFamily: D, fontSize: 13, lineHeight: 1.6, marginBottom: 12 }} />
          <Btn onClick={submitComment} sz="md">Send Comment to {userName}</Btn>
        </div>
      </div>
    </div>
  );

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12, marginBottom: 20 }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase" }}>All Student Journals ({filtered.length})</div>
        <select value={filterUser} onChange={e => setFilterUser(e.target.value)} style={{ width: "auto", padding: "8px 12px", fontSize: 12 }}>
          <option value="all">All Students</option>
          {approvedUsers.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
        </select>
      </div>
      {filtered.length === 0 && <p style={{ color: C.grey, textAlign: "center", padding: "40px 0" }}>No journal entries yet.</p>}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {filtered.map(j => {
          const uname = users.find(u => u.id === j.userId)?.name || "Unknown";
          return (
            <div key={j.id} style={{ background: C.card, border: "1.5px solid " + (!j.adminSeen ? C.gold + "50" : C.border), borderRadius: 12, padding: "14px 16px", cursor: "pointer" }}
              onClick={() => { setSelected(j.id); markSeen(j.id); setComment(j.adminComment || ""); }}
              onMouseEnter={e => e.currentTarget.style.borderColor = C.gold}
              onMouseLeave={e => e.currentTarget.style.borderColor = !j.adminSeen ? C.gold + "50" : C.border}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                    {!j.adminSeen && <span style={{ width: 7, height: 7, borderRadius: "50%", background: C.gold, display: "inline-block", flexShrink: 0 }} />}
                    <span style={{ fontSize: 11, fontWeight: 700, color: C.gold, letterSpacing: ".08em" }}>{uname}</span>
                  </div>
                  <div style={{ fontFamily: S, fontSize: 15, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{j.title}</div>
                  <div style={{ fontSize: 11, color: C.grey, marginTop: 2 }}>{j.pair} · {j.direction} · {new Date(j.createdAt).toLocaleDateString()}</div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4, flexShrink: 0 }}>
                  <span style={{ background: (j.result==="Win"?C.green:j.result==="Loss"?C.red:C.gold) + "20", color: (j.result==="Win"?C.green:j.result==="Loss"?C.red:C.gold), border: "1px solid " + (j.result==="Win"?C.green:j.result==="Loss"?C.red:C.gold) + "40", padding: "2px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>{j.result}</span>
                  {j.adminComment && <span style={{ fontSize: 10, color: C.grey }}>✓ Commented</span>}
                  {!j.adminComment && <span style={{ fontSize: 10, color: C.gold, fontWeight: 700 }}>Needs review</span>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}


/* ── MEMBERSHIP TAB ──────────────────────────────────────────────────────── */
const LEVELS = ["Advanced", "Private Mentorship", "Beginner", "Free"];
const LEVEL_COLORS = {
  "Advanced":           { bg: "rgba(41,98,255,.15)",  border: "rgba(41,98,255,.4)",  text: "#6B9FFF" },
  "Private Mentorship": { bg: "rgba(201,168,76,.15)", border: "rgba(201,168,76,.4)", text: "#E6C86A" },
  "Beginner":           { bg: "rgba(180,80,255,.15)", border: "rgba(180,80,255,.4)", text: "#C96BFF" },
  "Free":               { bg: "rgba(76,184,128,.15)", border: "rgba(76,184,128,.4)", text: "#4CB880" },
};

function MembershipTab({ users, patchUser, courses, patchCourse }) {
  const approved = users.filter(u => u.status === "approved");

  const toggleLevel = (userId, level) => {
    const u = users.find(x => x.id === userId);
    if (!u) return;
    const levels = u.levels || [];
    const newLevels = levels.includes(level) ? levels.filter(l => l !== level) : [...levels, level];
    patchUser(userId, { levels: newLevels });
  };

  const setCourseLevel = (courseId, level) => {
    patchCourse(courseId, { level: level || null });
  };

  return (
    <div style={{ display: "grid", gap: 24 }}>
      {/* Course level assignment */}
      <Card style={{ padding: 24 }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase", marginBottom: 6 }}>Course Access Levels</div>
        <p style={{ fontSize: 13, color: C.grey, marginBottom: 20, lineHeight: 1.6 }}>Assign a membership level to each course. Only students with that level can see and access it.</p>
        {courses.length === 0 && <p style={{ color: C.faint, fontSize: 13 }}>No courses yet.</p>}
        {courses.map(c => (
          <div key={c.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px", borderRadius: 10, background: C.bg, border: "1px solid " + C.border, marginBottom: 8, flexWrap: "wrap", gap: 12 }}>
            <div>
              <div style={{ fontFamily: S, fontSize: 16, fontWeight: 700, color: C.white }}>{c.title}</div>
              <div style={{ fontSize: 12, color: C.grey, marginTop: 2 }}>
                {c.level
                  ? <span style={{ background: LEVEL_COLORS[c.level]?.bg, color: LEVEL_COLORS[c.level]?.text, border: "1px solid " + LEVEL_COLORS[c.level]?.border, padding: "2px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>{c.level}</span>
                  : <span style={{ color: C.faint, fontSize: 11 }}>No level — visible to all approved members</span>}
              </div>
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {LEVELS.map(l => (
                <button key={l} onClick={() => setCourseLevel(c.id, c.level === l ? null : l)} style={{
                  padding: "6px 12px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                  background: c.level === l ? LEVEL_COLORS[l]?.bg : "transparent",
                  color: c.level === l ? LEVEL_COLORS[l]?.text : C.faint,
                  border: "1px solid " + (c.level === l ? LEVEL_COLORS[l]?.border : C.border),
                }}>{l}</button>
              ))}
              {c.level && <button onClick={() => setCourseLevel(c.id, null)} style={{ padding: "6px 10px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", background: "transparent", color: C.red, border: "1px solid " + C.red + "40" }}>✕ Remove</button>}
            </div>
          </div>
        ))}
      </Card>

      {/* Student level assignment */}
      <Card style={{ padding: 24 }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase", marginBottom: 6 }}>Student Memberships</div>
        <p style={{ fontSize: 13, color: C.grey, marginBottom: 20, lineHeight: 1.6 }}>Toggle which membership levels each student has. A student can hold multiple levels.</p>
        {approved.length === 0 && <p style={{ color: C.faint, fontSize: 13 }}>No approved students yet.</p>}
        {approved.map(u => (
          <div key={u.id} style={{ padding: "16px", borderRadius: 12, background: C.bg, border: "1px solid " + C.border, marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10, marginBottom: 12 }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15, color: C.white }}>{u.name}</div>
                <div style={{ fontSize: 12, color: C.grey }}>{u.email}</div>
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {(u.levels || []).length === 0
                  ? <span style={{ fontSize: 11, color: C.faint }}>No levels assigned</span>
                  : (u.levels || []).map(l => (
                    <span key={l} style={{ background: LEVEL_COLORS[l]?.bg, color: LEVEL_COLORS[l]?.text, border: "1px solid " + LEVEL_COLORS[l]?.border, padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>{l}</span>
                  ))
                }
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {LEVELS.map(l => {
                const has = (u.levels || []).includes(l);
                return (
                  <button key={l} onClick={() => toggleLevel(u.id, l)} style={{
                    padding: "8px 16px", borderRadius: 9, fontSize: 12, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                    background: has ? LEVEL_COLORS[l]?.bg : C.card,
                    color: has ? LEVEL_COLORS[l]?.text : C.grey,
                    border: "1px solid " + (has ? LEVEL_COLORS[l]?.border : C.border),
                  }}>
                    {has ? "✓ " : "+ "}{l}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </Card>
    </div>
  );
}

/* ── ROOT ────────────────────────────────────────────────────────────────── */
function App() {
  const [users,    setUsers]    = React.useState([]);
  const [courses,  setCourses]  = React.useState([]);
  const [sections, setSections] = React.useState([]);
  const [videos,   setVideos]   = React.useState([]);
  const [journals, setJournals] = React.useState([]);
  const [comments, setComments] = React.useState([]);
  const [screen,   setScreen]   = React.useState("login");
  const [me,       setMe]       = React.useState(null);
  const [loading,  setLoading]  = React.useState(true);

  // ── Supabase helpers ──
  const SB_URL = "https://qpjnzhmuwklvqmevlxjm.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwam56aG11d2tsdnFtZXZseGptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjQ1ODUsImV4cCI6MjA4OTg0MDU4NX0.OlFw50GiD4vNzrLZ2-dFXVdAD8OxG1-g0xP_erR_n98";
  const sb = async (path, opts={}) => {
    const r = await fetch(SB_URL + "/rest/v1/" + path, {
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json", "Prefer": opts.prefer || "return=representation", ...opts.headers },
      method: opts.method || "GET",
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    if (!r.ok) { const e = await r.text(); console.error("SB error:", e); return null; }
    const text = await r.text();
    return text ? JSON.parse(text) : [];
  };

  // ── Load all data ──
  const loadAll = async (showSpinner = false) => {
    if (showSpinner) setLoading(true);
    try {
      const [u, c, sec, v, j, com] = await Promise.all([
        sb("users?order=created_at.asc"),
        sb("courses?order=created_at.asc"),
        sb("sections?select=*"),
        sb("videos?order=created_at.asc"),
        sb("journals?order=created_at.desc"),
        sb("comments?order=created_at.asc"),
      ]);
      if (u) setUsers(u.map(x => ({ id:x.id, name:x.name, email:x.email, password:x.password, status:x.status, levels:x.levels||[], createdAt:x.created_at })));
      if (c) setCourses(c.map(x => ({ id:x.id, title:x.title, desc:x.description, level:x.level, createdAt:x.created_at })));
      if (sec) setSections(sec.map(x => ({ id:x.id, courseId:x.course_id, title:x.title })));
      if (v) setVideos(v.map(x => ({ id:x.id, courseId:x.course_id, sectionId:x.section_id, title:x.title, url:x.url, desc:x.description, createdAt:x.created_at })));
      if (j) setJournals(j.map(x => ({ id:x.id, userId:x.user_id, userName:x.user_name, title:x.title, pair:x.pair, direction:x.direction, risk:x.risk, gain:x.gain, result:x.result, pnl:x.pnl, analysis:x.analysis, lesson:x.lesson, image:x.image, adminComment:x.admin_comment, adminCommentAt:x.admin_comment_at, adminSeen:x.admin_seen, createdAt:x.created_at })));
      if (com) setComments(com.map(x => ({ id:x.id, videoId:x.video_id, userId:x.user_id, userName:x.user_name, text:x.text, parentId:x.parent_id||null, isAdmin:x.is_admin||false, timestamp:x.timestamp||null, createdAt:x.created_at })));
    } catch(e) { console.error("loadAll error:", e); }
    if (showSpinner) setLoading(false);
  };
  React.useEffect(() => { loadAll(true); }, []);

  // ── Setters that also persist to Supabase ──
  const saveUsers = async (newUsers) => {
    setUsers(newUsers);
    // Upsert all - find changed user
    for (const u of newUsers) {
      await sb("users?id=eq." + u.id, { method: "PATCH", prefer: "return=minimal", body: { name:u.name, email:u.email, password:u.password, status:u.status, levels:u.levels||[] } });
    }
  };
  const addUser = async (u) => {
    await sb("users", { method: "POST", prefer: "return=minimal", body: { id:u.id, name:u.name, email:u.email, password:u.password, status:u.status, levels:[], created_at:u.createdAt } });
    setUsers(prev => [...prev, u]);
  };
  const patchUser = async (id, patch) => {
    await sb("users?id=eq." + id, { method: "PATCH", prefer: "return=minimal", body: patch });
    setUsers(prev => prev.map(u => u.id === id ? { ...u, ...patch } : u));
  };
  const deleteUserDB = async (id) => {
    await sb("users?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setUsers(prev => prev.filter(u => u.id !== id));
  };
  const saveCourses = async (newCourses) => { setCourses(newCourses); };
  const addCourseDB = async (c) => {
    await sb("courses", { method: "POST", prefer: "return=minimal", body: { id:c.id, title:c.title, description:c.desc||"", level:c.level||null, created_at:c.createdAt } });
    setCourses(prev => [...prev, c]);
  };
  const patchCourse = async (id, patch) => {
    const dbPatch = {};
    if (patch.level !== undefined) dbPatch.level = patch.level;
    if (patch.title !== undefined) dbPatch.title = patch.title;
    if (patch.desc !== undefined) dbPatch.description = patch.desc;
    await sb("courses?id=eq." + id, { method: "PATCH", prefer: "return=minimal", body: dbPatch });
    setCourses(prev => prev.map(c => c.id === id ? { ...c, ...patch } : c));
  };
  const deleteCourseDB = async (id) => {
    await sb("videos?course_id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    await sb("sections?course_id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    await sb("courses?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setCourses(prev => prev.filter(c => c.id !== id));
    setSections(prev => prev.filter(s => s.courseId !== id));
    setVideos(prev => prev.filter(v => v.courseId !== id));
  };
  const addSectionDB = async (s) => {
    await sb("sections", { method: "POST", prefer: "return=minimal", body: { id:s.id, course_id:s.courseId, title:s.title } });
    setSections(prev => [...prev, s]);
  };
  const patchSectionDB = async (id, patch) => {
    const dbPatch = {};
    if (patch.title) dbPatch.title = patch.title;
    await sb("sections?id=eq." + id, { method: "PATCH", prefer: "return=minimal", body: dbPatch });
    setSections(prev => prev.map(s => s.id === id ? { ...s, ...patch } : s));
  };
  const deleteSectionDB = async (id) => {
    await sb("videos?section_id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    await sb("sections?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setSections(prev => prev.filter(s => s.id !== id));
    setVideos(prev => prev.filter(v => v.sectionId !== id));
  };
  const patchVideo = async (id, patch) => {
    const dbPatch = {};
    if (patch.sectionId !== undefined) dbPatch.section_id = patch.sectionId;
    if (patch.courseId !== undefined) dbPatch.course_id = patch.courseId;
    if (patch.createdAt !== undefined) dbPatch.created_at = patch.createdAt;
    await sb("videos?id=eq." + id, { method: "PATCH", prefer: "return=minimal", body: dbPatch });
    setVideos(prev => prev.map(v => v.id === id ? { ...v, ...patch } : v));
  };
  const addVideoDB = async (v) => {
    await sb("videos", { method: "POST", prefer: "return=minimal", body: { id:v.id, course_id:v.courseId, section_id:v.sectionId, title:v.title, url:v.url, description:v.desc||"", created_at:v.createdAt } });
    setVideos(prev => [...prev, v]);
  };
  const deleteVideoDB = async (id) => {
    await sb("videos?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setVideos(prev => prev.filter(v => v.id !== id));
  };
  const addCommentDB = async (c) => {
    await sb("comments", { method: "POST", prefer: "return=minimal", body: { id:c.id, video_id:c.videoId, user_id:c.userId, user_name:c.userName, text:c.text, parent_id:c.parentId||null, is_admin:c.isAdmin||false, timestamp:c.timestamp||null, created_at:c.createdAt } });
    setComments(prev => [...prev, c]);
  };
  const deleteCommentDB = async (id) => {
    await sb("comments?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    // Also delete replies
    await sb("comments?parent_id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setComments(prev => prev.filter(c => c.id !== id && c.parentId !== id));
  };

  const addJournalDB = async (j) => {
    await sb("journals", { method: "POST", prefer: "return=minimal", body: { id:j.id, user_id:j.userId, user_name:j.userName, title:j.title, pair:j.pair, direction:j.direction, risk:j.risk, gain:j.gain, result:j.result, pnl:j.pnl, analysis:j.analysis, lesson:j.lesson, image:j.image, admin_comment:null, admin_comment_at:null, admin_seen:false, created_at:j.createdAt } });
    setJournals(prev => [j, ...prev]);
  };
  const deleteJournalDB = async (id) => {
    await sb("journals?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setJournals(prev => prev.filter(j => j.id !== id));
  };
  const patchJournal = async (id, patch) => {
    const dbPatch = {};
    if (patch.adminComment !== undefined) dbPatch.admin_comment = patch.adminComment;
    if (patch.adminCommentAt !== undefined) dbPatch.admin_comment_at = patch.adminCommentAt;
    if (patch.adminSeen !== undefined) dbPatch.admin_seen = patch.adminSeen;
    await sb("journals?id=eq." + id, { method: "PATCH", prefer: "return=minimal", body: dbPatch });
    setJournals(prev => prev.map(j => j.id === id ? { ...j, ...patch } : j));
  };

  const login = async (email, pass, setMsg) => {
    const u = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === pass);
    if (!u) { setMsg("Incorrect email or password."); return; }
    setMe(u);
    setScreen(u.status === "approved" ? "portal" : u.status === "declined" ? "declined" : "pending");
  };

  const register = async (name, email, pass, setMsg) => {
    if (!name || !email || !pass) { setMsg("All fields are required."); return; }
    if (users.find(u => u.email.toLowerCase() === email.toLowerCase())) { setMsg("An account with this email already exists."); return; }
    const u = { id: uid(), name, email, password: pass, status: "pending", levels: [], createdAt: Date.now() };
    await addUser(u); setMe(u); setScreen("pending");
  };

  const logout = () => { setMe(null); setScreen("login"); };

  useEffect(() => {
    if (me && screen === "pending") {
      const u = users.find(u => u.id === me.id);
      if (u?.status === "approved") setScreen("portal");
      if (u?.status === "declined") setScreen("declined");
    }
  }, [users]);

  if (loading) return (
    <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
      <style>{GS}</style>
      <Logo w={140} />
      <div style={{ width:40, height:40, border:"3px solid " + C.border, borderTop:"3px solid " + C.gold, borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
      <p style={{ color:C.grey, fontSize:13, letterSpacing:".1em" }}>Loading portal...</p>
    </div>
  );

  return (
    <>
      <style>{GS}</style>
      {screen === "login"     && <LoginScreen onLogin={login} onRegister={register} onAdmin={() => setScreen("adminAuth")} />}
      {screen === "adminAuth" && <AdminAuthScreen onBack={() => setScreen("login")} onEnter={() => setScreen("admin")} />}
      {screen === "admin"     && <AdminPanel users={users} patchUser={patchUser} deleteUser={deleteUserDB} courses={courses} addCourse={addCourseDB} patchCourse={patchCourse} deleteCourse={deleteCourseDB} sections={sections} addSection={addSectionDB} patchSection={patchSectionDB} deleteSection={deleteSectionDB} videos={videos} addVideo={addVideoDB} deleteVideo={deleteVideoDB} journals={journals} patchJournal={patchJournal} onLogout={logout} loadAll={loadAll} />}
      {screen === "portal"    && me && <Portal user={me} courses={courses} sections={sections} videos={videos} journals={journals} addJournal={addJournalDB} deleteJournal={deleteJournalDB} comments={comments} addComment={addCommentDB} deleteComment={deleteCommentDB} onLogout={logout} />}
      {screen === "pending"   && me && <StatusScreen icon="⏳" title="Pending Approval" color={C.gold} onLogout={logout} msg={`Hi ${me.name}, your registration is under review. You'll be granted access once the admin approves your account.`} />}
      {screen === "declined"  && <StatusScreen icon="✕" title="Access Declined" color={C.red} onLogout={logout} msg="Your access request has been declined. Please contact the administrator for assistance." />}
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
