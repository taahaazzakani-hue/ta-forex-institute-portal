/* ── VIDEO DETECTION ─────────────────────────────────────────────────────── */
function detect(url) {
  if (!url) return null;
  const u = url.trim();
  // Handle any HTML that contains an iframe (e.g. Bunny wraps iframe in a <div>)
  if (u.startsWith("<") && u.includes("<iframe")) {
    const m = u.match(/src=["']([^"']+)["']/i);
    return m ? { type: "iframe", src: m[1], platform: "bunny" } : null;
  }
  if (u.startsWith("<iframe") || u.startsWith("<IFRAME")) {
    const m = u.match(/src=["']([^"']+)["']/i);
    return m ? { type: "iframe", src: m[1], platform: "bunny" } : null;
  }
  if (u.includes("mediadelivery.net") || u.includes("bunnycdn.com") || u.includes("b-cdn.net"))
    return { type: "iframe", src: u, platform: "bunny" };
  if (u.includes("drive.google.com")) {
    // Extract file ID and always build a clean /preview URL
    const m = u.match(/\/d\/([a-zA-Z0-9_-]+)/);
    const src = m ? "https://drive.google.com/file/d/" + m[1] + "/preview" : u;
    return { type: "iframe", src, platform: "drive" };
  }
  if (u.includes("youtube.com") || u.includes("youtu.be"))
    return { type: "ext", src: u, platform: "youtube", label: "YouTube" };
  if (u.includes("vimeo.com"))
    return { type: "ext", src: u, platform: "vimeo", label: "Vimeo" };
  if (u.includes("zoom.us") || u.includes("zoom.com"))
    return { type: "ext", src: u, platform: "zoom", label: "Zoom" };
  if (/\.(mp4|webm|mov|m4v)(\?.*)?$/i.test(u))
    return { type: "native", src: u, platform: "file" };
  return { type: "iframe", src: u, platform: "embed" };
}

const PC = { youtube: "#FF0000", vimeo: "#1AB7EA", zoom: "#2D8CFF", drive: C.gold };

function CastButton({ url, title }) {
  const [status, setStatus] = React.useState("idle");
  const [tip, setTip] = React.useState(false);
  const [castAvailable, setCastAvailable] = React.useState(false);

  React.useEffect(() => {
    // Check if Cast API is available (Chromecast)
    const checkCast = () => {
      if (window.chrome && window.chrome.cast) setCastAvailable(true);
    };
    window.__onGCastApiAvailable = (isAvailable) => { if (isAvailable) setCastAvailable(true); };
    const script = document.createElement("script");
    script.src = "https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1";
    script.onload = checkCast;
    document.head.appendChild(script);
    // Also check AirPlay
    const vid = document.createElement("video");
    if (vid.webkitShowPlaybackTargetPicker) setCastAvailable(true);
  }, []);

  const castToTV = async () => {
    const videoEls = Array.from(document.querySelectorAll("video"));
    // Try AirPlay (Safari/iOS)
    for (const v of videoEls) {
      if (v.webkitShowPlaybackTargetPicker) {
        v.webkitShowPlaybackTargetPicker();
        setStatus("casting");
        return;
      }
    }
    // Try Remote Playback API
    for (const v of videoEls) {
      if (v.remote && v.remote.state !== "disconnected") {
        try { await v.remote.prompt(); setStatus("casting"); return; } catch(e) {}
      }
    }
    // Try Picture-in-Picture
    for (const v of videoEls) {
      if (document.pictureInPictureEnabled && !v.disablePictureInPicture) {
        try { await v.requestPictureInPicture(); setStatus("pip"); v.addEventListener("leavepictureinpicture", () => setStatus("idle"), { once: true }); return; } catch(e) {}
      }
    }
    setTip(true);
    setTimeout(() => setTip(false), 6000);
  };

  return (
<div style={{ position: "relative", display: "inline-block" }}>
    <button onClick={castToTV} title="Cast to TV" style={{
      display: "inline-flex", alignItems: "center", gap: 7,
      background: (status !== "idle") ? C.goldDim : "rgba(255,255,255,.06)",
      color: (status !== "idle") ? C.gold : C.grey,
      border: "1px solid " + ((status !== "idle") ? C.gold + "50" : "rgba(255,255,255,.1)"),
      borderRadius: 8, padding: "8px 16px", fontSize: 12, fontWeight: 600,
      cursor: "pointer", transition: "all .2s", letterSpacing: ".03em"
    }}>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"/>
        <path d="M2 12a9 9 0 0 1 8 8"/>
        <path d="M2 16a5 5 0 0 1 4 4"/>
        <line x1="2" y1="20" x2="2.01" y2="20"/>
      </svg>
      {status === "pip" ? "▶ Pop Out" : status === "casting" ? "Casting..." : "🖥 Cast to TV"}
    </button>
    {tip && (
      <div style={{ position: "absolute", bottom: "calc(100% + 8px)", right: 0, background: C.card, border: "1px solid " + C.border, borderRadius: 10, padding: "12px 14px", width: 260, zIndex: 100, fontSize: 12, color: C.dim, lineHeight: 1.7 }}>
        <strong style={{ color: C.white, display: "block", marginBottom: 4 }}>How to cast to your TV:</strong>
        📱 <strong>iPhone/iPad:</strong> Tap the AirPlay icon in your browser<br/>
        🤖 <strong>Android:</strong> Tap ⋮ menu → Cast<br/>
        💻 <strong>Chrome:</strong> Click ⋮ → Cast…<br/>
        📺 <strong>Samsung TV:</strong> Use Smart View / Screen Mirror
        <div style={{ position: "absolute", bottom: -6, right: 20, width: 10, height: 10, background: C.card, border: "1px solid " + C.border, transform: "rotate(45deg)", borderTop: "none", borderLeft: "none" }} />
      </div>
    )}
  </div>
  );
}

function CoursesTab({ courses, addCourse, deleteCourse, patchCourse, sections, addSection, deleteSection, patchSection, videos }) {
  const [cT, setCT] = React.useState(""); const [cD, setCD] = React.useState("");
  const [sT, setST] = React.useState(""); const [sC, setSC] = React.useState("");
  const [editCourse, setEditCourse] = React.useState(null); const [editCourseTitle, setEditCourseTitle] = React.useState("");
  const [editSection, setEditSection] = React.useState(null); const [editSectionTitle, setEditSectionTitle] = React.useState("");
  const [dragSec, setDragSec] = React.useState(null);
  const [dragOverSec, setDragOverSec] = React.useState(null);

  const doAddCourse = () => { if (!cT.trim()) return; addCourse({ id: uid(), title: cT.trim(), desc: cD.trim(), createdAt: Date.now() }); setCT(""); setCD(""); };
  const doAddSec = () => { if (!sT.trim() || !sC) return; addSection({ id: uid(), courseId: sC, title: sT.trim() }); setST(""); };
  const saveCourseEdit = () => { if (editCourse && editCourseTitle.trim()) { patchCourse(editCourse, { title: editCourseTitle.trim() }); setEditCourse(null); } };
  const saveSectionEdit = () => { if (editSection && editSectionTitle.trim()) { patchSection(editSection, { title: editSectionTitle.trim() }); setEditSection(null); } };

  const handleSecDrop = (courseId, droppedOnId) => {
    if (!dragSec || dragSec === droppedOnId) return;
    const cs = sections.filter(s => s.courseId === courseId)
      .map((s, i) => ({ ...s, _idx: i }))
      .sort((a,b) => {
        const ao = a.sortOrder != null ? a.sortOrder : a._idx * 10000;
        const bo = b.sortOrder != null ? b.sortOrder : b._idx * 10000;
        return ao - bo;
      });
    const from = cs.findIndex(s => s.id === dragSec);
    const to = cs.findIndex(s => s.id === droppedOnId);
    if (from === -1 || to === -1) return;
    const reordered = [...cs];
    const [moved] = reordered.splice(from, 1);
    reordered.splice(to, 0, moved);
    reordered.forEach((s, i) => patchSection(s.id, { sort_order: i + 1 }));
    setDragSec(null); setDragOverSec(null);
  };

  return (
    <div style={{ display: "grid", gap: 20 }}>
      <Card style={{ padding: 24 }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.gold, textTransform: "uppercase", marginBottom: 16 }}>+ New Course</div>
        <div style={{ display: "grid", gap: 14 }}>

          <div><label>Short Description</label><input value={cD} onChange={e => setCD(e.target.value)} placeholder="What students will learn…" /></div>
          <Btn onClick={doAddCourse} style={{ justifySelf: "start" }}>Create Course</Btn>
        </div>
      </Card>
      <Card style={{ padding: 24 }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.gold, textTransform: "uppercase", marginBottom: 16 }}>+ Add Section / Phase</div>
        <div style={{ display: "grid", gap: 14 }}>
          <div><label>Course</label><select value={sC} onChange={e => setSC(e.target.value)}><option value="">Select course…</option>{courses.map(c => <option key={c.id} value={c.id}>{c.title}</option>)}</select></div>
          <div><label>Section Title</label><input value={sT} onChange={e => setST(e.target.value)} placeholder="e.g. Phase One – Core Concepts" /></div>
          <Btn onClick={doAddSec} disabled={!sC || !sT.trim()} style={{ justifySelf: "start" }}>Add Section</Btn>
        </div>
      </Card>
      {courses.map(c => {
        const cs = sections.filter(s => s.courseId === c.id).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
        return (
          <Card key={c.id} style={{ padding: 24 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: cs.length ? 16 : 0 }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                {editCourse === c.id
                  ? <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <input value={editCourseTitle} onChange={e => setEditCourseTitle(e.target.value)} style={{ flex: 1, padding: "8px 12px", borderRadius: 8 }} onKeyDown={e => e.key === "Enter" && saveCourseEdit()} autoFocus />
                      <Btn onClick={saveCourseEdit} sz="sm">Save</Btn>
                      <Btn v="outline" onClick={() => setEditCourse(null)} sz="sm">Cancel</Btn>
                    </div>
                  : <div style={{ fontFamily: S, fontSize: 20, fontWeight: 700 }}>{c.title}</div>
                }
                {c.desc && <div style={{ fontSize: 12, color: C.grey, marginTop: 3 }}>{c.desc}</div>}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <Btn v="outline" onClick={() => { setEditCourse(c.id); setEditCourseTitle(c.title); }} sz="sm">Edit</Btn>
                <Btn v="danger" onClick={() => deleteCourse(c.id)} sz="sm">Delete</Btn>
              </div>
            </div>
            {cs.length === 0 && <p style={{ color: C.faint, fontSize: 12, marginTop: 8 }}>No sections yet.</p>}
            {cs.length > 0 && <div style={{ fontSize: 11, color: C.faint, marginBottom: 8, letterSpacing: ".05em" }}>DRAG TO REORDER SECTIONS</div>}
            {cs.map(s => (
              <div key={s.id}

                onDragStart={() => setDragSec(s.id)}
                onDragOver={e => { e.preventDefault(); setDragOverSec(s.id); }}
                onDragLeave={() => setDragOverSec(null)}
                onDrop={() => handleSecDrop(c.id, s.id)}
                onDragEnd={() => { setDragSec(null); setDragOverSec(null); }}
                style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", borderRadius: 9,
                  background: dragOverSec === s.id ? C.goldDim : C.bg, marginBottom: 6,
                  border: "1px solid " + (dragOverSec === s.id ? C.gold : dragSec === s.id ? C.border + "80" : C.border),
                  opacity: dragSec === s.id ? 0.5 : 1, cursor: "grab", transition: "background .15s, border-color .15s", gap: 8 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, minWidth: 0 }}>
                  <span style={{ color: C.faint, fontSize: 16, cursor: "grab", flexShrink: 0 }}>⠿</span>
                  {editSection === s.id
                    ? <div style={{ display: "flex", gap: 8, alignItems: "center", flex: 1 }}>
                        <input value={editSectionTitle} onChange={e => setEditSectionTitle(e.target.value)} style={{ flex: 1, padding: "6px 10px", borderRadius: 7, fontSize: 13 }} onKeyDown={e => e.key === "Enter" && saveSectionEdit()} autoFocus />
                        <Btn onClick={saveSectionEdit} sz="sm">Save</Btn>
                        <Btn v="outline" onClick={() => setEditSection(null)} sz="sm">Cancel</Btn>
                      </div>

                  <Btn v="outline" onClick={() => { setEditSection(s.id); setEditSectionTitle(s.title); }} sz="sm">Edit</Btn>
                  <Btn v="danger" onClick={() => deleteSection(s.id)} sz="sm">Delete</Btn>
                </div>}
              </div>
            ))}
          </Card>
        );
      })}
    </div>
  );
}

function VideosTab({ courses, sections, videos, addVideo, deleteVideo, patchVideo }) {
  const [vT, setVT] = React.useState("");
  const [vU, setVU] = React.useState("");
  const [vD, setVD] = React.useState("");
  const [vC, setVC] = React.useState("");
  const [vS, setVS] = React.useState("");
  const [vErr, setVErr] = React.useState("");
  const [dragVid, setDragVid] = React.useState(null);
  const [dragOverVid, setDragOverVid] = React.useState(null);

  const fSecs = sections.filter(s => s.courseId === vC);
  const detected = vU.trim() ? detect(vU) : null;

  const addVid = () => {
    if (!vT.trim() || !vU.trim() || !vC || !vS) { setVErr("All fields are required."); return; }
    addVideo({ id: uid(), courseId: vC, sectionId: vS, title: vT.trim(), url: vU.trim(), desc: vD.trim(), createdAt: Date.now() });
    setVT(""); setVU(""); setVD(""); setVErr("");
  };

  const handleVidDrop = (sectionId, droppedOnId) => {
    if (!dragVid || dragVid === droppedOnId) return;
    // Sort by explicit sort_order first, then use array index as stable fallback
    const sv = videos.filter(v => v.sectionId === sectionId)
      .map((v, i) => ({ ...v, _idx: i }))
      .sort((a,b) => {
        const ao = a.sortOrder != null ? a.sortOrder : a._idx * 10000;
        const bo = b.sortOrder != null ? b.sortOrder : b._idx * 10000;
        return ao - bo;
      });
    const from = sv.findIndex(v => v.id === dragVid);
    const to = sv.findIndex(v => v.id === droppedOnId);
    if (from === -1 || to === -1) return;
    const reordered = [...sv];
    const [moved] = reordered.splice(from, 1);
    reordered.splice(to, 0, moved);
    // Save clean sequential integers starting from 1

/* ── RISK CALCULATOR ─────────────────────────────────────────────────────── */
function RiskCalculator() {
  const [accountType, setAccountType] = React.useState("HFM"); // HFM | Funded
  const [instrument, setInstrument] = React.useState("NAS/US30");
  const [accountSize, setAccountSize] = React.useState("10000");
  const [usdZar, setUsdZar] = React.useState("18.50");
  const [rateLoading, setRateLoading] = React.useState(true);
  const [rateError, setRateError] = React.useState(false);

  React.useEffect(() => {
    const fetchRate = async () => {
      setRateLoading(true);
      try {
        // Use exchangerate-api (free, no key needed for basic)
        const res = await fetch("https://open.er-api.com/v6/latest/USD");
        const data = await res.json();
        if (data && data.rates && data.rates.ZAR) {
          setUsdZar(data.rates.ZAR.toFixed(2));
          setRateError(false);
        } else {
          setRateError(true);
        }
      } catch(e) {
        // Fallback to another free API
        try {
          const res2 = await fetch("https://api.frankfurter.app/latest?from=USD&to=ZAR");
          const data2 = await res2.json();
          if (data2 && data2.rates && data2.rates.ZAR) {
            setUsdZar(data2.rates.ZAR.toFixed(2));
            setRateError(false);
          } else { setRateError(true); }
        } catch { setRateError(true); }
      }
      setRateLoading(false);
    };
    fetchRate();
  }, []);

  // Risk inputs
  const [riskPips, setRiskPips] = React.useState("");
  const [riskLots, setRiskLots] = React.useState("");

  // Profit inputs
  const [profitPips, setProfitPips] = React.useState("");
  const [profitLots, setProfitLots] = React.useState("");

  const INSTRUMENTS = {
    "NAS/US30":  { multiplier: 1,   label: "NAS / US30",  pip: "index points", color: "#6B9FFF", icon: "📊" },
    "Gold":      { multiplier: 100, label: "Gold (XAUUSD)", pip: "pips",        color: "#E6C86A", icon: "🥇" },
    "Currency":  { multiplier: 1,   label: "Currency Pairs", pip: "pips",       color: "#4CB880", icon: "💱", isCurrency: true },
  };

  const inst = INSTRUMENTS[instrument];
  const acc  = parseFloat(accountSize) || 0;
  const rate = parseFloat(usdZar)      || 18.5;
  const rP   = parseFloat(riskPips)    || 0;
  const rL   = parseFloat(riskLots)    || 0;
  const prP  = parseFloat(profitPips)  || 0;
  const prL  = parseFloat(profitLots)  || 0;

  // Calculations — Currency pairs: risk = pips * lots * 10 (per standard lot = $10/pip)
  const isFunded = accountType === "Funded";
  const riskUSD  = inst.isCurrency ? rP * rL : rP * rL * inst.multiplier;
  const riskZAR  = riskUSD * rate;
  const riskAmt  = isFunded ? riskUSD : riskZAR;
  const riskPct  = acc > 0 ? (riskAmt / acc) * 100 : 0;
  const accAfterSL = acc - riskAmt;

  const profitUSD = inst.isCurrency ? prP * prL : prP * prL * inst.multiplier;
  const profitZAR = profitUSD * rate;
  const profitAmt = isFunded ? profitUSD : profitZAR;
  const profitPct = acc > 0 ? (profitAmt / acc) * 100 : 0;
  const accAfterTP = acc + profitAmt;

  const rrRatio = riskZAR > 0 ? (profitZAR / riskZAR).toFixed(2) : "—";
  const riskColor = accountType === "HFM"
    ? (riskPct > 10 ? C.red : riskPct > 5 ? C.gold : C.green)
    : (riskPct > 1.5 ? C.red : riskPct > 1 ? C.gold : C.green);

  const fmt = (n, decimals = 2) => n.toLocaleString("en-ZA", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  return (

              <div style={{ fontFamily: S, fontSize: 22, fontWeight: 700, color: C.red }}>{isFunded ? "$" : "R"}{fmt(isFunded ? riskUSD : riskZAR)}</div>

            </div>
            <div>
              <div style={{ fontSize: 11, color: C.grey, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 6 }}>Account Risk</div>
              <div style={{ fontFamily: S, fontSize: 22, fontWeight: 700, color: riskColor }}>{riskPct.toFixed(2)}%</div>
            </div>
          </div>

          {accountType === "HFM" && riskPct > 5 && riskPct <= 10 && <div style={{ marginTop: 14, padding: "10px 16px", background: "rgba(201,168,76,.1)", border: "1px solid " + C.gold + "40", borderRadius: 9, fontSize: 13, color: C.gold, textAlign: "center" }}>⚡ Risk is above 5% — be cautious with your HFM account.</div>}
          {accountType === "Funded" && riskPct > 1.5 && <div style={{ marginTop: 14, padding: "10px 16px", background: "rgba(217,96,96,.12)", border: "1px solid " + C.red + "40", borderRadius: 9, fontSize: 13, color: C.red, textAlign: "center" }}>🚨 DANGER — Over 1.5% risk on a funded account. You risk breaching your drawdown rules.</div>}
          {accountType === "Funded" && riskPct > 1 && riskPct <= 1.5 && <div style={{ marginTop: 14, padding: "10px 16px", background: "rgba(201,168,76,.1)", border: "1px solid " + C.gold + "40", borderRadius: 9, fontSize: 13, color: C.gold, textAlign: "center" }}>⚡ Approaching 1.5% funded account risk limit. Consider reducing size.</div>}
          {parseFloat(rrRatio) > 0 && parseFloat(rrRatio) < 1.5 && <div style={{ marginTop: 10, padding: "10px 16px", background: "rgba(201,168,76,.1)", border: "1px solid " + C.gold + "40", borderRadius: 9, fontSize: 13, color: C.gold, textAlign: "center" }}>⚡ Risk:Reward is below 1:1.5. Look for a better setup.</div>}

  );
}

            </div>
          );
        })}

    </div>
  );
}


function Portal({ layout, toggleLayout, user, courses, sections, videos, journals, addJournal, deleteJournal, comments, addComment, deleteComment, homework, hwSubmits, addHwSubmit, reviews, addReviewDB, weeklyPrompts, trackWatch, onLogout }) {
  const [view, setView]   = useState("home");
  const [course, setCourse] = useState(null);
  const [video, setVideo]   = useState(null);
  const [openS, setOpenS]   = useState({});

  const goHome = () => { setView("home"); setCourse(null); setVideo(null); };
  const openCourse = c => {
    setCourse(c); setVideo(null); setView("course");
    const o = {}; sections.filter(s => s.courseId === c.id).forEach(s => o[s.id] = true);
    setOpenS(o);
  };
  const play = v => { setVideo(v); setView("player"); if (typeof window !== "undefined") window.scrollTo({ top: 0, behavior: "smooth" }); trackWatch(user.id, v.title); };
  const backToCourse = () => { setVideo(null); setView("course"); };
  const toggleS = id => setOpenS(p => ({ ...p, [id]: !p[id] }));

  const [showJournal, setShowJournal] = React.useState(false);
  const [showSubscribe, setShowSubscribe] = React.useState(false);
  const [showCourses, setShowCourses] = React.useState(false);
  const [showCalc, setShowCalc] = React.useState(false);
  const [showHomework, setShowHomework] = React.useState(false);
  const [showPlaybook, setShowPlaybook] = React.useState(false);
  const [showChecklist, setShowChecklist] = React.useState(false);
  const [showReview, setShowReview] = React.useState(false);
  const [showNotif, setShowNotif] = React.useState(false);
  const [completed, setCompleted] = React.useState(() => { try { return JSON.parse(localStorage.getItem("tafx_completed_" + user.id) || "{}"); } catch { return {}; } });
  const toggleComplete = (videoId) => { const n = { ...completed, [videoId]: !completed[videoId] }; setCompleted(n); try { localStorage.setItem("tafx_completed_" + user.id, JSON.stringify(n)); } catch {} };
  const userLevels = user.levels || [];
  const hasPM = userLevels.includes("Private Mentorship");
  
  // Notifications
  const oneWeekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const myJournals = journals.filter(j => j.userId === user.id);
  const lastEntry = myJournals.length > 0 ? Math.max(...myJournals.map(j => j.createdAt)) : 0;
  const notJournaledWeek = myJournals.length === 0 || lastEntry < oneWeekAgo;
  const pendingHW = homework.filter(h => {
    const due = h.dueDate ? new Date(h.dueDate + "T23:59:59").getTime() : null;
    const submitted = hwSubmits.some(s => s.homeworkId === h.id && s.userId === user.id);
    return (user.levels||[]).includes("Private Mentorship") && !submitted && due && due > Date.now();
  });
  const overdueHW = homework.filter(h => {
    const due = h.dueDate ? new Date(h.dueDate + "T23:59:59").getTime() : null;
    const submitted = hwSubmits.some(s => s.homeworkId === h.id && s.userId === user.id);
    return (user.levels||[]).includes("Private Mentorship") && !submitted && due && due < Date.now();
  });
  const notifications = [
    ...pendingHW.map(h => ({ type: "hw", msg: "Homework due: " + h.title, urgent: false })),
    ...overdueHW.map(h => ({ type: "hw_late", msg: "OVERDUE: " + h.title, urgent: true })),
    ...(notJournaledWeek ? [{ type: "journal", msg: "You have not journalled in over a week", urgent: false }] : []),
  ];
  const accessibleCourses = courses.filter(c => {
    if (!c.level) return true; // no level restriction = visible to all approved members
    return userLevels.includes(c.level); // level set = must have that exact level
  });
  const cSecs    = course ? sections.filter(s => s.courseId === course.id) : [];
  const cVideos  = course ? videos.filter(v => v.courseId === course.id) : [];

  return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      {/* Global zoom overlay */}
      <div id="tafx-zoom-overlay" onClick={() => document.getElementById("tafx-zoom-overlay").style.display="none"}
        style={{ display:"none", position:"fixed", inset:0, background:"rgba(0,0,0,.93)", zIndex:9999, alignItems:"center", justifyContent:"center", cursor:"zoom-out", padding:20 }}>
        <img id="tafx-zoom-img" style={{ maxWidth:"95vw", maxHeight:"95vh", borderRadius:8, objectFit:"contain" }} />
        <div style={{ position:"absolute", top:20, right:20, color:"#fff", fontSize:28, cursor:"pointer" }}>✕</div>
      </div>

      {/* ── HEADER ── */}
      <div style={{ position: "sticky", top: 0, zIndex: 100, background: C.surf + "F4", backdropFilter: "blur(20px)", borderBottom: "1px solid " + C.border }}>
        <div style={{ maxWidth: window.__tafxLayout==="wide" ? "100%" : 1000, margin: "0 auto", padding: window.__tafxLayout==="wide" ? "0 40px" : "0 24px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 56 }}>

          {/* Logo */}
          <Logo w={80} onClick={() => { setShowJournal(false); setShowSubscribe(false); setShowCourses(false); setShowCalc(false); setShowHomework(false); setShowPlaybook(false); setShowChecklist(false); setShowReview(false); goHome(); }} />

          {/* Nav links */}
          <nav style={{ display: "flex", alignItems: "center", gap: 4 }}>
            {[
              { label: "Courses", state: showCourses, toggle: () => { setShowCourses(p => !p); setShowJournal(false); setShowSubscribe(false); setShowCalc(false); setShowHomework(false); setShowPlaybook(false); setShowChecklist(false); setShowReview(false); goHome(); } },
              { label: "Journal", state: showJournal, toggle: () => { setShowJournal(p => !p); setShowSubscribe(false); setShowCourses(false); setShowCalc(false); setShowHomework(false); setShowPlaybook(false); setShowChecklist(false); setShowReview(false); goHome(); } },
              { label: "Playbook", state: showPlaybook, toggle: () => { setShowPlaybook(p => !p); setShowJournal(false); setShowSubscribe(false); setShowCourses(false); setShowCalc(false); setShowHomework(false); setShowChecklist(false); setShowReview(false); goHome(); } },
              { label: "Checklist", state: showChecklist, toggle: () => { setShowChecklist(p => !p); setShowJournal(false); setShowSubscribe(false); setShowCourses(false); setShowCalc(false); setShowHomework(false); setShowPlaybook(false); setShowReview(false); goHome(); } },
              { label: "Risk Calc", state: showCalc, toggle: () => { setShowCalc(p => !p); setShowJournal(false); setShowSubscribe(false); setShowCourses(false); setShowHomework(false); setShowPlaybook(false); setShowChecklist(false); setShowReview(false); goHome(); } },
              ...(hasPM ? [{ label: "Homework", state: showHomework, toggle: () => { setShowHomework(p => !p); setShowJournal(false); setShowSubscribe(false); setShowCourses(false); setShowCalc(false); setShowPlaybook(false); setShowChecklist(false); setShowReview(false); goHome(); } }] : []),
            ].map(item => (
              <button key={item.label} onClick={item.toggle}
                style={{ background: "transparent", border: "none", cursor: "pointer", padding: "6px 12px", borderRadius: 8, fontSize: 13, fontWeight: item.state ? 700 : 400,
                  color: item.state ? C.gold : C.grey, transition: "color .15s",
                  borderBottom: item.state ? "2px solid " + C.gold : "2px solid transparent" }}
                onMouseEnter={e => { if (!item.state) e.currentTarget.style.color = C.dim; }}
                onMouseLeave={e => { if (!item.state) e.currentTarget.style.color = C.grey; }}>
                {item.label}
              </button>
            ))}
          </nav>

          {/* Right side */}
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            {/* Bell */}
            <div style={{ position: "relative" }}>
              <button onClick={() => setShowNotif(p => !p)}
                style={{ background: "transparent", border: "none", cursor: "pointer", padding: "4px 8px", borderRadius: 8, display: "flex", alignItems: "center", position: "relative" }}>
                <span style={{ fontSize: 16, color: C.grey }}>🔔</span>
                {notifications.length > 0 && <span style={{ position: "absolute", top: 2, right: 4, width: 8, height: 8, borderRadius: "50%", background: C.red }} />}
              </button>
              {showNotif && (
                <div style={{ position: "absolute", top: "calc(100% + 8px)", right: 0, width: 280, background: C.card, border: "1px solid " + C.border, borderRadius: 12, boxShadow: "0 8px 32px rgba(0,0,0,.5)", zIndex: 999, overflow: "hidden" }}>
                  <div style={{ padding: "12px 16px", borderBottom: "1px solid " + C.border, fontSize: 13, fontWeight: 600, color: C.white }}>Notifications</div>
                  {notifications.length === 0

                {sec && <p style={{ fontSize: 11, fontWeight: 600, letterSpacing: ".18em", color: C.gold, textTransform: "uppercase", marginBottom: 8 }}>{sec.title}</p>}
                <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: "-.01em", color: C.white, marginBottom: 8, lineHeight: 1.3 }}>{video.title}</h2>
                {video.desc && <p style={{ color: C.grey, fontSize: 14, lineHeight: 1.7, marginBottom: 24 }}>{video.desc}</p>}

                {next && (
                  <div onClick={() => play(next)} style={{ background: C.surf, border: "1px solid " + C.border, borderRadius: 10, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14, cursor: "pointer", marginBottom: 24, transition: "border-color .2s" }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = C.borderH}
                    onMouseLeave={e => e.currentTarget.style.borderColor = C.border}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: ".15em", color: C.gold, textTransform: "uppercase", marginBottom: 4 }}>Up Next</div>
                      <div style={{ fontSize: 14, fontWeight: 500, color: C.white }}>{next.title}</div>
                    </div>
                    <span style={{ color: C.grey, fontSize: 16 }}>→</span>
                  </div>
                )}

                {(video.notes || video.pdfUrl) && (
                  <div style={{ background: "rgba(201,168,76,.04)", border: "1px solid rgba(201,168,76,.15)", borderRadius: 10, padding: "18px 20px", marginBottom: 24 }}>
                    <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: ".18em", color: C.gold, textTransform: "uppercase", marginBottom: 10 }}>Notes</div>
                    {video.notes && <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.8, whiteSpace: "pre-wrap", marginBottom: video.pdfUrl ? 14 : 0 }}>{video.notes}</p>}
                    {video.pdfUrl && (
                      <a href={video.pdfUrl} download={video.pdfName || "notes.pdf"}
                        style={{ display: "inline-flex", alignItems: "center", gap: 8, background: C.goldDim, color: C.gold, border: "1px solid " + C.gold + "30", padding: "8px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600, textDecoration: "none" }}>
                        ↓ {video.pdfName || "Download PDF"}
                      </a>
                    )}
                  </div>
                )}

                <VideoComments videoId={video.id} videoTitle={video.title} user={user} comments={comments} addComment={addComment} deleteComment={deleteComment} />
              </div>

              {/* Right sidebar */}
              {secVids.length > 1 && (
                <div style={{ padding: "20px 16px" }}>
                  <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: ".15em", color: C.grey, textTransform: "uppercase", marginBottom: 14 }}>
                    {sec?.title}
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                    {secVids.map((v, i) => {
                      const active = v.id === video.id;
                      return (
                        <div key={v.id} onClick={() => play(v)}
                          style={{ padding: "10px 12px", borderRadius: 8, cursor: "pointer", display: "flex", alignItems: "center", gap: 10,
                            background: active ? C.goldDim : "transparent",
                            transition: "background .15s" }}
                          onMouseEnter={e => { if(!active) e.currentTarget.style.background = C.surf; }}
                          onMouseLeave={e => { if(!active) e.currentTarget.style.background = "transparent"; }}>
                          <span style={{ fontSize: 10, color: active ? C.gold : C.faint, fontWeight: 600, width: 16, flexShrink: 0, textAlign: "center" }}>
                            {completed[v.id] && !active ? "✓" : (i + 1)}
                          </span>
                          <span style={{ fontSize: 13, fontWeight: active ? 600 : 400, color: active ? C.gold : completed[v.id] ? C.grey : C.dim,
                            flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                            textDecoration: completed[v.id] && !active ? "line-through" : "none",
                            opacity: completed[v.id] && !active ? 0.5 : 1 }}>{v.title}</span>
                          {!active && (
                            <div onClick={e => { e.stopPropagation(); toggleComplete(v.id); }}
                              style={{ width: 16, height: 16, borderRadius: 4, flexShrink: 0, cursor: "pointer",
                                border: "1.5px solid " + (completed[v.id] ? C.green : C.faint),
                                background: completed[v.id] ? C.green : "transparent",
                                display: "flex", alignItems: "center", justifyContent: "center" }}>
                              {completed[v.id] && <span style={{ color: "#fff", fontSize: 9, fontWeight: 900 }}>✓</span>}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      })()}
    </div>
  );
}



/* ── VIDEO COMMENTS / Q&A ───────────────────────────────────────────────── */
function VideoComments({ videoId, videoTitle, user, comments, addComment, deleteComment }) {
  const [text, setText] = React.useState("");
  const [timestamp, setTimestamp] = React.useState("");
  const [replyTo, setReplyTo] = React.useState(null);
  const [replyText, setReplyText] = React.useState("");
  const [activeTab, setActiveTab] = React.useState("all"); // all | timestamped
  const [saving, setSaving] = React.useState(false);

  const videoComments = comments.filter(c => c.videoId === videoId && !c.parentId)
    .sort((a, b) => a.createdAt - b.createdAt);

  const getReplies = (parentId) => comments.filter(c => c.videoId === videoId && c.parentId === parentId)
    .sort((a, b) => a.createdAt - b.createdAt);

  const submit = async () => {
    if (!text.trim()) return;
    setSaving(true);
    await addComment({ id: uid(), videoId, userId: user.id, userName: user.name, text: text.trim(), parentId: null, isAdmin: false, timestamp: timestamp.trim() || null, createdAt: Date.now() });
    setText(""); setTimestamp(""); setSaving(false);
  };

  const submitReply = async () => {
    if (!replyText.trim() || !replyTo) return;
    setSaving(true);
    await addComment({ id: uid(), videoId, userId: user.id, userName: user.name, text: replyText.trim(), parentId: replyTo.id, isAdmin: false, createdAt: Date.now() });
    setReplyText(""); setReplyTo(null); setSaving(false);
  };

  const timeAgo = (ts) => {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return "just now";
    if (s < 3600) return Math.floor(s/60) + "m ago";
    if (s < 86400) return Math.floor(s/3600) + "h ago";
    return Math.floor(s/86400) + "d ago";
  };

  const Avatar = ({ name, isAdmin, size = 36 }) => (
    <div style={{ width: size, height: size, borderRadius: "50%", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: size * .38,
      background: isAdmin ? `linear-gradient(135deg,${C.goldLt},${C.gold})` : `linear-gradient(135deg,#1a3a6e,#0D1B3E)`,
      color: isAdmin ? "#08090E" : C.white, border: isAdmin ? "none" : "1px solid " + C.border }}>
      {name.charAt(0).toUpperCase()}
    </div>
  );

  return (
    <div style={{ margin: "36px 20px 0", borderTop: "1px solid " + C.border, paddingTop: 28 }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 24 }}>
        <div style={{ fontSize: 18 }}>💬</div>
        <div>
          <h3 style={{ fontFamily: S, fontSize: 18, fontWeight: 700, color: C.white }}>Questions & Discussion</h3>
          <p style={{ fontSize: 12, color: C.grey, marginTop: 2 }}>{videoComments.length} question{videoComments.length !== 1 ? "s" : ""} · Ask anything about this lesson</p>
        </div>
      </div>

      {/* Post a question */}
      <div style={{ display: "flex", gap: 12, marginBottom: 28 }}>
        <Avatar name={user.name} isAdmin={false} />
        <div style={{ flex: 1 }}>
          <textarea value={text} onChange={e => setText(e.target.value)}
            placeholder={"Ask a question or share your thoughts about this lesson…"}
            style={{ width: "100%", background: C.navy, border: "1.5px solid " + C.border, borderRadius: 10, padding: "12px 14px", color: C.white, fontFamily: D, fontSize: 13, lineHeight: 1.6, resize: "vertical", minHeight: 72, outline: "none" }}
            onFocus={e => e.target.style.borderColor = C.gold}
            onBlur={e => e.target.style.borderColor = C.border}
          />
          <div style={{ display: "flex", gap: 8, marginTop: 6, alignItems: "center" }}>
            <input value={timestamp} onChange={e => setTimestamp(e.target.value)} placeholder="Timestamp (e.g. 2:45)" style={{ width: 120, padding: "7px 10px", borderRadius: 8, fontSize: 12, flexShrink: 0 }} />
            <span style={{ fontSize: 11, color: C.faint }}>optional</span>
          </div>
          {text.trim() && (
            <div style={{ display: "flex", gap: 8, marginTop: 8, justifyContent: "flex-end" }}>
              <button onClick={() => setText("")} style={{ background: "transparent", color: C.grey, border: "1px solid " + C.border, borderRadius: 8, padding: "7px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Cancel</button>
              <Btn onClick={submit} disabled={saving} sz="sm">{saving ? "Posting..." : "Post Question"}</Btn>
            </div>
          )}
        </div>
      </div>

      {/* Tab selector */}
      <div style={{ display: "flex", gap: 4, marginBottom: 20, background: C.bg, borderRadius: 9, padding: 3 }}>
        {[["all", "All Comments"], ["timestamped", "⏱ Timestamped"]].map(([k, l]) => (
          <button key={k} onClick={() => setActiveTab(k)} style={{ flex: 1, padding: "7px 0", borderRadius: 7, fontSize: 12, fontWeight: 700, background: activeTab === k ? C.goldDim : "transparent", color: activeTab === k ? C.gold : C.grey, border: "none", cursor: "pointer" }}>{l}</button>
        ))}
      </div>

      {/* Comments list */}
      {videoComments.filter(c => activeTab === "timestamped" ? c.timestamp : true).length === 0 && (
        <div style={{ textAlign: "center", padding: "32px 0", color: C.faint, fontSize: 13 }}>
          No questions yet. Be the first to ask!
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
        {videoComments.filter(c => activeTab === "timestamped" ? c.timestamp : true).map(c => {
          const replies = getReplies(c.id);
          const isOwn = c.userId === user.id;
          return (
            <div key={c.id}>
              {/* Main comment */}
              <div style={{ display: "flex", gap: 12 }}>
                <Avatar name={c.userName} isAdmin={c.isAdmin} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5, flexWrap: "wrap" }}>
                    <span style={{ fontWeight: 700, fontSize: 14, color: c.isAdmin ? C.gold : C.white }}>{c.userName}</span>
                    {c.isAdmin && <span style={{ fontSize: 10, background: C.goldDim, color: C.gold, border: "1px solid " + C.gold + "40", padding: "2px 8px", borderRadius: 20, fontWeight: 700, letterSpacing: ".06em" }}>COACH</span>}
                    <span style={{ fontSize: 11, color: C.faint }}>{timeAgo(c.createdAt)}</span>
                    {c.timestamp && <span style={{ fontSize: 11, background: C.goldDim, color: C.gold, border: "1px solid " + C.gold + "40", padding: "1px 8px", borderRadius: 20, fontWeight: 700, cursor: "pointer" }}>⏱ {c.timestamp}</span>}
                  </div>
                  <p style={{ fontSize: 14, color: C.dim, lineHeight: 1.75, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{c.text}</p>
                  <div style={{ display: "flex", gap: 12, marginTop: 8 }}>
                    <button onClick={() => { setReplyTo(c); setReplyText(""); }}
                      style={{ background: "transparent", color: C.grey, border: "none", fontSize: 12, fontWeight: 600, cursor: "pointer", padding: 0, letterSpacing: ".03em" }}>
                      ↩ Reply
                    </button>
                    {isOwn && <button onClick={() => deleteComment(c.id)}
                      style={{ background: "transparent", color: C.faint, border: "none", fontSize: 12, cursor: "pointer", padding: 0 }}>Delete</button>}
                  </div>

                  {/* Reply box */}
                  {replyTo?.id === c.id && (
                    <div style={{ marginTop: 12, display: "flex", gap: 10 }}>
                      <Avatar name={user.name} isAdmin={false} size={28} />
                      <div style={{ flex: 1 }}>
                        <textarea value={replyText} onChange={e => setReplyText(e.target.value)}
                          placeholder={"Reply to " + c.userName + "…"}
                          autoFocus
                          style={{ width: "100%", background: C.navy, border: "1.5px solid " + C.gold, borderRadius: 9, padding: "10px 12px", color: C.white, fontFamily: D, fontSize: 13, lineHeight: 1.5, resize: "vertical", minHeight: 56, outline: "none" }}
                        />
                        <div style={{ display: "flex", gap: 8, marginTop: 6, justifyContent: "flex-end" }}>
                          <button onClick={() => { setReplyTo(null); setReplyText(""); }} style={{ background: "transparent", color: C.grey, border: "1px solid " + C.border, borderRadius: 8, padding: "6px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Cancel</button>
                          <Btn onClick={submitReply} disabled={saving || !replyText.trim()} sz="sm">{saving ? "..." : "Reply"}</Btn>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Replies */}
                  {replies.length > 0 && (
                    <div style={{ marginTop: 14, paddingLeft: 16, borderLeft: "2px solid " + C.border, display: "flex", flexDirection: "column", gap: 14 }}>
                      {replies.map(r => (
                        <div key={r.id} style={{ display: "flex", gap: 10 }}>
                          <Avatar name={r.userName} isAdmin={r.isAdmin} size={28} />
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                              <span style={{ fontWeight: 700, fontSize: 13, color: r.isAdmin ? C.gold : C.white }}>{r.userName}</span>
                              {r.isAdmin && <span style={{ fontSize: 10, background: C.goldDim, color: C.gold, border: "1px solid " + C.gold + "40", padding: "2px 8px", borderRadius: 20, fontWeight: 700 }}>COACH</span>}
                              <span style={{ fontSize: 11, color: C.faint }}>{timeAgo(r.createdAt)}</span>
                            </div>
                            <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.7, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{r.text}</p>
                            {(r.userId === user.id) && (
                              <button onClick={() => deleteComment(r.id)} style={{ background: "transparent", color: C.faint, border: "none", fontSize: 11, cursor: "pointer", padding: 0, marginTop: 4 }}>Delete</button>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── PNL CALENDAR ───────────────────────────────────────────────────────── */
function PnlCalendar({ journals, userId }) {
  const now = new Date();
  const [month, setMonth] = React.useState(now.getMonth());
  const [year, setYear] = React.useState(now.getFullYear());
  const [mode, setMode] = React.useState("Live Trade"); // Live Trade | Backtest
  const [calModel, setCalModel] = React.useState("All");

  const allJournals = journals.filter(j => j.userId === userId && j.pnl);
  const myJournals = (allJournals || []).filter(j => (j.tradeType || "Live Trade") === mode && (calModel === "All" || j.tradeModel === calModel));

  const parsePnl = (str) => {
    if (!str) return null;
    const clean = str.replace(/[^0-9.-]/g, "");
    const num = parseFloat(clean);
    if (isNaN(num)) return null;
    return str.trim().startsWith("-") ? -Math.abs(num) : Math.abs(num);
  };

  const getDayData = (day) => {
    const trades = myJournals.filter(j => {
      // Use tradeDate if set, otherwise fall back to createdAt
      const dateStr = j.tradeDate;
      const jd = dateStr ? new Date(dateStr + "T12:00:00") : new Date(j.createdAt);
      return jd.getFullYear() === year && jd.getMonth() === month && jd.getDate() === day;
    });
    const pnl = trades.length > 0 ? trades.reduce((sum, j) => sum + (parsePnl(j.pnl) || 0), 0) : 0;
    return { trades, pnl };
  };

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  const allDayPnls = Array.from({length: daysInMonth}, (_, i) => getDayData(i+1));
  const totalMonth = allDayPnls.reduce((sum, d) => sum + d.pnl, 0);
  const winDays = allDayPnls.filter(d => d.trades.length > 0 && d.pnl > 0).length;
  const lossDays = allDayPnls.filter(d => d.trades.length > 0 && d.pnl < 0).length;
  const tradeDays = allDayPnls.filter(d => d.trades.length > 0).length;
  const winRate = tradeDays > 0 ? Math.round((winDays / tradeDays) * 100) : 0;

  const prevMonth = () => { if (month === 0) { setMonth(11); setYear(y => y-1); } else setMonth(m => m-1); };
  const nextMonth = () => { if (month === 11) { setMonth(0); setYear(y => y+1); } else setMonth(m => m+1); };

  return (
    <div style={{ marginTop: 40, borderTop: "1px solid " + C.border, paddingTop: 32 }}>

      {/* Header */}
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: 16, marginBottom: 24 }}>
        <div>
          <h3 style={{ fontFamily: S, fontSize: 22, fontWeight: 700, color: C.white, marginBottom: 4 }}>📅 P&L Calendar</h3>
          <p style={{ fontSize: 13, color: C.grey }}>Track your daily trading performance</p>
        </div>

        {/* Mode toggle */}
        <div style={{ display: "flex", background: C.bg, borderRadius: 10, padding: 3, gap: 3, border: "1px solid " + C.border }}>
          {["Live Trade", "Backtest"].map(t => (
            <button key={t} onClick={() => setMode(t)} style={{
              padding: "8px 18px", borderRadius: 8, fontSize: 12, fontWeight: 700, border: "none", cursor: "pointer", transition: "all .2s",
              background: mode === t ? (t === "Live Trade" ? "linear-gradient(135deg,#2ecc71,#1a9e50)" : "linear-gradient(135deg," + C.goldLt + "," + C.gold + ")") : "transparent",
              color: mode === t ? (t === "Live Trade" ? "#fff" : "#08090E") : C.grey
            }}>
              {t === "Live Trade" ? "📈 Live" : "🔬 Backtest"}
            </button>
          ))}
        </div>
      </div>

      {/* Model filter */}
      <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:20 }}>
        {["All","TA MODEL","FOREVER MODEL","PM SESSION MODEL","TA 2.0 MODEL","TA MMXM MODEL"].map(m => {
          const colors = {"TA MODEL":"#6B9FFF","FOREVER MODEL":"#4CB880","PM SESSION MODEL":"#C9A84C","TA 2.0 MODEL":"#FF7096","TA MMXM MODEL":"#C96BFF"};
          const col = m === "All" ? C.gold : colors[m];
          return (
            <button key={m} onClick={() => setCalModel(m)} style={{
              padding:"6px 14px", borderRadius:20, fontSize:11, fontWeight:700, border:"1.5px solid", cursor:"pointer", transition:"all .2s",
              background: calModel===m ? col+"20" : "transparent",
              color: calModel===m ? col : C.grey,
              borderColor: calModel===m ? col+"60" : C.border
            }}>{m==="All" ? "All Models" : m}</button>
          );
        })}
      </div>

      {/* Stats row */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(120px,1fr))", gap: 10, marginBottom: 24 }}>
        {[
          { label: "Month P&L", value: (totalMonth >= 0 ? "+" : "") + "$" + Math.abs(totalMonth).toFixed(0), color: totalMonth >= 0 ? C.green : C.red, bg: totalMonth >= 0 ? "rgba(76,184,128,.1)" : "rgba(217,96,96,.1)", border: totalMonth >= 0 ? C.green : C.red },
          { label: "Win Days", value: winDays, color: C.green, bg: "rgba(76,184,128,.08)", border: C.green },
          { label: "Loss Days", value: lossDays, color: C.red, bg: "rgba(217,96,96,.08)", border: C.red },
          { label: "Day Win Rate", value: winRate + "%", color: winRate >= 50 ? C.green : C.red, bg: winRate >= 50 ? "rgba(76,184,128,.08)" : "rgba(217,96,96,.08)", border: winRate >= 50 ? C.green : C.red },
        ].map(s => (
          <div key={s.label} style={{ background: s.bg, border: "1px solid " + s.border + "40", borderRadius: 12, padding: "14px 16px", textAlign: "center" }}>
            <div style={{ fontSize: 10, color: C.grey, letterSpacing: ".12em", textTransform: "uppercase", marginBottom: 6 }}>{s.label}</div>
            <div style={{ fontFamily: S, fontSize: 22, fontWeight: 700, color: s.color }}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* Month navigation */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 16, marginBottom: 16 }}>
        <button onClick={prevMonth} style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 10, color: C.white, width: 40, height: 40, cursor: "pointer", fontSize: 20, display: "flex", alignItems: "center", justifyContent: "center" }}>‹</button>
        <span style={{ fontFamily: S, fontSize: 20, fontWeight: 700, color: C.white, minWidth: 200, textAlign: "center" }}>{monthNames[month]} {year}</span>
        <button onClick={nextMonth} style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 10, color: C.white, width: 40, height: 40, cursor: "pointer", fontSize: 20, display: "flex", alignItems: "center", justifyContent: "center" }}>›</button>
      </div>

      {/* Day headers */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6, marginBottom: 6 }}>
        {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => (
          <div key={d} style={{ textAlign: "center", fontSize: 11, fontWeight: 700, color: C.grey, letterSpacing: ".1em", padding: "8px 0", background: C.card, borderRadius: 8 }}>{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6 }}>
        {Array.from({length: firstDay}, (_, i) => <div key={"e"+i} />)}
        {Array.from({length: daysInMonth}, (_, i) => {
          const day = i + 1;
          const { trades, pnl } = getDayData(day);
          const hasTrades = trades.length > 0;
          const isToday = now.getDate() === day && now.getMonth() === month && now.getFullYear() === year;
          const isWeekend = new Date(year, month, day).getDay() % 6 === 0;
          return (
            <div key={day} style={{
              borderRadius: 10, padding: "12px 8px", textAlign: "center", minHeight: 80,
              background: !hasTrades ? (isWeekend ? C.bg : C.card) : pnl > 0 ? "rgba(76,184,128,.18)" : pnl < 0 ? "rgba(217,96,96,.18)" : "rgba(201,168,76,.12)",
              border: "1px solid " + (isToday ? C.gold : !hasTrades ? C.border : pnl > 0 ? C.green + "50" : pnl < 0 ? C.red + "50" : C.gold + "40"),
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "space-between",
            }}>
              <div style={{ fontSize: 12, fontWeight: isToday ? 800 : 500, color: isToday ? C.gold : isWeekend ? C.faint : C.grey }}>{day}</div>
              {hasTrades && (
                <div>
                  <div style={{ fontSize: 14, fontWeight: 800, color: pnl > 0 ? C.green : pnl < 0 ? C.red : C.gold, lineHeight: 1 }}>
                    {pnl > 0 ? "+" : ""}{pnl !== 0 ? "$" + Math.abs(pnl).toFixed(0) : "BE"}
                  </div>
                  <div style={{ fontSize: 10, color: C.faint, marginTop: 3 }}>{trades.length} trade{trades.length !== 1 ? "s" : ""}</div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Legend */}
      <div style={{ display: "flex", gap: 20, marginTop: 16, fontSize: 12, color: C.grey, flexWrap: "wrap", justifyContent: "center" }}>
        <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 12, height: 12, borderRadius: 3, background: "rgba(76,184,128,.3)", display: "inline-block" }} />Profitable</span>
        <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 12, height: 12, borderRadius: 3, background: "rgba(217,96,96,.3)", display: "inline-block" }} />Loss</span>
        <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 12, height: 12, borderRadius: 3, background: "rgba(201,168,76,.2)", display: "inline-block" }} />Break Even</span>
        <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 12, height: 12, borderRadius: 3, background: C.card, border: "1px solid " + C.border, display: "inline-block" }} />No Trades</span>
      </div>
    </div>
  );
}


/* ── STUDENT HOMEWORK ───────────────────────────────────────────────────── */
function StudentHomework({ user, homework, hwSubmits = [], addHwSubmit }) {
  const [selected, setSelected] = React.useState(null);
  const [text, setText] = React.useState("");
  const [image, setImage] = React.useState(null);
  const [saving, setSaving] = React.useState(false);
  const [err, setErr] = React.useState("");

  const mySubmissions = (hwSubmits||[]).filter(s => s.userId === user.id);
  const hasSubmitted = (hwId) => mySubmissions.some(s => s.homeworkId === hwId);
  const getSubmission = (hwId) => mySubmissions.find(s => s.homeworkId === hwId);

  const submit = async (hw) => {
    if (!text.trim()) { setErr("Please write your answer before submitting."); return; }
    setSaving(true);
    await addHwSubmit({ id: uid(), homeworkId: hw.id, userId: user.id, userName: user.name, text: text.trim(), image: image||null, createdAt: Date.now() });
    setText(""); setImage(null); setErr(""); setSelected(null); setSaving(false);
  };

  const compressImage = (file, cb) => {
    const r = new FileReader();
    r.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const MAX = 1200; let w = img.width, h = img.height;
        if (w > MAX) { h = h*MAX/w; w = MAX; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        cb(canvas.toDataURL("image/jpeg", 0.7));
      };
      img.src = ev.target.result;
    };
    r.readAsDataURL(file);
  };

  return (
    <div style={{ maxWidth: window.__tafxLayout==="wide" ? "100%" : 720, margin: "0 auto", padding: window.__tafxLayout==="wide" ? "28px 48px 80px" : "28px 16px 80px" }}>
      <div style={{ marginBottom: 24 }}>
        <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".25em", color: "#FF7096", textTransform: "uppercase", marginBottom: 6 }}>Private Mentorship</p>
        <h2 style={{ fontFamily: S, fontSize: 26, fontWeight: 700 }}>📚 Homework</h2>
        <p style={{ color: C.grey, fontSize: 13, marginTop: 4 }}>Complete your assigned homework before the due date.</p>
      </div>

      {homework.length === 0 && (
        <div style={{ textAlign: "center", padding: "60px 0", color: C.grey }}>
          <div style={{ fontSize: 48, opacity: .3, marginBottom: 12 }}>📝</div>
          <p>No homework assigned yet. Check back soon.</p>
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        {homework.map(hw => {
          const submitted = hasSubmitted(hw.id);
          const sub = getSubmission(hw.id);
          const isOverdue = hw.dueDate && new Date(hw.dueDate) < new Date() && !submitted;
          const isOpen = selected === hw.id;
          return (
            <div key={hw.id} style={{ background: C.card, border: "1.5px solid " + (submitted ? C.green + "40" : isOverdue ? C.red + "40" : C.border), borderRadius: 14, overflow: "hidden" }}>
              <div onClick={() => setSelected(isOpen ? null : hw.id)} style={{ padding: "18px 20px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: S, fontSize: 17, fontWeight: 700, color: C.white, marginBottom: 4 }}>{hw.title}</div>
                  {hw.dueDate && <div style={{ fontSize: 12, color: isOverdue ? C.red : C.grey }}>Due: {new Date(hw.dueDate).toLocaleDateString("en-ZA", { weekday:"long", day:"numeric", month:"long", year:"numeric" })}</div>}
                </div>
                <div style={{ flexShrink: 0 }}>
                  {submitted
                    ? <span style={{ background: C.green + "20", color: C.green, border: "1px solid " + C.green + "40", padding: "4px 12px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>✓ Submitted</span>
                    : isOverdue
                    ? <span style={{ background: C.red + "20", color: C.red, border: "1px solid " + C.red + "40", padding: "4px 12px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>Overdue</span>
                    : <span style={{ background: "#FF709620", color: "#FF7096", border: "1px solid #FF709640", padding: "4px 12px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>Pending</span>
                  }
                </div>
              </div>

              {isOpen && (
                <div style={{ padding: "0 20px 20px", borderTop: "1px solid " + C.border }}>
                  <p style={{ fontSize: 14, color: C.dim, lineHeight: 1.8, padding: "16px 0" }}>{hw.description}</p>

                  {submitted && sub ? (
                    <div>
                      <div style={{ background: C.bg, border: "1px solid " + C.border, borderRadius: 10, padding: "14px 16px", marginBottom: 12 }}>
                        <div style={{ fontSize: 11, color: C.grey, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 8 }}>Your Submission</div>
                        <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.7 }}>{sub.text}</p>
                        {sub.image && <img src={sub.image} alt="submission" style={{ width: "100%", borderRadius: 8, marginTop: 10, border: "1px solid " + C.border }} />}
                      </div>
                      {sub.adminFeedback && (
                        <div style={{ background: "rgba(201,168,76,.06)", border: "1px solid rgba(201,168,76,.25)", borderRadius: 10, padding: "14px 16px" }}>
                          <div style={{ fontSize: 11, fontWeight: 700, color: C.gold, marginBottom: 6 }}>💬 Coach Taaha — Feedback</div>
                          <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.7 }}>{sub.adminFeedback}</p>
                        </div>
                      )}
                    </div>
                  ) : !isOverdue ? (
                    <div>
                      <label>Your Answer</label>
                      <textarea value={text} onChange={e => setText(e.target.value)} placeholder="Write your homework answer here..."
                        style={{ width: "100%", height: 120, background: C.navy, border: "1.5px solid " + C.border, borderRadius: 10, padding: "12px 14px", color: C.white, fontFamily: D, fontSize: 13, lineHeight: 1.6, resize: "vertical", outline: "none", marginBottom: 10 }} />
                      <div style={{ marginBottom: 12 }}>
                        <label>Attach Image (optional)</label>
                        <div onClick={() => document.getElementById("hw-img-" + hw.id).click()}
                          style={{ border: "2px dashed " + (image ? C.gold : C.border), borderRadius: 10, padding: "14px", textAlign: "center", cursor: "pointer", background: C.navy }}>
                          <input id={"hw-img-" + hw.id} type="file" accept="image/*" style={{ display: "none" }}
                            onChange={e => { const f = e.target.files[0]; if (f) compressImage(f, setImage); }} />
                          {image
                            ? <div><img src={image} alt="" style={{ maxHeight: 150, maxWidth: "100%", borderRadius: 6, display: "block", margin: "0 auto 8px" }} /><button onClick={e => { e.stopPropagation(); setImage(null); }} style={{ background: C.red+"20", color: C.red, border: "1px solid "+C.red+"40", borderRadius: 6, padding: "4px 10px", fontSize: 11, cursor: "pointer" }}>Remove</button></div>
                            : <span style={{ color: C.grey, fontSize: 13 }}>📸 Click to add a photo</span>
                          }
                        </div>
                      </div>
                      {err && <div style={{ color: C.red, fontSize: 12, marginBottom: 8 }}>{err}</div>}
                      <Btn onClick={() => submit(hw)} disabled={saving} full>{saving ? "Submitting..." : "Submit Homework"}</Btn>
                    </div>
                  ) : (
                    <div style={{ padding: "14px", background: C.red+"10", border: "1px solid "+C.red+"30", borderRadius: 10, color: C.red, fontSize: 13 }}>This homework is overdue and can no longer be submitted.</div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── ADMIN HOMEWORK TAB ─────────────────────────────────────────────────── */
function AdminHomeworkTab({ homework, addHomework, deleteHomework, hwSubmits, patchHwSubmit, users }) {
  const [title, setTitle] = React.useState("");
  const [desc, setDesc] = React.useState("");
  const [dueDate, setDueDate] = React.useState("");

  const [feedback, setFeedback] = React.useState("");
  const [feedbackSub, setFeedbackSub] = React.useState(null);

  const doAdd = () => {
    if (!title.trim() || !desc.trim()) return;
    addHomework({ id: uid(), title: title.trim(), description: desc.trim(), dueDate: dueDate||null, createdAt: Date.now() });
    setTitle(""); setDesc(""); setDueDate("");
  };

  const hw = selected ? homework.find(h => h.id === selected) : null;
  const subs = selected ? hwSubmits.filter(s => s.homeworkId === selected) : [];

  if (hw) return (

              <div style={{ fontWeight: 700, color: C.gold, fontSize: 13, marginBottom: 4 }}>{uname}</div>
              <div style={{ fontSize: 11, color: C.grey, marginBottom: 10 }}>{new Date(s.createdAt).toLocaleDateString("en-ZA", { day:"numeric", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" })}</div>
              <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.7, marginBottom: 10 }}>{s.text}</p>
              {s.image && <img src={s.image} alt="" style={{ width: "100%", maxHeight: 300, objectFit: "contain", borderRadius: 8, marginBottom: 10, border: "1px solid " + C.border }} />}
              {s.adminFeedback && <div style={{ background: C.goldDim, border: "1px solid " + C.gold + "30", borderRadius: 8, padding: "10px 14px", marginBottom: 10, fontSize: 13, color: C.dim }}>Your feedback: {s.adminFeedback}</div>}
              {feedbackSub === s.id ? (
                <div>
                  <textarea value={feedback} onChange={e => setFeedback(e.target.value)} placeholder="Write feedback for this student..."
                    style={{ width: "100%", height: 80, background: C.navy, border: "1.5px solid " + C.gold, borderRadius: 9, padding: "10px 12px", color: C.white, fontFamily: D, fontSize: 13, resize: "vertical", outline: "none", marginBottom: 8 }} />
                  <div style={{ display: "flex", gap: 8 }}>
                    <Btn onClick={() => { patchHwSubmit(s.id, { adminFeedback: feedback }); setFeedbackSub(null); setFeedback(""); }} sz="sm" disabled={!feedback.trim()}>Send Feedback</Btn>
                    <Btn v="outline" onClick={() => setFeedbackSub(null)} sz="sm">Cancel</Btn>
                  </div>
                </div>
              ) : (
                <Btn v="outline" onClick={() => { setFeedbackSub(s.id); setFeedback(s.adminFeedback||""); }} sz="sm">✏ {s.adminFeedback ? "Edit Feedback" : "Give Feedback"}</Btn>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );

  return (
    <div style={{ display: "grid", gap: 20 }}>
      <Card style={{ padding: 24 }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.gold, textTransform: "uppercase", marginBottom: 16 }}>+ Assign New Homework</div>
        <div style={{ display: "grid", gap: 12 }}>
          <div><label>Homework Title</label><input value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. Week 3 — Market Structure Analysis" /></div>
          <div><label>Instructions / Description</label>
            <textarea value={desc} onChange={e => setDesc(e.target.value)} placeholder="Describe what students need to do..."
              style={{ height: 100, resize: "vertical", background: C.navy, border: "1.5px solid " + C.border, borderRadius: 10, padding: "12px 14px", color: C.white, width: "100%", outline: "none", fontFamily: D, fontSize: 13, lineHeight: 1.6 }} />
          </div>
          <div><label>Due Date (optional)</label><input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)} style={{ colorScheme: "dark" }} /></div>
          <Btn onClick={doAdd} disabled={!title.trim() || !desc.trim()} style={{ justifySelf: "start" }}>Assign Homework</Btn>
        </div>
      </Card>

      <div>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase", marginBottom: 14 }}>Assigned Homework ({homework.length})</div>
        {homework.length === 0 && <p style={{ color: C.faint, fontSize: 13 }}>No homework assigned yet.</p>}
        {homework.map(hw => {
          const subCount = hwSubmits.filter(s => s.homeworkId === hw.id).length;
          return (
            <div key={hw.id} style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 12, padding: "14px 16px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: S, fontSize: 15, fontWeight: 700 }}>{hw.title}</div>
                <div style={{ fontSize: 11, color: C.grey, marginTop: 3 }}>
                  {hw.dueDate && <span>Due {new Date(hw.dueDate).toLocaleDateString()} · </span>}
                  <span style={{ color: subCount > 0 ? C.green : C.faint }}>{subCount} submission{subCount !== 1 ? "s" : ""}</span>
                </div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <Btn v="outline" onClick={() => setSelected(hw.id)} sz="sm">View Submissions</Btn>
                <Btn v="danger" onClick={() => deleteHomework(hw.id)} sz="sm">Delete</Btn>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
