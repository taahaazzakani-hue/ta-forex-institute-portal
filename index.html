.fu{animation:fadeUp .55s cubic-bezier(.22,1,.36,1) both}
.fi{animation:fadeIn .4s ease both}
`;

/* ── VIDEO DETECTION ─────────────────────────────────────────────────────── */
function detect(url) {
  if (!url) return null;
  const u = url.trim();
  // Handle any HTML that contains an iframe (e.g. Bunny wraps iframe in a <div>)
  if (u.startsWith("<") && u.includes("<iframe")) {
    const m = u.match(/src=["']([^"']+)["']/i);
    return m ? { type: "iframe", src: m[1], platform: "bunny" } : null;
  }
  if (u.startsWith("<iframe") || u.startsWith("<IFRAME")) {
    const m = u.match(/src=["']([^"']+)["']/i);
    return m ? { type: "iframe", src: m[1], platform: "bunny" } : null;
  }
  if (u.includes("mediadelivery.net") || u.includes("bunnycdn.com") || u.includes("b-cdn.net"))
    return { type: "iframe", src: u, platform: "bunny" };
  if (u.includes("drive.google.com")) {
    // Extract file ID and always build a clean /preview URL
    const m = u.match(/\/d\/([a-zA-Z0-9_-]+)/);
    const src = m ? "https://drive.google.com/file/d/" + m[1] + "/preview" : u;
    return { type: "iframe", src, platform: "drive" };
  }
  if (u.includes("youtube.com") || u.includes("youtu.be"))
    return { type: "ext", src: u, platform: "youtube", label: "YouTube" };
  if (u.includes("vimeo.com"))
    return { type: "ext", src: u, platform: "vimeo", label: "Vimeo" };
  if (u.includes("zoom.us") || u.includes("zoom.com"))
    return { type: "ext", src: u, platform: "zoom", label: "Zoom" };
  if (/\.(mp4|webm|mov|m4v)(\?.*)?$/i.test(u))
    return { type: "native", src: u, platform: "file" };
  return { type: "iframe", src: u, platform: "embed" };
}

const PC = { youtube: "#FF0000", vimeo: "#1AB7EA", zoom: "#2D8CFF", drive: C.gold };

function CastButton({ url, title }) {
  const [status, setStatus] = React.useState("idle");
  const [tip, setTip] = React.useState(false);
  const [castAvailable, setCastAvailable] = React.useState(false);

  React.useEffect(() => {
    // Check if Cast API is available (Chromecast)
    const checkCast = () => {
      if (window.chrome && window.chrome.cast) setCastAvailable(true);
    };
    window.__onGCastApiAvailable = (isAvailable) => { if (isAvailable) setCastAvailable(true); };
    const script = document.createElement("script");
    script.src = "https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1";
    script.onload = checkCast;
    document.head.appendChild(script);
    // Also check AirPlay
    const vid = document.createElement("video");
    if (vid.webkitShowPlaybackTargetPicker) setCastAvailable(true);
  }, []);

  const castToTV = async () => {
    const videoEls = Array.from(document.querySelectorAll("video"));
    // Try AirPlay (Safari/iOS)
    for (const v of videoEls) {
      if (v.webkitShowPlaybackTargetPicker) {
        v.webkitShowPlaybackTargetPicker();
        setStatus("casting");
        return;
      }
    }
    // Try Remote Playback API
    for (const v of videoEls) {
      if (v.remote && v.remote.state !== "disconnected") {
        try { await v.remote.prompt(); setStatus("casting"); return; } catch(e) {}
      }
    }
    // Try Picture-in-Picture
    for (const v of videoEls) {
      if (document.pictureInPictureEnabled && !v.disablePictureInPicture) {
        try { await v.requestPictureInPicture(); setStatus("pip"); v.addEventListener("leavepictureinpicture", () => setStatus("idle"), { once: true }); return; } catch(e) {}
      }
    }
    setTip(true);
    setTimeout(() => setTip(false), 6000);
  };

  return (
<div style={{ position: "relative", display: "inline-block" }}>
    <button onClick={castToTV} title="Cast to TV" style={{
      display: "inline-flex", alignItems: "center", gap: 7,
      background: (status !== "idle") ? C.goldDim : "rgba(255,255,255,.06)",
      color: (status !== "idle") ? C.gold : C.grey,
      border: "1px solid " + ((status !== "idle") ? C.gold + "50" : "rgba(255,255,255,.1)"),
      borderRadius: 8, padding: "8px 16px", fontSize: 12, fontWeight: 600,
      cursor: "pointer", transition: "all .2s", letterSpacing: ".03em"
    }}>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"/>
        <path d="M2 12a9 9 0 0 1 8 8"/>
        <path d="M2 16a5 5 0 0 1 4 4"/>
        <line x1="2" y1="20" x2="2.01" y2="20"/>
      </svg>
      {status === "pip" ? "▶ Pop Out" : status === "casting" ? "Casting..." : "🖥 Cast to TV"}
    </button>
    {tip && (
      <div style={{ position: "absolute", bottom: "calc(100% + 8px)", right: 0, background: C.card, border: "1px solid " + C.border, borderRadius: 10, padding: "12px 14px", width: 260, zIndex: 100, fontSize: 12, color: C.dim, lineHeight: 1.7 }}>
        <strong style={{ color: C.white, display: "block", marginBottom: 4 }}>How to cast to your TV:</strong>
        📱 <strong>iPhone/iPad:</strong> Tap the AirPlay icon in your browser<br/>
        🤖 <strong>Android:</strong> Tap ⋮ menu → Cast<br/>
        💻 <strong>Chrome:</strong> Click ⋮ → Cast…<br/>

  if (p.type === "iframe") return (
    <div style={{ background: "#000" }}>
      <div style={{ position: "relative", paddingBottom: "56.25%", background: "#000" }}>
        <iframe src={p.src} style={{ position: "absolute", inset: 0, width: "100%", height: "100%", border: "none" }}

  const col = PC[p.platform] || C.gold;
  return (

      <p style={{ fontFamily: S, fontSize: 24, color: C.white, marginBottom: 8, fontWeight: 600 }}>Watch on {p.label}</p>
      <p style={{ color: C.grey, fontSize: 13, marginBottom: 30, lineHeight: 1.8, maxWidth: 380, margin: "0 auto 30px" }}>

      </p>
      <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>

      {p.platform === "zoom" && <p style={{ color: C.faint, fontSize: 11, marginTop: 20 }}>Download the Zoom recording and upload to Bunny.net for inline playback.</p>}

}

function UsersTab({ users, patchUser, deleteUser, loadAll }) {
  const pending = users.filter(u => u.status === "pending");
  const rest    = users.filter(u => u.status !== "pending");
  const approve = id => patchUser(id, { status: "approved" });
  const decline = id => patchUser(id, { status: "declined" });
  const delUser = id => deleteUser(id);
  const [refreshing, setRefreshing] = React.useState(false);
  const refresh = async () => { setRefreshing(true); await loadAll(false); setRefreshing(false); };
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 4 }}>
        <button onClick={refresh} style={{ background: "transparent", color: refreshing ? C.faint : C.gold, border: "1px solid " + (refreshing ? C.faint : C.gold) + "50", borderRadius: 8, padding: "6px 14px", fontSize: 11, fontWeight: 700, letterSpacing: ".08em", cursor: "pointer" }}>
          {refreshing ? "Refreshing..." : "↻ Refresh"}
        </button>
      </div>
      {pending.length > 0 && (
        <div style={{ marginBottom: 8 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".1em", color: C.gold, textTransform: "uppercase", marginBottom: 12 }}>⚡ Awaiting Approval ({pending.length})</div>
          {pending.map(u => (
            <Card key={u.id} style={{ padding: "16px 18px", marginBottom: 8, display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
              <div>
                <div style={{ fontWeight: 600, fontSize: 15 }}>{u.name}</div>
                <div style={{ fontSize: 12, color: C.grey, marginTop: 2 }}>{u.email}</div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <Btn onClick={() => approve(u.id)} sz="sm">✓ Approve</Btn>
                <Btn v="danger" onClick={() => decline(u.id)} sz="sm">✗ Decline</Btn>
              </div>
            </Card>
          ))}
        </div>
      )}
      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".1em", color: C.grey, textTransform: "uppercase", marginBottom: 10 }}>All Members ({rest.length})</div>
      {rest.map(u => (
        <Card key={u.id} style={{ padding: "14px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
          <div>
            <div style={{ fontWeight: 600, display: "flex", alignItems: "center", gap: 8 }}>{u.name} <Badge status={u.status} /></div>
            <div style={{ fontSize: 12, color: C.grey, marginTop: 2 }}>{u.email}</div>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            {u.status === "declined" && <Btn onClick={() => approve(u.id)} sz="sm">Approve</Btn>}
            {u.status === "approved" && <Btn v="danger" onClick={() => decline(u.id)} sz="sm">Revoke</Btn>}
            <Btn v="outline" onClick={() => delUser(u.id)} sz="sm" style={{ color: C.faint }}>Delete</Btn>
          </div>
        </Card>
      ))}
      {users.length === 0 && <p style={{ color: C.grey, textAlign: "center", padding: "40px 0" }}>No registered users yet.</p>}
    </div>
  );
}

                      <div style={{ minWidth: 0, flex: 1 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{vid.title}</div>
                        {vid.desc && <div style={{ fontSize: 11, color: C.grey, marginTop: 2 }}>{vid.desc}</div>}
                      </div>
                      <Btn v="danger" onClick={() => deleteVideo(vid.id)} sz="sm">Delete</Btn>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

/* ── ADMIN PANEL ─────────────────────────────────────────────────────────── */
function AdminPanel({ users, patchUser, deleteUser, courses, addCourse, patchCourse, deleteCourse, sections, addSection, patchSection, deleteSection, videos, addVideo, deleteVideo, journals, patchJournal, onLogout, loadAll }) {
  const [tab, setTab] = useState("users");
  const pending = users.filter(u => u.status === "pending");
  const TABS = [{ k: "users", l: "Users", badge: pending.length }, { k: "content", l: "Courses" }, { k: "videos", l: "Videos" }, { k: "journal", l: "Journals", badge: journals.filter(j=>!j.adminSeen).length }, { k: "membership", l: "Membership" }];
  return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      <Rule />
      <div style={{ background: C.surf, borderBottom: "1px solid " + C.border, padding: "14px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
          <Logo w={110} />
          <div style={{ width: 1, height: 28, background: C.border }} />
          <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: ".2em", color: C.gold, textTransform: "uppercase" }}>Admin Panel</span>
        </div>
        <Btn v="outline" onClick={onLogout} sz="sm">Sign Out</Btn>
      </div>
      <div style={{ maxWidth: 860, margin: "0 auto", padding: "28px 16px" }}>
        <div style={{ display: "flex", background: C.surf, border: "1px solid " + C.border, borderRadius: 12, padding: 5, gap: 4, marginBottom: 28 }}>
          {TABS.map(t => (
            <button key={t.k} onClick={() => setTab(t.k)} style={{ flex: 1, padding: "10px 4px", borderRadius: 9, fontSize: 12, fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase", position: "relative", transition: "all .2s",
              background: tab === t.k ? "linear-gradient(135deg," + C.goldLt + "," + C.gold + ")" : "transparent",
              color: tab === t.k ? "#08090E" : C.grey }}>
              {t.l}
              {t.badge > 0 && <span style={{ position: "absolute", top: 5, right: 7, width: 16, height: 16, borderRadius: "50%", background: C.red, color: "#fff", fontSize: 9, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center" }}>{t.badge}</span>}
            </button>
          ))}
        </div>
        {tab === "users"   && <UsersTab   users={users} patchUser={patchUser} deleteUser={deleteUser} loadAll={loadAll} />}
        {tab === "content" && <CoursesTab courses={courses} addCourse={addCourse} patchCourse={patchCourse} deleteCourse={deleteCourse} sections={sections} addSection={addSection} patchSection={patchSection} deleteSection={deleteSection} videos={videos} />}
        {tab === "videos"  && <VideosTab  courses={courses} sections={sections} videos={videos} addVideo={addVideo} deleteVideo={deleteVideo} />}
        {tab === "journal"  && <AdminJournalTab users={users} journals={journals} patchJournal={patchJournal} loadAll={loadAll} />}
        {tab === "membership" && <MembershipTab users={users} patchUser={patchUser} courses={courses} patchCourse={patchCourse} />}
      </div>
    </div>
  );
}

/* ── RISK CALCULATOR ─────────────────────────────────────────────────────── */
function RiskCalculator() {
  const [accountType, setAccountType] = React.useState("HFM"); // HFM | Funded
  const [instrument, setInstrument] = React.useState("NAS/US30");
  const [accountSize, setAccountSize] = React.useState("10000");
  const [usdZar, setUsdZar] = React.useState("18.50");
  const [rateLoading, setRateLoading] = React.useState(true);
  const [rateError, setRateError] = React.useState(false);

  React.useEffect(() => {
    const fetchRate = async () => {
      setRateLoading(true);
      try {
        // Use exchangerate-api (free, no key needed for basic)
        const res = await fetch("https://open.er-api.com/v6/latest/USD");
        const data = await res.json();
        if (data && data.rates && data.rates.ZAR) {
          setUsdZar(data.rates.ZAR.toFixed(2));
          setRateError(false);
        } else {
          setRateError(true);
        }
      } catch(e) {
        // Fallback to another free API
        try {
          const res2 = await fetch("https://api.frankfurter.app/latest?from=USD&to=ZAR");
          const data2 = await res2.json();
          if (data2 && data2.rates && data2.rates.ZAR) {
            setUsdZar(data2.rates.ZAR.toFixed(2));
            setRateError(false);
          } else { setRateError(true); }
        } catch { setRateError(true); }
      }
      setRateLoading(false);
    };
    fetchRate();
  }, []);

  // Risk inputs
  const [riskPips, setRiskPips] = React.useState("");
  const [riskLots, setRiskLots] = React.useState("");

  // Profit inputs
  const [profitPips, setProfitPips] = React.useState("");
  const [profitLots, setProfitLots] = React.useState("");

  const INSTRUMENTS = {
    "NAS/US30":  { multiplier: 1,   label: "NAS / US30",  pip: "index points", color: "#6B9FFF", icon: "📊" },
    "Gold":      { multiplier: 100, label: "Gold (XAUUSD)", pip: "pips",        color: "#E6C86A", icon: "🥇" },
    "Currency":  { multiplier: 1,   label: "Currency Pairs", pip: "pips",       color: "#4CB880", icon: "💱", isCurrency: true },
  };

  const inst = INSTRUMENTS[instrument];
  const acc  = parseFloat(accountSize) || 0;
  const rate = parseFloat(usdZar)      || 18.5;
  const rP   = parseFloat(riskPips)    || 0;
  const rL   = parseFloat(riskLots)    || 0;
  const prP  = parseFloat(profitPips)  || 0;
  const prL  = parseFloat(profitLots)  || 0;

  // Calculations — Currency pairs: risk = pips * lots * 10 (per standard lot = $10/pip)
  const isFunded = accountType === "Funded";
  const riskUSD  = inst.isCurrency ? rP * rL : rP * rL * inst.multiplier;
  const riskZAR  = riskUSD * rate;
  const riskAmt  = isFunded ? riskUSD : riskZAR;
  const riskPct  = acc > 0 ? (riskAmt / acc) * 100 : 0;
  const accAfterSL = acc - riskAmt;

  const profitUSD = inst.isCurrency ? prP * prL : prP * prL * inst.multiplier;
  const profitZAR = profitUSD * rate;
  const profitAmt = isFunded ? profitUSD : profitZAR;
  const profitPct = acc > 0 ? (profitAmt / acc) * 100 : 0;
  const accAfterTP = acc + profitAmt;

  const rrRatio = riskZAR > 0 ? (profitZAR / riskZAR).toFixed(2) : "—";
  const riskColor = accountType === "HFM"
    ? (riskPct > 10 ? C.red : riskPct > 5 ? C.gold : C.green)
    : (riskPct > 1.5 ? C.red : riskPct > 1 ? C.gold : C.green);

  const fmt = (n, decimals = 2) => n.toLocaleString("en-ZA", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });

  return (
    <div style={{ maxWidth: 780, margin: "0 auto", padding: "28px 16px 80px" }}>
      {/* Header */}
      <div style={{ marginBottom: 24 }}>
        <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".25em", color: C.gold, textTransform: "uppercase", marginBottom: 6 }}>TA FX</p>
        <h2 style={{ fontFamily: S, fontSize: 28, fontWeight: 700, marginBottom: 6 }}>Risk Calculator</h2>
        <p style={{ color: C.grey, fontSize: 14 }}>Calculate your risk and reward before entering a trade.</p>
      </div>

      {/* Account Type Toggle */}
      <div style={{ marginBottom: 20 }}>
        <label style={{ marginBottom: 10, display: "block" }}>Account Type</label>
        <div style={{ display: "flex", background: C.bg, borderRadius: 12, padding: 4, gap: 4, border: "1px solid " + C.border, maxWidth: 360 }}>
          {[
            { key: "HFM", label: "🏦 HFM Account", color: "#6B9FFF", limit: "Max 10% risk" },
            { key: "Funded", label: "🏆 Funded Account", color: C.gold, limit: "Max 1.5% risk" },
          ].map(t => (
            <button key={t.key} onClick={() => setAccountType(t.key)} style={{
              flex: 1, padding: "10px 14px", borderRadius: 9, fontSize: 12, fontWeight: 700, border: "none", cursor: "pointer", transition: "all .2s",
              background: accountType === t.key ? t.color + "20" : "transparent",
              color: accountType === t.key ? t.color : C.grey,
              outline: accountType === t.key ? "1.5px solid " + t.color + "50" : "none",
            }}>
              <div>{t.label}</div>
              <div style={{ fontSize: 10, fontWeight: 500, marginTop: 2, opacity: 0.8 }}>{t.limit}</div>
            </button>
          ))}
        </div>
      </div>

      {/* Instrument selector */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
        {Object.entries(INSTRUMENTS).map(([key, val]) => (
          <button key={key} onClick={() => setInstrument(key)} style={{
            flex: 1, minWidth: 120, padding: "12px 16px", borderRadius: 12, fontSize: 13, fontWeight: 700, cursor: "pointer", transition: "all .2s", border: "1.5px solid",
            background: instrument === key ? val.color + "18" : C.card,
            color: instrument === key ? val.color : C.grey,
            borderColor: instrument === key ? val.color + "60" : C.border,
          }}>
            {val.icon} {val.label}
          </button>
        ))}
      </div>

      {/* Account & Rate */}
      <div style={{ display: "grid", gridTemplateColumns: isFunded ? "1fr" : "1fr 1fr", gap: 12, marginBottom: 20 }}>
        <Card style={{ padding: 18 }}>
          <label>Account Size ({accountType === "Funded" ? "USD" : "ZAR"})</label>
          <input value={accountSize} onChange={e => setAccountSize(e.target.value)} placeholder={accountType === "Funded" ? "e.g. 10000" : "e.g. 10000"} type="number" />
        </Card>
        {!isFunded && <Card style={{ padding: 18 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 7 }}>
            <label style={{ margin: 0 }}>USD/ZAR Exchange Rate</label>
            {rateLoading
              ? <span style={{ fontSize: 10, color: C.gold, fontWeight: 700 }}>⟳ Fetching live rate…</span>
              : rateError
              ? <span style={{ fontSize: 10, color: C.red, fontWeight: 700 }}>⚠ Could not fetch — manual</span>
              : <span style={{ fontSize: 10, color: C.green, fontWeight: 700 }}>✓ Live rate</span>
            }
          </div>
          <input value={usdZar} onChange={e => setUsdZar(e.target.value)} placeholder="e.g. 18.50" type="number" step="0.01" />
        </Card>}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        {/* Risk Section */}
        <Card style={{ padding: 20, border: "1.5px solid " + C.red + "30", background: "rgba(217,96,96,.04)" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.red, letterSpacing: ".12em", textTransform: "uppercase", marginBottom: 14 }}>🛑 Risk / Stop Loss</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div>
              <label>Risk ({inst.pip})</label>
              <input value={riskPips} onChange={e => setRiskPips(e.target.value)} placeholder="e.g. 50" type="number" step="0.1" />
            </div>
            <div>
              <label>Lot Size</label>
              <input value={riskLots} onChange={e => setRiskLots(e.target.value)} placeholder="e.g. 0.10" type="number" step="0.01" />
            </div>
          </div>

          {riskUSD > 0 && (
            <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 14px", background: C.bg, borderRadius: 9, border: "1px solid " + C.border }}>
                <span style={{ fontSize: 12, color: C.grey }}>Risk (USD)</span>
                <span style={{ fontSize: 14, fontWeight: 700, color: C.red }}>${fmt(riskUSD)}</span>
              </div>
              {!isFunded && <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 14px", background: C.bg, borderRadius: 9, border: "1px solid " + C.border }}>
                <span style={{ fontSize: 12, color: C.grey }}>Risk (ZAR)</span>
                <span style={{ fontSize: 14, fontWeight: 700, color: C.red }}>R{fmt(riskZAR)}</span>
              </div>}
              <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 14px", background: riskColor + "15", borderRadius: 9, border: "1px solid " + riskColor + "40" }}>
                <span style={{ fontSize: 12, color: C.grey }}>% of Account</span>
                <span style={{ fontSize: 16, fontWeight: 800, color: riskColor }}>{riskPct.toFixed(2)}%</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 14px", background: C.bg, borderRadius: 9, border: "1px solid " + C.border }}>
                <span style={{ fontSize: 12, color: C.grey }}>Balance After SL</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: C.dim }}>{isFunded ? "$" : "R"}{fmt(accAfterSL)}</span>
              </div>
            </div>
          )}
        </Card>

        {/* Profit Section */}
        <Card style={{ padding: 20, border: "1.5px solid " + C.green + "30", background: "rgba(76,184,128,.04)" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.green, letterSpacing: ".12em", textTransform: "uppercase", marginBottom: 14 }}>✅ Profit / Take Profit</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div>
              <label>Profit ({inst.pip})</label>
              <input value={profitPips} onChange={e => setProfitPips(e.target.value)} placeholder="e.g. 150" type="number" step="0.1" />
            </div>
            <div>
              <label>Lot Size</label>
              <input value={profitLots} onChange={e => setProfitLots(e.target.value)} placeholder="e.g. 0.10" type="number" step="0.01" />
            </div>
          </div>

          {profitUSD > 0 && (
            <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 14px", background: C.bg, borderRadius: 9, border: "1px solid " + C.border }}>
                <span style={{ fontSize: 12, color: C.grey }}>Profit (USD)</span>
                <span style={{ fontSize: 14, fontWeight: 700, color: C.green }}>${fmt(profitUSD)}</span>
              </div>
              {!isFunded && <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 14px", background: C.bg, borderRadius: 9, border: "1px solid " + C.border }}>
                <span style={{ fontSize: 12, color: C.grey }}>Profit (ZAR)</span>
                <span style={{ fontSize: 14, fontWeight: 700, color: C.green }}>R{fmt(profitZAR)}</span>
              </div>}
              <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 14px", background: "rgba(76,184,128,.12)", borderRadius: 9, border: "1px solid " + C.green + "40" }}>
                <span style={{ fontSize: 12, color: C.grey }}>% of Account</span>
                <span style={{ fontSize: 16, fontWeight: 800, color: C.green }}>{profitPct.toFixed(2)}%</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 14px", background: C.bg, borderRadius: 9, border: "1px solid " + C.border }}>
                <span style={{ fontSize: 12, color: C.grey }}>Balance After TP</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: C.dim }}>{isFunded ? "$" : "R"}{fmt(accAfterTP)}</span>
              </div>
            </div>
          )}
        </Card>
      </div>

      {/* R:R Summary */}
      {riskUSD > 0 && profitUSD > 0 && (
        <Card style={{ marginTop: 16, padding: 20, border: "1.5px solid " + C.gold + "40", background: C.goldDim }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(140px,1fr))", gap: 12, textAlign: "center" }}>
            <div>
              <div style={{ fontSize: 11, color: C.grey, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 6 }}>Risk : Reward</div>
              <div style={{ fontFamily: S, fontSize: 28, fontWeight: 700, color: parseFloat(rrRatio) >= 2 ? C.green : parseFloat(rrRatio) >= 1 ? C.gold : C.red }}>1 : {rrRatio}</div>
            </div>
            <div>
              <div style={{ fontSize: 11, color: C.grey, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 6 }}>Total Risk</div>
              <div style={{ fontFamily: S, fontSize: 22, fontWeight: 700, color: C.red }}>{isFunded ? "$" : "R"}{fmt(isFunded ? riskUSD : riskZAR)}</div>
            </div>
            <div>
              <div style={{ fontSize: 11, color: C.grey, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 6 }}>Total Profit</div>
              <div style={{ fontFamily: S, fontSize: 22, fontWeight: 700, color: C.green }}>{isFunded ? "$" : "R"}{fmt(isFunded ? profitUSD : profitZAR)}</div>
            </div>
            <div>
              <div style={{ fontSize: 11, color: C.grey, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 6 }}>Account Risk</div>
              <div style={{ fontFamily: S, fontSize: 22, fontWeight: 700, color: riskColor }}>{riskPct.toFixed(2)}%</div>
            </div>
          </div>
          {accountType === "HFM" && riskPct > 10 && <div style={{ marginTop: 14, padding: "10px 16px", background: "rgba(217,96,96,.12)", border: "1px solid " + C.red + "40", borderRadius: 9, fontSize: 13, color: C.red, textAlign: "center" }}>⚠️ You are risking more than 10% of your HFM account. Reduce your lot size.</div>}
          {accountType === "HFM" && riskPct > 5 && riskPct <= 10 && <div style={{ marginTop: 14, padding: "10px 16px", background: "rgba(201,168,76,.1)", border: "1px solid " + C.gold + "40", borderRadius: 9, fontSize: 13, color: C.gold, textAlign: "center" }}>⚡ Risk is above 5% — be cautious with your HFM account.</div>}
          {accountType === "Funded" && riskPct > 1.5 && <div style={{ marginTop: 14, padding: "10px 16px", background: "rgba(217,96,96,.12)", border: "1px solid " + C.red + "40", borderRadius: 9, fontSize: 13, color: C.red, textAlign: "center" }}>🚨 DANGER — Over 1.5% risk on a funded account. You risk breaching your drawdown rules.</div>}
          {accountType === "Funded" && riskPct > 1 && riskPct <= 1.5 && <div style={{ marginTop: 14, padding: "10px 16px", background: "rgba(201,168,76,.1)", border: "1px solid " + C.gold + "40", borderRadius: 9, fontSize: 13, color: C.gold, textAlign: "center" }}>⚡ Approaching 1.5% funded account risk limit. Consider reducing size.</div>}
          {parseFloat(rrRatio) > 0 && parseFloat(rrRatio) < 1.5 && <div style={{ marginTop: 10, padding: "10px 16px", background: "rgba(201,168,76,.1)", border: "1px solid " + C.gold + "40", borderRadius: 9, fontSize: 13, color: C.gold, textAlign: "center" }}>⚡ Risk:Reward is below 1:1.5. Look for a better setup.</div>}
        </Card>
      )}
    </div>
  );

                  <span style={{ color: C.gold, fontSize: 24, flexShrink: 0 }}>›</span>

            )}

            {/* Q&A Comments */}
            <VideoComments videoId={video.id} videoTitle={video.title} user={user} comments={comments} addComment={addComment} deleteComment={deleteComment} />

            {/* Lesson list */}
            {secVids.length > 1 && (
              <div style={{ margin: "28px 20px 0" }}>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".12em", color: C.grey, textTransform: "uppercase", marginBottom: 12 }}>Lessons — {sec?.title}</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {secVids.map((v, i) => {

                      <div key={v.id} onClick={() => play(v)} style={{ padding: "12px 16px", borderRadius: 10, cursor: "pointer", display: "flex", alignItems: "center", gap: 12, transition: "all .15s",
                        background: active ? C.goldDim : "transparent",
                        border: `1px solid ${active ? C.gold + "45" : C.border}` }}>
                        <span style={{ width: 22, textAlign: "center", fontFamily: S, fontSize: 14, color: active ? C.gold : C.faint, fontWeight: 700, flexShrink: 0 }}>{i + 1}</span>
                        <span style={{ fontSize: 13, fontWeight: active ? 600 : 400, color: active ? C.gold : (completed[v.id] ? C.green : C.white), flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textDecoration: completed[v.id] && !active ? "line-through" : "none", opacity: completed[v.id] && !active ? 0.65 : 1 }}>{v.title}</span>
                        {active && <span style={{ fontSize: 10, color: C.gold, fontWeight: 700, flexShrink: 0, letterSpacing: ".06em" }}>▶ PLAYING</span>}
                        {!active && <div onClick={e => { e.stopPropagation(); toggleComplete(v.id); }} style={{ width: 20, height: 20, borderRadius: 5, border: "2px solid " + (completed[v.id] ? C.green : C.faint), background: completed[v.id] ? C.green : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, cursor: "pointer" }}>
                          {completed[v.id] && <span style={{ color: "#fff", fontSize: 10, fontWeight: 900 }}>✓</span>}
                        </div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

function VideoComments({ videoId, videoTitle, user, comments, addComment, deleteComment }) {

  const [activeTab, setActiveTab] = React.useState("all"); // all | timestamped
  const [saving, setSaving] = React.useState(false);

  const videoComments = comments.filter(c => c.videoId === videoId && !c.parentId)
    .sort((a, b) => a.createdAt - b.createdAt);

  const getReplies = (parentId) => comments.filter(c => c.videoId === videoId && c.parentId === parentId)
    .sort((a, b) => a.createdAt - b.createdAt);

  const submit = async () => {
    if (!text.trim()) return;
    setSaving(true);
    await addComment({ id: uid(), videoId, userId: user.id, userName: user.name, text: text.trim(), parentId: null, isAdmin: false, timestamp: timestamp.trim() || null, createdAt: Date.now() });
    setText(""); setTimestamp(""); setSaving(false);
  };

  const submitReply = async () => {
    if (!replyText.trim() || !replyTo) return;
    setSaving(true);
    await addComment({ id: uid(), videoId, userId: user.id, userName: user.name, text: replyText.trim(), parentId: replyTo.id, isAdmin: false, createdAt: Date.now() });

  };

  const timeAgo = (ts) => {
    const s = Math.floor((Date.now() - ts) / 1000);

    if (s < 3600) return Math.floor(s/60) + "m ago";

/* ── PNL CALENDAR ───────────────────────────────────────────────────────── */
function PnlCalendar({ journals, userId }) {
  const now = new Date();
  const [month, setMonth] = React.useState(now.getMonth());
  const [year, setYear] = React.useState(now.getFullYear());
  const [mode, setMode] = React.useState("Live Trade"); // Live Trade | Backtest

  const allJournals = journals.filter(j => j.userId === userId && j.pnl);
  const myJournals = allJournals.filter(j => (j.tradeType || "Live Trade") === mode);

  const parsePnl = (str) => {
    if (!str) return null;
    const clean = str.replace(/[^0-9.-]/g, "");
    const num = parseFloat(clean);
    if (isNaN(num)) return null;
    return str.trim().startsWith("-") ? -Math.abs(num) : Math.abs(num);
  };

  const getDayData = (day) => {
    const trades = myJournals.filter(j => {
      const jd = new Date(j.createdAt);
      return jd.getFullYear() === year && jd.getMonth() === month && jd.getDate() === day;
    });
    const pnl = trades.reduce((sum, j) => sum + (parsePnl(j.pnl) || 0), 0);
    return { trades, pnl };
  };

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  const allDayPnls = Array.from({length: daysInMonth}, (_, i) => getDayData(i+1));
  const totalMonth = allDayPnls.reduce((sum, d) => sum + d.pnl, 0);
  const winDays = allDayPnls.filter(d => d.trades.length > 0 && d.pnl > 0).length;
  const lossDays = allDayPnls.filter(d => d.trades.length > 0 && d.pnl < 0).length;
  const tradeDays = allDayPnls.filter(d => d.trades.length > 0).length;
  const winRate = tradeDays > 0 ? Math.round((winDays / tradeDays) * 100) : 0;

  const prevMonth = () => { if (month === 0) { setMonth(11); setYear(y => y-1); } else setMonth(m => m-1); };
  const nextMonth = () => { if (month === 11) { setMonth(0); setYear(y => y+1); } else setMonth(m => m+1); };

  return (
    <div style={{ marginTop: 40, borderTop: "1px solid " + C.border, paddingTop: 32 }}>

      {/* Header */}
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: 16, marginBottom: 24 }}>
        <div>
          <h3 style={{ fontFamily: S, fontSize: 22, fontWeight: 700, color: C.white, marginBottom: 4 }}>📅 P&L Calendar</h3>
          <p style={{ fontSize: 13, color: C.grey }}>Track your daily trading performance</p>
        </div>

        {/* Mode toggle */}
        <div style={{ display: "flex", background: C.bg, borderRadius: 10, padding: 3, gap: 3, border: "1px solid " + C.border }}>
          {["Live Trade", "Backtest"].map(t => (
            <button key={t} onClick={() => setMode(t)} style={{
              padding: "8px 18px", borderRadius: 8, fontSize: 12, fontWeight: 700, border: "none", cursor: "pointer", transition: "all .2s",
              background: mode === t ? (t === "Live Trade" ? "linear-gradient(135deg,#2ecc71,#1a9e50)" : "linear-gradient(135deg," + C.goldLt + "," + C.gold + ")") : "transparent",
              color: mode === t ? (t === "Live Trade" ? "#fff" : "#08090E") : C.grey
            }}>
              {t === "Live Trade" ? "📈 Live" : "🔬 Backtest"}
            </button>
          ))}
        </div>
      </div>

      {/* Stats row */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(120px,1fr))", gap: 10, marginBottom: 24 }}>
        {[
          { label: "Month P&L", value: (totalMonth >= 0 ? "+" : "") + "$" + Math.abs(totalMonth).toFixed(0), color: totalMonth >= 0 ? C.green : C.red, bg: totalMonth >= 0 ? "rgba(76,184,128,.1)" : "rgba(217,96,96,.1)", border: totalMonth >= 0 ? C.green : C.red },
          { label: "Win Days", value: winDays, color: C.green, bg: "rgba(76,184,128,.08)", border: C.green },
          { label: "Loss Days", value: lossDays, color: C.red, bg: "rgba(217,96,96,.08)", border: C.red },
          { label: "Day Win Rate", value: winRate + "%", color: winRate >= 50 ? C.green : C.red, bg: winRate >= 50 ? "rgba(76,184,128,.08)" : "rgba(217,96,96,.08)", border: winRate >= 50 ? C.green : C.red },
        ].map(s => (
          <div key={s.label} style={{ background: s.bg, border: "1px solid " + s.border + "40", borderRadius: 12, padding: "14px 16px", textAlign: "center" }}>
            <div style={{ fontSize: 10, color: C.grey, letterSpacing: ".12em", textTransform: "uppercase", marginBottom: 6 }}>{s.label}</div>
            <div style={{ fontFamily: S, fontSize: 22, fontWeight: 700, color: s.color }}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* Month navigation */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 16, marginBottom: 16 }}>
        <button onClick={prevMonth} style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 10, color: C.white, width: 40, height: 40, cursor: "pointer", fontSize: 20, display: "flex", alignItems: "center", justifyContent: "center" }}>‹</button>
        <span style={{ fontFamily: S, fontSize: 20, fontWeight: 700, color: C.white, minWidth: 200, textAlign: "center" }}>{monthNames[month]} {year}</span>
        <button onClick={nextMonth} style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 10, color: C.white, width: 40, height: 40, cursor: "pointer", fontSize: 20, display: "flex", alignItems: "center", justifyContent: "center" }}>›</button>
      </div>

      {/* Day headers */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6, marginBottom: 6 }}>
        {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => (
          <div key={d} style={{ textAlign: "center", fontSize: 11, fontWeight: 700, color: C.grey, letterSpacing: ".1em", padding: "8px 0", background: C.card, borderRadius: 8 }}>{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6 }}>
        {Array.from({length: firstDay}, (_, i) => <div key={"e"+i} />)}
        {Array.from({length: daysInMonth}, (_, i) => {
          const day = i + 1;
          const { trades, pnl } = getDayData(day);
          const hasTrades = trades.length > 0;
          const isToday = now.getDate() === day && now.getMonth() === month && now.getFullYear() === year;
          const isWeekend = new Date(year, month, day).getDay() % 6 === 0;
          return (
            <div key={day} style={{
              borderRadius: 10, padding: "12px 8px", textAlign: "center", minHeight: 80,
              background: !hasTrades ? (isWeekend ? C.bg : C.card) : pnl > 0 ? "rgba(76,184,128,.18)" : pnl < 0 ? "rgba(217,96,96,.18)" : "rgba(201,168,76,.12)",
              border: "1px solid " + (isToday ? C.gold : !hasTrades ? C.border : pnl > 0 ? C.green + "50" : pnl < 0 ? C.red + "50" : C.gold + "40"),
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "space-between",
            }}>
              <div style={{ fontSize: 12, fontWeight: isToday ? 800 : 500, color: isToday ? C.gold : isWeekend ? C.faint : C.grey }}>{day}</div>
              {hasTrades && (
                <div>
                  <div style={{ fontSize: 14, fontWeight: 800, color: pnl > 0 ? C.green : pnl < 0 ? C.red : C.gold, lineHeight: 1 }}>
                    {pnl > 0 ? "+" : ""}{pnl !== 0 ? "$" + Math.abs(pnl).toFixed(0) : "BE"}
                  </div>
                  <div style={{ fontSize: 10, color: C.faint, marginTop: 3 }}>{trades.length} trade{trades.length !== 1 ? "s" : ""}</div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Legend */}
      <div style={{ display: "flex", gap: 20, marginTop: 16, fontSize: 12, color: C.grey, flexWrap: "wrap", justifyContent: "center" }}>
        <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 12, height: 12, borderRadius: 3, background: "rgba(76,184,128,.3)", display: "inline-block" }} />Profitable</span>
        <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 12, height: 12, borderRadius: 3, background: "rgba(217,96,96,.3)", display: "inline-block" }} />Loss</span>
        <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 12, height: 12, borderRadius: 3, background: "rgba(201,168,76,.2)", display: "inline-block" }} />Break Even</span>
        <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 12, height: 12, borderRadius: 3, background: C.card, border: "1px solid " + C.border, display: "inline-block" }} />No Trades</span>
      </div>
    </div>
  );
}

function StudentJournal({ user, journals, addJournal, deleteJournal }) {
  const [title, setTitle] = React.useState("");
  const [pair, setPair] = React.useState("");
  const [direction, setDirection] = React.useState("Long");
  const [risk, setRisk] = React.useState("");
  const [gain, setGain] = React.useState("");
  const [result, setResult] = React.useState("Win");
  const [pnl, setPnl] = React.useState("");
  const [analysis, setAnalysis] = React.useState("");
  const [lesson, setLesson] = React.useState("");
  const [image, setImage] = React.useState(null);
  const [view, setView] = React.useState("list"); // list | new | detail | edit
  const [selected, setSelected] = React.useState(null);
  const [err, setErr] = React.useState("");
  const [editing, setEditing] = React.useState(null);
  const [tradeType, setTradeType] = React.useState("Live Trade");
  const [tradeDate, setTradeDate] = React.useState(() => new Date().toISOString().split("T")[0]);

  const myJournals = journals.filter(j => j.userId === user.id).sort((a,b) => b.createdAt - a.createdAt);

  const submit = async () => {
    if (!title.trim() || !pair.trim() || !analysis.trim()) { setErr("Title, pair and analysis are required."); return; }
    setErr("Saving...");
    const tradeDateTs = tradeDate ? new Date(tradeDate + "T12:00:00").getTime() : Date.now();
    const entry_obj = { id: uid(), userId: user.id, userName: user.name, title: title.trim(), pair: pair.trim(), direction, risk: risk.trim(), gain: gain.trim(), result, pnl: pnl.trim(), analysis: analysis.trim(), lesson: lesson.trim(), image: image || null, tradeType, tradeDate, createdAt: tradeDateTs, adminComment: null, adminCommentAt: null, adminSeen: false };
    try {
      await addJournal(entry_obj);
      setTitle(""); setPair(""); setDirection("Long"); setRisk(""); setGain(""); setResult("Win"); setPnl(""); setAnalysis(""); setLesson(""); setImage(null); setErr(""); setTradeDate(new Date().toISOString().split("T")[0]); setView("list");
    } catch(e) {
      setErr("Failed to save. Please try again.");

  const approvedUsers = users.filter(u => u.status === "approved");
  const filtered = (filterUser === "all" ? journals : journals.filter(j => j.userId === filterUser))
    .sort((a,b) => b.createdAt - a.createdAt);

const LEVELS = ["Advanced", "Private Mentorship", "1v1", "Beginner", "Free"];
const LEVEL_COLORS = {
  "Advanced":           { bg: "rgba(41,98,255,.15)",  border: "rgba(41,98,255,.4)",  text: "#6B9FFF" },
  "Private Mentorship": { bg: "rgba(201,168,76,.15)", border: "rgba(201,168,76,.4)", text: "#E6C86A" },
  "1v1":                { bg: "rgba(255,80,120,.15)", border: "rgba(255,80,120,.4)", text: "#FF7096" },

  "Free":               { bg: "rgba(76,184,128,.15)", border: "rgba(76,184,128,.4)", text: "#4CB880" },
};

function MembershipTab({ users, patchUser, courses, patchCourse }) {
  const [search, setSearch] = React.useState("");
  const approved = users.filter(u => u.status === "approved").filter(u => !search.trim() || u.name.toLowerCase().includes(search.toLowerCase()) || u.email.toLowerCase().includes(search.toLowerCase()));

  const toggleLevel = (userId, level) => {
    const u = users.find(x => x.id === userId);
    if (!u) return;
    const levels = u.levels || [];
    const newLevels = levels.includes(level) ? levels.filter(l => l !== level) : [...levels, level];
    patchUser(userId, { levels: newLevels });
  };

  const setCourseLevel = (courseId, level) => {
    patchCourse(courseId, { level: level || null });
  };

  return (
    <div style={{ display: "grid", gap: 24 }}>
      {/* Course level assignment */}
      <Card style={{ padding: 24 }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase", marginBottom: 6 }}>Course Access Levels</div>
        <p style={{ fontSize: 13, color: C.grey, marginBottom: 20, lineHeight: 1.6 }}>Assign a membership level to each course. Only students with that level can see and access it.</p>
        {courses.length === 0 && <p style={{ color: C.faint, fontSize: 13 }}>No courses yet.</p>}
        {courses.map(c => (
          <div key={c.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px", borderRadius: 10, background: C.bg, border: "1px solid " + C.border, marginBottom: 8, flexWrap: "wrap", gap: 12 }}>
            <div>
              <div style={{ fontFamily: S, fontSize: 16, fontWeight: 700, color: C.white }}>{c.title}</div>
              <div style={{ fontSize: 12, color: C.grey, marginTop: 2 }}>
                {c.level
                  ? <span style={{ background: LEVEL_COLORS[c.level]?.bg, color: LEVEL_COLORS[c.level]?.text, border: "1px solid " + LEVEL_COLORS[c.level]?.border, padding: "2px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>{c.level}</span>
                  : <span style={{ color: C.faint, fontSize: 11 }}>No level — visible to all approved members</span>}
              </div>
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {LEVELS.map(l => (
                <button key={l} onClick={() => setCourseLevel(c.id, c.level === l ? null : l)} style={{
                  padding: "6px 12px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                  background: c.level === l ? LEVEL_COLORS[l]?.bg : "transparent",
                  color: c.level === l ? LEVEL_COLORS[l]?.text : C.faint,
                  border: "1px solid " + (c.level === l ? LEVEL_COLORS[l]?.border : C.border),
                }}>{l}</button>
              ))}
              {c.level && <button onClick={() => setCourseLevel(c.id, null)} style={{ padding: "6px 10px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", background: "transparent", color: C.red, border: "1px solid " + C.red + "40" }}>✕ Remove</button>}
            </div>
          </div>
        ))}
      </Card>

      {/* Student level assignment */}
      <Card style={{ padding: 24 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10, marginBottom: 6 }}>
          <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase" }}>Student Memberships</div>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by name or email..." style={{ width: 220, padding: "8px 12px", borderRadius: 9, fontSize: 13 }} />
        </div>
        <p style={{ fontSize: 13, color: C.grey, marginBottom: 20, lineHeight: 1.6 }}>Toggle which membership levels each student has. A student can hold multiple levels.</p>
        {approved.length === 0 && <p style={{ color: C.faint, fontSize: 13 }}>No approved students yet.</p>}
        {approved.map(u => (
          <div key={u.id} style={{ padding: "16px", borderRadius: 12, background: C.bg, border: "1px solid " + C.border, marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10, marginBottom: 12 }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15, color: C.white }}>{u.name}</div>
                <div style={{ fontSize: 12, color: C.grey }}>{u.email}</div>
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {(u.levels || []).length === 0
                  ? <span style={{ fontSize: 11, color: C.faint }}>No levels assigned</span>
                  : (u.levels || []).map(l => (
                    <span key={l} style={{ background: LEVEL_COLORS[l]?.bg, color: LEVEL_COLORS[l]?.text, border: "1px solid " + LEVEL_COLORS[l]?.border, padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>{l}</span>
                  ))
                }
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {LEVELS.map(l => {
                const has = (u.levels || []).includes(l);
                return (
                  <button key={l} onClick={() => toggleLevel(u.id, l)} style={{
                    padding: "8px 16px", borderRadius: 9, fontSize: 12, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                    background: has ? LEVEL_COLORS[l]?.bg : C.card,
                    color: has ? LEVEL_COLORS[l]?.text : C.grey,
                    border: "1px solid " + (has ? LEVEL_COLORS[l]?.border : C.border),
                  }}>
                    {has ? "✓ " : "+ "}{l}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </Card>
    </div>
  );
}

  // ── Supabase helpers ──
  const SB_URL = "https://qpjnzhmuwklvqmevlxjm.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwam56aG11d2tsdnFtZXZseGptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjQ1ODUsImV4cCI6MjA4OTg0MDU4NX0.OlFw50GiD4vNzrLZ2-dFXVdAD8OxG1-g0xP_erR_n98";
  const sb = async (path, opts={}) => {
    const r = await fetch(SB_URL + "/rest/v1/" + path, {
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json", "Prefer": opts.prefer || "return=representation", ...opts.headers },
      method: opts.method || "GET",
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    if (!r.ok) { const e = await r.text(); console.error("SB error:", e); return null; }
    const text = await r.text();
    return text ? JSON.parse(text) : [];
  };

  // ── Load all data ──
  const loadAll = async (showSpinner = false) => {
    if (showSpinner) setLoading(true);
    try {
      const [u, c, sec, v, j, com] = await Promise.all([
        sb("users?order=created_at.asc"),
        sb("courses?order=created_at.asc"),
        sb("sections?select=*"),
        sb("videos?order=created_at.asc"),
        sb("journals?order=created_at.desc"),
        sb("comments?order=created_at.asc"),
      ]);
      if (u) setUsers(u.map(x => ({ id:x.id, name:x.name, email:x.email, password:x.password, status:x.status, levels:x.levels||[], createdAt:x.created_at })));

      if (sec) setSections(sec.map(x => ({ id:x.id, courseId:x.course_id, title:x.title })));
      if (v) setVideos(v.map(x => ({ id:x.id, courseId:x.course_id, sectionId:x.section_id, title:x.title, url:x.url, desc:x.description, createdAt:x.created_at })));
      if (j) setJournals(j.map(x => ({ id:x.id, userId:x.user_id, userName:x.user_name, title:x.title, pair:x.pair, direction:x.direction, risk:x.risk, gain:x.gain, result:x.result, pnl:x.pnl, analysis:x.analysis, lesson:x.lesson, image:x.image, adminComment:x.admin_comment, adminCommentAt:x.admin_comment_at, adminSeen:x.admin_seen, createdAt:x.created_at })));
      if (com) setComments(com.map(x => ({ id:x.id, videoId:x.video_id, userId:x.user_id, userName:x.user_name, text:x.text, parentId:x.parent_id||null, isAdmin:x.is_admin||false, timestamp:x.timestamp||null, createdAt:x.created_at })));
    } catch(e) { console.error("loadAll error:", e); }
    if (showSpinner) setLoading(false);
  };
  React.useEffect(() => { loadAll(true); }, []);

  // ── Setters that also persist to Supabase ──
  const saveUsers = async (newUsers) => {
    setUsers(newUsers);
    // Upsert all - find changed user
    for (const u of newUsers) {
      await sb("users?id=eq." + u.id, { method: "PATCH", prefer: "return=minimal", body: { name:u.name, email:u.email, password:u.password, status:u.status, levels:u.levels||[] } });
    }
  };
  const addUser = async (u) => {
    await sb("users", { method: "POST", prefer: "return=minimal", body: { id:u.id, name:u.name, email:u.email, password:u.password, status:u.status, levels:[], created_at:u.createdAt } });
    setUsers(prev => [...prev, u]);
  };
  const patchUser = async (id, patch) => {
    await sb("users?id=eq." + id, { method: "PATCH", prefer: "return=minimal", body: patch });
    setUsers(prev => prev.map(u => u.id === id ? { ...u, ...patch } : u));
  };
  const deleteUserDB = async (id) => {
    await sb("users?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setUsers(prev => prev.filter(u => u.id !== id));
  };
  const saveCourses = async (newCourses) => { setCourses(newCourses); };
  const addCourseDB = async (c) => {
    await sb("courses", { method: "POST", prefer: "return=minimal", body: { id:c.id, title:c.title, description:c.desc||"", level:c.level||null, created_at:c.createdAt } });
    setCourses(prev => [...prev, c]);
  };
  const patchCourse = async (id, patch) => {
    const dbPatch = {};
    if (patch.level !== undefined) dbPatch.level = patch.level;
    if (patch.title !== undefined) dbPatch.title = patch.title;
    if (patch.desc !== undefined) dbPatch.description = patch.desc;
    await sb("courses?id=eq." + id, { method: "PATCH", prefer: "return=minimal", body: dbPatch });
    setCourses(prev => prev.map(c => c.id === id ? { ...c, ...patch } : c));
  };
  const deleteCourseDB = async (id) => {
    await sb("videos?course_id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    await sb("sections?course_id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    await sb("courses?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setCourses(prev => prev.filter(c => c.id !== id));
    setSections(prev => prev.filter(s => s.courseId !== id));
    setVideos(prev => prev.filter(v => v.courseId !== id));
  };
  const addSectionDB = async (s) => {
    await sb("sections", { method: "POST", prefer: "return=minimal", body: { id:s.id, course_id:s.courseId, title:s.title } });
    setSections(prev => [...prev, s]);
  };
  const patchSectionDB = async (id, patch) => {
    const dbPatch = {};
    if (patch.title) dbPatch.title = patch.title;
    await sb("sections?id=eq." + id, { method: "PATCH", prefer: "return=minimal", body: dbPatch });
    setSections(prev => prev.map(s => s.id === id ? { ...s, ...patch } : s));
  };
  const deleteSectionDB = async (id) => {
    await sb("videos?section_id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    await sb("sections?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setSections(prev => prev.filter(s => s.id !== id));
    setVideos(prev => prev.filter(v => v.sectionId !== id));
  };
  const patchVideo = async (id, patch) => {
    const dbPatch = {};
    if (patch.sectionId !== undefined) dbPatch.section_id = patch.sectionId;
    if (patch.courseId !== undefined) dbPatch.course_id = patch.courseId;
    if (patch.createdAt !== undefined) dbPatch.created_at = patch.createdAt;
    await sb("videos?id=eq." + id, { method: "PATCH", prefer: "return=minimal", body: dbPatch });
    setVideos(prev => prev.map(v => v.id === id ? { ...v, ...patch } : v));
  };
  const addVideoDB = async (v) => {
    await sb("videos", { method: "POST", prefer: "return=minimal", body: { id:v.id, course_id:v.courseId, section_id:v.sectionId, title:v.title, url:v.url, description:v.desc||"", created_at:v.createdAt } });
    setVideos(prev => [...prev, v]);
  };
  const deleteVideoDB = async (id) => {
    await sb("videos?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setVideos(prev => prev.filter(v => v.id !== id));
  };
  const addCommentDB = async (c) => {
    await sb("comments", { method: "POST", prefer: "return=minimal", body: { id:c.id, video_id:c.videoId, user_id:c.userId, user_name:c.userName, text:c.text, parent_id:c.parentId||null, is_admin:c.isAdmin||false, timestamp:c.timestamp||null, created_at:c.createdAt } });
    setComments(prev => [...prev, c]);
  };
  const deleteCommentDB = async (id) => {
    await sb("comments?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    // Also delete replies
    await sb("comments?parent_id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setComments(prev => prev.filter(c => c.id !== id && c.parentId !== id));
  };

  const addJournalDB = async (j) => {
    await sb("journals", { method: "POST", prefer: "return=minimal", body: { id:j.id, user_id:j.userId, user_name:j.userName, title:j.title, pair:j.pair, direction:j.direction, risk:j.risk, gain:j.gain, result:j.result, pnl:j.pnl, analysis:j.analysis, lesson:j.lesson, image:j.image, admin_comment:null, admin_comment_at:null, admin_seen:false, created_at:j.createdAt } });
    setJournals(prev => [j, ...prev]);
  };
  const deleteJournalDB = async (id) => {
    await sb("journals?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setJournals(prev => prev.filter(j => j.id !== id));
  };
  const patchJournal = async (id, patch) => {
    const dbPatch = {};
    if (patch.adminComment !== undefined) dbPatch.admin_comment = patch.adminComment;
    if (patch.adminCommentAt !== undefined) dbPatch.admin_comment_at = patch.adminCommentAt;
    if (patch.adminSeen !== undefined) dbPatch.admin_seen = patch.adminSeen;
    await sb("journals?id=eq." + id, { method: "PATCH", prefer: "return=minimal", body: dbPatch });
    setJournals(prev => prev.map(j => j.id === id ? { ...j, ...patch } : j));
  };

  const login = async (email, pass, setMsg) => {
    const u = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === pass);
    if (!u) { setMsg("Incorrect email or password."); return; }
    setMe(u);
    setScreen(u.status === "approved" ? "portal" : u.status === "declined" ? "declined" : "pending");
  };

  const register = async (name, email, pass, setMsg) => {
    if (!name || !email || !pass) { setMsg("All fields are required."); return; }
    if (users.find(u => u.email.toLowerCase() === email.toLowerCase())) { setMsg("An account with this email already exists."); return; }
    const u = { id: uid(), name, email, password: pass, status: "pending", levels: [], createdAt: Date.now() };
    await addUser(u); setMe(u); setScreen("pending");
  };

  const logout = () => { setMe(null); setScreen("login"); };

  useEffect(() => {
    if (me && screen === "pending") {
      const u = users.find(u => u.id === me.id);
      if (u?.status === "approved") setScreen("portal");
      if (u?.status === "declined") setScreen("declined");
    }
  }, [users]);

  if (loading) return (
    <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
      <style>{GS}</style>
      <Logo w={140} />
      <div style={{ width:40, height:40, border:"3px solid " + C.border, borderTop:"3px solid " + C.gold, borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
      <p style={{ color:C.grey, fontSize:13, letterSpacing:".1em" }}>Loading portal...</p>
    </div>
  );

  return (
    <>
      <style>{GS}</style>
      {screen === "login"     && <LoginScreen onLogin={login} onRegister={register} onAdmin={() => setScreen("adminAuth")} />}
      {screen === "adminAuth" && <AdminAuthScreen onBack={() => setScreen("login")} onEnter={() => setScreen("admin")} />}
      {screen === "admin"     && <AdminPanel users={users} patchUser={patchUser} deleteUser={deleteUserDB} courses={courses} addCourse={addCourseDB} patchCourse={patchCourse} deleteCourse={deleteCourseDB} sections={sections} addSection={addSectionDB} patchSection={patchSectionDB} deleteSection={deleteSectionDB} videos={videos} addVideo={addVideoDB} deleteVideo={deleteVideoDB} journals={journals} patchJournal={patchJournal} onLogout={logout} loadAll={loadAll} />}
      {screen === "portal"    && me && <Portal user={me} courses={courses} sections={sections} videos={videos} journals={journals} addJournal={addJournalDB} deleteJournal={deleteJournalDB} comments={comments} addComment={addCommentDB} deleteComment={deleteCommentDB} onLogout={logout} />}
      {screen === "pending"   && me && <StatusScreen icon="⏳" title="Pending Approval" color={C.gold} onLogout={logout} msg={`Hi ${me.name}, your registration is under review. You'll be granted access once the admin approves your account.`} />}
      {screen === "declined"  && <StatusScreen icon="✕" title="Access Declined" color={C.red} onLogout={logout} msg="Your access request has been declined. Please contact the administrator for assistance." />}
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
