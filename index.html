const STORAGE_BUCKET = "journal-images";

// dataURL -> Blob
const dataUrlToBlob = (dataUrl) => {
  const [head, b64] = dataUrl.split(",");
  const mime = (head.match(/:(.*?);/) || [])[1] || "image/jpeg";
  const bin = atob(b64); const len = bin.length; const arr = new Uint8Array(len);
  for (let i = 0; i < len; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
};

// Upload a compressed dataURL to Supabase Storage; resolve to the public URL.
// On any failure, falls back to the original dataURL so a save never silently loses an image.
const uploadDataUrl = async (dataUrl) => {
  try {
    const blob = dataUrlToBlob(dataUrl);
    const path = new Date().getFullYear() + "/" + Date.now() + "-" + uid() + ".jpg";
    const r = await fetch(STORAGE_URL + "/storage/v1/object/" + STORAGE_BUCKET + "/" + path, {
      method: "POST",
      headers: { "apikey": STORAGE_KEY, "Authorization": "Bearer " + STORAGE_KEY, "Content-Type": "image/jpeg", "x-upsert": "false" },
      body: blob,
    });
    if (!r.ok) { console.error("Storage upload failed:", await r.text()); return dataUrl; }
    return STORAGE_URL + "/storage/v1/object/public/" + STORAGE_BUCKET + "/" + path;
  } catch (e) { console.error("Storage upload error:", e); return dataUrl; }
};

// Compress an image file to a JPEG dataURL (max 1400px, q0.72), upload it, and
// return the public URL via callback. Shared by journal + homework uploads.
const compressAndUpload = (file, cb) => {
  const r = new FileReader();
  r.onload = ev => {
    const img = new Image();
    img.onload = async () => {
      const canvas = document.createElement("canvas");
      const MAX = 1400; let w = img.width, h = img.height;
      if (w > MAX) { h = h * MAX / w; w = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.72);
      const url = await uploadDataUrl(dataUrl);
      cb(url);
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(file);
};

const Logo = ({ w, h, onClick }) => (
  <img
    src={LOGO_SRC}
    onClick={onClick}
    alt="TA Forex Institute"
    style={{
      width: w || "auto",
      height: h || "auto",
      maxHeight: (!h && !w) ? 56 : undefined,
      objectFit: "contain",
      objectPosition: "left center",
      display: "block",
      cursor: onClick ? "pointer" : "default",
      flexShrink: 0,
    }}
  />
);

/* ── GOLD RULE ───────────────────────────────────────────────────────────── */
const Rule = () => <div style={{ height: 1, background: `linear-gradient(90deg,transparent,${C.gold},transparent)` }} />;

/* ── BUTTON ──────────────────────────────────────────────────────────────── */
const Btn = ({ children, onClick, v = "gold", sz = "md", style, disabled, full }) => {
  const bases = { borderRadius: 10, fontWeight: 600, letterSpacing: ".03em", display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8, transition: "all .18s", whiteSpace: "nowrap", opacity: disabled ? .45 : 1, cursor: disabled ? "not-allowed" : "pointer", ...(full && { width: "100%" }) };
  const szs = { sm: { fontSize: 12, padding: "7px 14px" }, md: { fontSize: 13, padding: "11px 20px" }, lg: { fontSize: 15, padding: "14px 30px" } };
  const vs = {
    gold:    { background: `linear-gradient(135deg,${C.goldLt},${C.gold})`, color: "#08090E", boxShadow: `0 6px 24px rgba(201,168,76,.28)` },
    outline: { background: "transparent", color: C.gold, border: `1.5px solid rgba(201,168,76,.45)` },
    ghost:   { background: "transparent", color: C.grey },
    danger:  { background: "transparent", color: C.red, border: `1.5px solid rgba(217,96,96,.3)` },
    navy:    { background: "#FFFFFF", color: C.white, border: `1.5px solid ${C.border}` },
  };
  return <button onClick={!disabled ? onClick : undefined} style={{ ...bases, ...szs[sz], ...vs[v], ...style }}>{children}</button>;
};

/* ── CARD ────────────────────────────────────────────────────────────────── */
const Card = ({ children, style, onClick, hover }) => (
  <div
    onClick={onClick}
    style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 14, transition: "background .2s, border-color .2s", cursor: onClick ? "pointer" : undefined, ...style }}
    onMouseEnter={e => { if (hover) { e.currentTarget.style.background = C.cardHov; e.currentTarget.style.borderColor = C.borderH; } }}
    onMouseLeave={e => { if (hover) { e.currentTarget.style.background = C.card; e.currentTarget.style.borderColor = C.border; } }}
  >
    {children}
  </div>
);

const Badge = ({ status }) => {
  const m = { approved: [C.green, "#081A0E"], pending: [C.gold, "#1A1200"], declined: [C.red, "#1A0808"] };
  const [col, bg] = m[status] || [C.grey, C.card];
  return <span style={{ background: bg, color: col, border: `1px solid ${col}30`, padding: "3px 11px", borderRadius: 20, fontSize: 10, fontWeight: 700, letterSpacing: ".09em", textTransform: "uppercase" }}>{status}</span>;
};

const Divider = () => <div style={{ height: 1, background: C.border, margin: "20px 0" }} />;

/* ── VIDEO DETECTION ─────────────────────────────────────────────────────── */
function detect(url) {
  if (!url) return null;
  const u = url.trim();
  // Handle any HTML that contains an iframe (e.g. Bunny wraps iframe in a <div>)
  if (u.startsWith("<") && u.includes("<iframe")) {
    const m = u.match(/src=["']([^"']+)["']/i);
    return m ? { type: "iframe", src: m[1], platform: "bunny" } : null;
  }
  if (u.startsWith("<iframe") || u.startsWith("<IFRAME")) {
    const m = u.match(/src=["']([^"']+)["']/i);
    return m ? { type: "iframe", src: m[1], platform: "bunny" } : null;
  }
  if (u.includes("mediadelivery.net") || u.includes("bunnycdn.com") || u.includes("b-cdn.net"))
    return { type: "iframe", src: u, platform: "bunny" };
  if (u.includes("drive.google.com")) {
    // Extract file ID and always build a clean /preview URL
    const m = u.match(/\/d\/([a-zA-Z0-9_-]+)/);
    const src = m ? "https://drive.google.com/file/d/" + m[1] + "/preview" : u;
    return { type: "iframe", src, platform: "drive" };
  }
  if (u.includes("youtube.com") || u.includes("youtu.be"))
    return { type: "ext", src: u, platform: "youtube", label: "YouTube" };
  if (u.includes("vimeo.com"))
    return { type: "ext", src: u, platform: "vimeo", label: "Vimeo" };
  if (u.includes("zoom.us") || u.includes("zoom.com"))
    return { type: "ext", src: u, platform: "zoom", label: "Zoom" };
  if (/\.(mp4|webm|mov|m4v)(\?.*)?$/i.test(u))
    return { type: "native", src: u, platform: "file" };
  return { type: "iframe", src: u, platform: "embed" };
}

function CastButton({ url, title }) {
  const [status, setStatus] = React.useState("idle");
  const [tip, setTip] = React.useState(false);
  const [castAvailable, setCastAvailable] = React.useState(false);

  React.useEffect(() => {
    // Check if Cast API is available (Chromecast)
    const checkCast = () => {
      if (window.chrome && window.chrome.cast) setCastAvailable(true);
    };
    window.__onGCastApiAvailable = (isAvailable) => { if (isAvailable) setCastAvailable(true); };
    const script = document.createElement("script");
    script.src = "https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1";
    script.onload = checkCast;
    document.head.appendChild(script);
    // Also check AirPlay
    const vid = document.createElement("video");
    if (vid.webkitShowPlaybackTargetPicker) setCastAvailable(true);
  }, []);

  const castToTV = async () => {
    const videoEls = Array.from(document.querySelectorAll("video"));
    // Try AirPlay (Safari/iOS)
    for (const v of videoEls) {
      if (v.webkitShowPlaybackTargetPicker) {
        v.webkitShowPlaybackTargetPicker();
        setStatus("casting");
        return;
      }
    }
    // Try Remote Playback API
    for (const v of videoEls) {
      if (v.remote && v.remote.state !== "disconnected") {
        try { await v.remote.prompt(); setStatus("casting"); return; } catch(e) {}
      }
    }
    // Try Picture-in-Picture
    for (const v of videoEls) {
      if (document.pictureInPictureEnabled && !v.disablePictureInPicture) {
        try { await v.requestPictureInPicture(); setStatus("pip"); v.addEventListener("leavepictureinpicture", () => setStatus("idle"), { once: true }); return; } catch(e) {}
      }
    }
    setTip(true);
    setTimeout(() => setTip(false), 6000);
  };

  return (
<div style={{ position: "relative", display: "inline-block" }}>
    <button onClick={castToTV} title="Cast to TV" style={{
      display: "inline-flex", alignItems: "center", gap: 7,
      background: (status !== "idle") ? C.goldDim : "rgba(255,255,255,.06)",
      color: (status !== "idle") ? C.gold : C.grey,
      border: "1px solid " + ((status !== "idle") ? C.gold + "50" : "rgba(255,255,255,.1)"),
      borderRadius: 8, padding: "8px 16px", fontSize: 12, fontWeight: 600,
      cursor: "pointer", transition: "all .2s", letterSpacing: ".03em"
    }}>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"/>
        <path d="M2 12a9 9 0 0 1 8 8"/>
        <path d="M2 16a5 5 0 0 1 4 4"/>
        <line x1="2" y1="20" x2="2.01" y2="20"/>
      </svg>
      {status === "pip" ? "▶ Pop Out" : status === "casting" ? "Casting..." : "🖥 Cast to TV"}
    </button>
    {tip && (
      <div style={{ position: "absolute", bottom: "calc(100% + 8px)", right: 0, background: C.card, border: "1px solid " + C.border, borderRadius: 10, padding: "12px 14px", width: 260, zIndex: 100, fontSize: 12, color: C.dim, lineHeight: 1.7 }}>
        <strong style={{ color: C.white, display: "block", marginBottom: 4 }}>How to cast to your TV:</strong>
        📱 <strong>iPhone/iPad:</strong> Tap the AirPlay icon in your browser<br/>
        🤖 <strong>Android:</strong> Tap ⋮ menu → Cast<br/>
        💻 <strong>Chrome:</strong> Click ⋮ → Cast…<br/>
        📺 <strong>Samsung TV:</strong> Use Smart View / Screen Mirror
        <div style={{ position: "absolute", bottom: -6, right: 20, width: 10, height: 10, background: C.card, border: "1px solid " + C.border, transform: "rotate(45deg)", borderTop: "none", borderLeft: "none" }} />
      </div>
    )}
  </div>
  );
}

  const [dragSec, setDragSec] = React.useState(null);
  const [dragOverSec, setDragOverSec] = React.useState(null);

  const doAddCourse = () => { if (!cT.trim()) return; addCourse({ id: uid(), title: cT.trim(), desc: cD.trim(), createdAt: Date.now() }); setCT(""); setCD(""); };
  const doAddSec = (isFolder=false, parentId=null, title=null, courseId=null) => {
    const t = title || sT.trim();
    const cid = courseId || sC;
    if (!t || !cid) return;
    addSection({ id: uid(), courseId: cid, title: t, isFolder, parentId });
    if (!title) setST("");
    setAddingSubTo(null); setSubTitle("");
  };
  const saveCourseEdit = () => { if (editCourse && editCourseTitle.trim()) { patchCourse(editCourse, { title: editCourseTitle.trim() }); setEditCourse(null); } };
  const saveSectionEdit = () => { if (editSection && editSectionTitle.trim()) { patchSection(editSection, { title: editSectionTitle.trim() }); setEditSection(null); } };

  const handleSecDrop = (courseId, droppedOnId) => {
    if (!dragSec || dragSec === droppedOnId) return;
    const cs = sections.filter(s => s.courseId === courseId)
      .map((s, i) => ({ ...s, _idx: i }))
      .sort((a,b) => {
        const ao = a.sortOrder != null ? a.sortOrder : a._idx * 10000;
        const bo = b.sortOrder != null ? b.sortOrder : b._idx * 10000;
        return ao - bo;
      });
    const from = cs.findIndex(s => s.id === dragSec);
    const to = cs.findIndex(s => s.id === droppedOnId);
    if (from === -1 || to === -1) return;
    const reordered = [...cs];
    const [moved] = reordered.splice(from, 1);
    reordered.splice(to, 0, moved);
    reordered.forEach((s, i) => patchSection(s.id, { sort_order: i + 1 }));
    setDragSec(null); setDragOverSec(null);
  };

  return (
    <div style={{ display: "grid", gap: 20 }}>
      <Card style={{ padding: 24 }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.gold, textTransform: "uppercase", marginBottom: 16 }}>+ New Course</div>
        <div style={{ display: "grid", gap: 14 }}>
          <div><label>Course Title</label><input value={cT} onChange={e => setCT(e.target.value)} placeholder="e.g. Advanced Trading Masterclass" /></div>
          <div><label>Short Description</label><input value={cD} onChange={e => setCD(e.target.value)} placeholder="What students will learn…" /></div>
          <Btn onClick={doAddCourse} style={{ justifySelf: "start" }}>Create Course</Btn>
        </div>
      </Card>
      <Card style={{ padding: 24 }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.gold, textTransform: "uppercase", marginBottom: 16 }}>+ Add Section / Phase</div>
        <div style={{ display: "grid", gap: 14 }}>
          <div><label>Course</label><select value={sC} onChange={e => setSC(e.target.value)}><option value="">Select course…</option>{courses.map(c => <option key={c.id} value={c.id}>{c.title}</option>)}</select></div>
          <div><label>Section Title</label><input value={sT} onChange={e => setST(e.target.value)} placeholder="e.g. Phase One – Core Concepts" /></div>
          <div style={{display:"flex",gap:8}}><Btn onClick={()=>doAddSec(false)} disabled={!sC || !sT.trim()}>+ Section</Btn><Btn onClick={()=>doAddSec(true)} disabled={!sC || !sT.trim()} v="outline">📁 Add Folder</Btn></div>
        </div>
      </Card>
      {courses.map(c => {
        const cs = sections.filter(s => s.courseId === c.id).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
        return (
          <Card key={c.id} style={{ padding: 24 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: cs.length ? 16 : 0 }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                {editCourse === c.id
                  ? <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <input value={editCourseTitle} onChange={e => setEditCourseTitle(e.target.value)} style={{ flex: 1, padding: "8px 12px", borderRadius: 8 }} onKeyDown={e => e.key === "Enter" && saveCourseEdit()} autoFocus />
                      <Btn onClick={saveCourseEdit} sz="sm">Save</Btn>
                      <Btn v="outline" onClick={() => setEditCourse(null)} sz="sm">Cancel</Btn>
                    </div>
                  : <div style={{ fontFamily: S, fontSize: 20, fontWeight: 700 }}>{c.title}</div>
                }
                {c.desc && <div style={{ fontSize: 12, color: C.grey, marginTop: 3 }}>{c.desc}</div>}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <Btn v="outline" onClick={() => { setEditCourse(c.id); setEditCourseTitle(c.title); }} sz="sm">Edit</Btn>
                <Btn v="danger" onClick={() => deleteCourse(c.id)} sz="sm">Delete</Btn>
              </div>
            </div>
            {cs.length === 0 && <p style={{ color: C.faint, fontSize: 12, marginTop: 8 }}>No sections yet.</p>}
            {cs.length > 0 && <div style={{ fontSize: 11, color: C.faint, marginBottom: 8, letterSpacing: ".05em" }}>DRAG TO REORDER SECTIONS</div>}
            {(() => {
              // Top-level sections (no parent) and folders (is_folder, no parent)
              const topLevel = cs.filter(s => !s.parentId);
              return topLevel.map(s => {
                const subfolders = cs.filter(sub => sub.parentId === s.id);
                const isTopFolder = s.isFolder;
                return (
                  <div key={s.id} style={{ marginBottom: 8 }}>
                    {/* Section / Top-level folder row */}
                    <div
                      draggable
                      onDragStart={() => setDragSec(s.id)}
                      onDragOver={e => { e.preventDefault(); setDragOverSec(s.id); }}
                      onDragLeave={() => setDragOverSec(null)}
                      onDrop={() => handleSecDrop(c.id, s.id)}
                      onDragEnd={() => { setDragSec(null); setDragOverSec(null); }}
                      style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 14px", borderRadius:9,
                        background: isTopFolder ? C.goldDim : (dragOverSec===s.id ? C.goldDim : C.bg),
                        border:"1px solid "+(isTopFolder ? C.gold+"50" : dragOverSec===s.id ? C.gold : C.border),
                        opacity: dragSec===s.id ? 0.5 : 1, cursor:"grab", gap:8 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, flex:1, minWidth:0 }}>
                        <span style={{ color:C.faint, fontSize:16, cursor:"grab", flexShrink:0 }}>⠿</span>
                        <span style={{ fontSize:14 }}>{isTopFolder ? "📁" : "📂"}</span>
                        {editSection === s.id
                          ? <div style={{ display:"flex", gap:8, alignItems:"center", flex:1 }}>
                              <input value={editSectionTitle} onChange={e=>setEditSectionTitle(e.target.value)} style={{ flex:1, padding:"6px 10px", borderRadius:7, fontSize:13 }} onKeyDown={e=>e.key==="Enter"&&saveSectionEdit()} autoFocus />
                              <Btn onClick={saveSectionEdit} sz="sm">Save</Btn>
                              <Btn v="outline" onClick={()=>setEditSection(null)} sz="sm">Cancel</Btn>
                            </div>
                          : <div style={{ fontWeight: isTopFolder ? 600 : 500, fontSize:14, color: isTopFolder ? C.gold : C.white, flex:1 }}>{s.title}</div>
                        }
                      </div>
                      {editSection !== s.id && <div style={{ display:"flex", gap:5, flexShrink:0 }}>
                        {!isTopFolder && (addingSubTo === s.id
                          ? <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                              <input
                                autoFocus
                                value={subTitle}
                                onChange={e => setSubTitle(e.target.value)}
                                placeholder="e.g. May 2026"
                                onKeyDown={e => { if(e.key==="Enter") doAddSec(true, s.id, subTitle, s.courseId); if(e.key==="Escape") { setAddingSubTo(null); setSubTitle(""); } }}
                                style={{ padding:"5px 10px", borderRadius:7, fontSize:13, width:130 }} />
                              <Btn sz="sm" onClick={() => doAddSec(true, s.id, subTitle, s.courseId)} disabled={!subTitle.trim()}>Add</Btn>
                              <Btn v="outline" sz="sm" onClick={() => { setAddingSubTo(null); setSubTitle(""); }}>✕</Btn>
                            </div>
                          : <Btn v="outline" sz="sm" onClick={() => { setAddingSubTo(s.id); setSubTitle(""); }}>📁+ Sub</Btn>
                        )}
                        <Btn v="outline" onClick={()=>{ setEditSection(s.id); setEditSectionTitle(s.title); }} sz="sm">Edit</Btn>
                        <Btn v="danger" onClick={()=>deleteSection(s.id)} sz="sm">Delete</Btn>
                      </div>}
                    </div>

                    {/* Subfolders inside this section */}
                    {subfolders.length > 0 && (
                      <div style={{ marginLeft:24, marginTop:4, display:"flex", flexDirection:"column", gap:4 }}>
                        {subfolders.map(sub => (
                          <div key={sub.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 12px", borderRadius:8,
                            background:C.card, border:"1px solid "+C.border, gap:8 }}>
                            <div style={{ display:"flex", alignItems:"center", gap:8, flex:1, minWidth:0 }}>
                              <span style={{ fontSize:13 }}>📁</span>
                              {editSection === sub.id
                                ? <div style={{ display:"flex", gap:8, alignItems:"center", flex:1 }}>
                                    <input value={editSectionTitle} onChange={e=>setEditSectionTitle(e.target.value)} style={{ flex:1, padding:"5px 9px", borderRadius:7, fontSize:13 }} onKeyDown={e=>e.key==="Enter"&&saveSectionEdit()} autoFocus />
                                    <Btn onClick={saveSectionEdit} sz="sm">Save</Btn>
                                    <Btn v="outline" onClick={()=>setEditSection(null)} sz="sm">Cancel</Btn>
                                  </div>
                                : <div style={{ fontSize:13, color:C.dim }}>{sub.title}</div>
                              }
                            </div>
                            {editSection !== sub.id && <div style={{ display:"flex", gap:5, flexShrink:0 }}>
                              <Btn v="outline" onClick={()=>{ setEditSection(sub.id); setEditSectionTitle(sub.title); }} sz="sm">Edit</Btn>
                              <Btn v="danger" onClick={()=>deleteSection(sub.id)} sz="sm">Delete</Btn>
                            </div>}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              });
            })()}
          </Card>
        );
      })}
    </div>
  );
}

function VideosTab({ courses, sections, videos, addVideo, deleteVideo, patchVideo }) {
  const [vT, setVT] = React.useState("");
  const [vU, setVU] = React.useState("");
  const [vD, setVD] = React.useState("");
  const [vC, setVC] = React.useState("");
  const [vS, setVS] = React.useState("");
  const [vErr, setVErr] = React.useState("");
  const [dragVid, setDragVid] = React.useState(null);
  const [dragOverVid, setDragOverVid] = React.useState(null);
  const [dragOverSec, setDragOverSec] = React.useState(null);
  // Bunny.net import
  const [bunnyList, setBunnyList] = React.useState(null); // null=not loaded, []=loaded empty
  const [bunnyLoading, setBunnyLoading] = React.useState(false);
  const [bunnyErr, setBunnyErr] = React.useState("");
  const [bunnySearch, setBunnySearch] = React.useState("");

  const loadBunny = async () => {
    setBunnyLoading(true); setBunnyErr("");
    try {
      const r = await fetch("/api/bunny-videos");
      if (!r.ok) {
        const t = await r.text();
        throw new Error(r.status === 404 ? "Bunny import isn't set up on the server yet (see setup notes)." : (t || ("Error " + r.status)));
      }
      const data = await r.json();
      setBunnyList(Array.isArray(data.videos) ? data.videos : []);
    } catch (e) {
      setBunnyErr(e.message || "Could not reach Bunny. Check the server setup.");
      setBunnyList(null);
    } finally { setBunnyLoading(false); }
  };

  const pickBunny = (bv) => {
    // Fill the form from a chosen Bunny video: embed URL + title.
    // Always overwrite the title so switching videos updates it too.
    setVU(bv.embedUrl);
    setVT(bv.title || "");
    setBunnyErr(""); 
    if (typeof window !== "undefined") window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const fSecs = sections.filter(s => s.courseId === vC);
  const detected = vU.trim() ? detect(vU) : null;

  const addVid = () => {
    if (!vT.trim() || !vU.trim() || !vC || !vS) { setVErr("All fields are required."); return; }
    addVideo({ id: uid(), courseId: vC, sectionId: vS, title: vT.trim(), url: vU.trim(), desc: vD.trim(), createdAt: Date.now() });
    setVT(""); setVU(""); setVD(""); setVErr("");
  };

  const orderedInSection = (sectionId) => videos.filter(v => v.sectionId === sectionId)
    .map((v, i) => ({ ...v, _idx: i }))
    .sort((a,b) => {
      const ao = a.sortOrder != null ? a.sortOrder : a._idx * 10000;
      const bo = b.sortOrder != null ? b.sortOrder : b._idx * 10000;
      return ao - bo;
    });

  // Drop a video ONTO another video. Handles both reordering within a section
  // and moving into a different section (inserted at the target's position).
  const handleVidDrop = (targetSectionId, droppedOnId) => {
    if (!dragVid || dragVid === droppedOnId) { setDragVid(null); setDragOverVid(null); setDragOverSec(null); return; }
    const moving = videos.find(v => v.id === dragVid);
    if (!moving) return;
    const sameSection = moving.sectionId === targetSectionId;

    if (sameSection) {
      const sv = orderedInSection(targetSectionId);
      const from = sv.findIndex(v => v.id === dragVid);
      const to = sv.findIndex(v => v.id === droppedOnId);
      if (from === -1 || to === -1) return;
      const reordered = [...sv];
      const [m] = reordered.splice(from, 1);
      reordered.splice(to, 0, m);
      reordered.forEach((v, i) => patchVideo(v.id, { sort_order: i + 1 }));
    } else {
      // Moving into a different section: insert at the target video's position.
      const target = orderedInSection(targetSectionId).filter(v => v.id !== dragVid);
      const to = target.findIndex(v => v.id === droppedOnId);
      const reordered = [...target];
      reordered.splice(to === -1 ? reordered.length : to, 0, { ...moving });
      // Re-parent the moved video, then renumber the whole target section.
      const course = sections.find(s => s.id === targetSectionId)?.courseId;
      reordered.forEach((v, i) => patchVideo(v.id, v.id===dragVid ? { sectionId: targetSectionId, courseId: course, sort_order: i + 1 } : { sort_order: i + 1 }));
    }
    setDragVid(null); setDragOverVid(null); setDragOverSec(null);
  };

  // Drop a video onto a SECTION header/empty area → append to end of that section.
  const handleSectionDrop = (targetSectionId) => {
    if (!dragVid) { setDragOverSec(null); return; }
    const moving = videos.find(v => v.id === dragVid);
    if (!moving) { setDragOverSec(null); return; }
    if (moving.sectionId === targetSectionId) { setDragOverSec(null); setDragVid(null); return; }
    const target = orderedInSection(targetSectionId).filter(v => v.id !== dragVid);
    const course = sections.find(s => s.id === targetSectionId)?.courseId;
    [...target, { ...moving }].forEach((v, i) => patchVideo(v.id, v.id===dragVid ? { sectionId: targetSectionId, courseId: course, sort_order: i + 1 } : { sort_order: i + 1 }));
    setDragVid(null); setDragOverVid(null); setDragOverSec(null);
  };

  // Tap-based reordering (works on mobile, where drag-and-drop does not).
  const moveVid = (sectionId, vidId, dir) => {
    const sv = orderedInSection(sectionId);
    const idx = sv.findIndex(v => v.id === vidId);
    const swap = idx + dir;
    if (idx === -1 || swap < 0 || swap >= sv.length) return;
    const reordered = [...sv];
    [reordered[idx], reordered[swap]] = [reordered[swap], reordered[idx]];
    reordered.forEach((v, i) => patchVideo(v.id, { sort_order: i + 1 }));
  };
  // Move a video to a different section (mobile-friendly, appends to end).
  const moveVidToSection = (vidId, targetSectionId) => {
    const moving = videos.find(v => v.id === vidId);
    if (!moving || !targetSectionId || moving.sectionId === targetSectionId) return;
    const target = orderedInSection(targetSectionId).filter(v => v.id !== vidId);
    const course = sections.find(s => s.id === targetSectionId)?.courseId;
    [...target, { ...moving }].forEach((v, i) => patchVideo(v.id, v.id===vidId ? { sectionId: targetSectionId, courseId: course, sort_order: i + 1 } : { sort_order: i + 1 }));
  };

  return (
    <div>
      <Card style={{ padding: 24, marginBottom: 28 }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.gold, textTransform: "uppercase", marginBottom: 16 }}>+ Add Video Lesson</div>
        <div style={{ display: "grid", gap: 14 }}>
          <div><label>Course</label><select value={vC} onChange={e => { setVC(e.target.value); setVS(""); }}><option value="">Select course</option>{courses.map(c => <option key={c.id} value={c.id}>{c.title}</option>)}</select></div>
          <div><label>Section</label><select value={vS} onChange={e => setVS(e.target.value)} disabled={!vC}><option value="">Select section</option>{fSecs.map(s => <option key={s.id} value={s.id}>{s.title}</option>)}</select></div>
          <div><label>Lesson Title</label><input value={vT} onChange={e => setVT(e.target.value)} placeholder="e.g. Market Structure Explained" /></div>
          <div>
            <label>Video URL or Embed Code</label>
            <textarea value={vU} onChange={e => setVU(e.target.value)} placeholder="Paste Bunny.net embed, Google Drive link, .mp4 URL, YouTube or Zoom link"
              style={{ height: 100, resize: "vertical", background: "#FFFFFF", border: "1.5px solid " + C.border, borderRadius: 10, padding: "12px 14px", color: C.white, width: "100%", outline: "none", fontFamily: D, fontSize: 13, lineHeight: 1.6 }} />
            {detected && (
              <div style={{ marginTop: 6, padding: "7px 12px", borderRadius: 8, fontSize: 12, background: (detected.type === "iframe" || detected.type === "native") ? "#081A0E" : "#0A1020", color: (detected.type === "iframe" || detected.type === "native") ? C.green : C.gold, border: "1px solid " + ((detected.type === "iframe" || detected.type === "native") ? C.green + "40" : C.gold + "40") }}>
                {(detected.type === "iframe" || detected.type === "native") ? "Will play directly inside the portal" : "Will open in " + detected.label}
              </div>
            )}
          </div>
          <div><label>Description (optional)</label><input value={vD} onChange={e => setVD(e.target.value)} placeholder="Brief summary" /></div>
          {vErr && <div style={{ color: C.red, fontSize: 12 }}>{vErr}</div>}
          <Btn onClick={addVid} style={{ justifySelf: "start" }}>Add Video</Btn>

          {/* ── Import from Bunny.net ── */}
          <div style={{ marginTop: 8, paddingTop: 16, borderTop: "1px solid " + C.border }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, flexWrap: "wrap" }}>
              <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.gold, textTransform: "uppercase" }}>🐰 Import from Bunny.net</div>
              <button onClick={loadBunny} disabled={bunnyLoading}
                style={{ background: "transparent", color: bunnyLoading ? C.faint : C.gold, border: "1px solid " + (bunnyLoading ? C.faint : C.gold) + "60", borderRadius: 8, padding: "6px 14px", fontSize: 11, fontWeight: 700, cursor: bunnyLoading ? "default" : "pointer" }}>
                {bunnyLoading ? "Loading…" : bunnyList ? "↻ Refresh list" : "Load my Bunny videos"}
              </button>
            </div>
            <div style={{ fontSize: 11, color: C.grey, marginTop: 6 }}>Click a video below to auto-fill the URL and title above, then pick its course/section and hit Add Video.</div>
            {bunnyErr && <div style={{ color: C.red, fontSize: 12, marginTop: 8 }}>{bunnyErr}</div>}
            {bunnyList && bunnyList.length > 0 && (
              <div style={{ marginTop: 10 }}>
                <input value={bunnySearch} onChange={e => setBunnySearch(e.target.value)} placeholder="Filter videos…"
                  style={{ width: "100%", maxWidth: 320, padding: "8px 12px", borderRadius: 8, border: "1.5px solid " + C.border, background: "#FFFFFF", color: C.white, fontSize: 13, outline: "none", marginBottom: 10 }} />
                <div style={{ maxHeight: 320, overflowY: "auto", display: "grid", gap: 6 }}>
                  {bunnyList.filter(bv => !bunnySearch.trim() || (bv.title||"").toLowerCase().includes(bunnySearch.trim().toLowerCase())).map(bv => {
                    const already = videos.some(v => (v.url||"").includes(bv.guid));
                    return (
                      <div key={bv.guid} onClick={() => pickBunny(bv)}
                        style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", borderRadius: 9, border: "1px solid " + C.border, background: C.card, cursor: "pointer" }}
                        onMouseEnter={e => e.currentTarget.style.borderColor = C.gold}
                        onMouseLeave={e => e.currentTarget.style.borderColor = C.border}>
                        {bv.thumbnail
                          ? <img src={bv.thumbnail} alt="" style={{ width: 72, height: 40, objectFit: "cover", borderRadius: 5, flexShrink: 0, background: C.bg }} />
                          : <div style={{ width: 72, height: 40, borderRadius: 5, background: C.bg, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>🎬</div>}
                        <div style={{ minWidth: 0, flex: 1 }}>
                          <div style={{ fontSize: 13, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{bv.title || "Untitled"}</div>
                          <div style={{ fontSize: 10, color: C.faint }}>{bv.length ? Math.floor(bv.length/60) + "m " + (bv.length%60) + "s" : ""}{bv.status !== undefined && bv.status < 4 ? " · still processing" : ""}</div>
                        </div>
                        {already
                          ? <span style={{ fontSize: 10, color: C.faint, flexShrink: 0 }}>added</span>
                          : <span style={{ fontSize: 11, color: C.gold, fontWeight: 700, flexShrink: 0 }}>Use →</span>}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
            {bunnyList && bunnyList.length === 0 && !bunnyErr && <div style={{ fontSize: 12, color: C.grey, marginTop: 8 }}>No videos found in your Bunny library.</div>}
          </div>
        </div>
      </Card>
      {courses.map(course => {
        const courseSecs = sections.filter(s => s.courseId === course.id).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
        const courseVids = videos.filter(v => v.courseId === course.id);
        if (!courseVids.length && !courseSecs.length) return null;
        return (
          <div key={course.id} style={{ marginBottom: 28 }}>
            <div style={{ fontFamily: S, fontSize: 18, color: C.gold, marginBottom: 4, fontWeight: 700 }}>{course.title}</div>
            <div style={{ fontSize: 10, color: C.faint, marginBottom: 12, letterSpacing: ".05em" }}>USE ▲▼ OR DRAG TO REORDER · USE "MOVE TO…" (OR DRAG ONTO A SECTION NAME) TO MOVE BETWEEN SECTIONS</div>
            {courseSecs.map(sec => {
              const sv = orderedInSection(sec.id);
              const isSecDropTarget = dragOverSec === sec.id && dragVid && videos.find(v=>v.id===dragVid)?.sectionId !== sec.id;
              return (
                <div key={sec.id} style={{ marginBottom: 16 }}
                  onDragOver={e => { if (dragVid) { e.preventDefault(); setDragOverSec(sec.id); } }}
                  onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOverSec(s => s===sec.id?null:s); }}
                  onDrop={() => handleSectionDrop(sec.id)}>
                  <div
                    style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".1em", color: isSecDropTarget ? C.gold : C.grey, textTransform: "uppercase", marginBottom: 6,
                      padding: isSecDropTarget ? "8px 12px" : "4px 0", borderRadius: 8,
                      border: isSecDropTarget ? "2px dashed "+C.gold : "2px dashed transparent",

                      <div style={{ minWidth: 120, flex: 1 }}>

                      </div>
                      {/* Move to another section — works on mobile */}
                      {otherSecs.length > 0 && (
                        <select value="" onChange={e => { if (e.target.value) moveVidToSection(vid.id, e.target.value); }}

function RiskCalculator() {
  const [accountType, setAccountType] = React.useState("HFM"); // HFM | Funded
  const [instrument, setInstrument] = React.useState("NAS/US30");
  const [accountSize, setAccountSize] = React.useState("10000");
  const [usdZar, setUsdZar] = React.useState("18.50");
  const [rateLoading, setRateLoading] = React.useState(true);
  const [rateError, setRateError] = React.useState(false);

  React.useEffect(() => {
    const fetchRate = async () => {
      setRateLoading(true);
      try {
        // Use exchangerate-api (free, no key needed for basic)
        const res = await fetch("https://open.er-api.com/v6/latest/USD");
        const data = await res.json();
        if (data && data.rates && data.rates.ZAR) {
          setUsdZar(data.rates.ZAR.toFixed(2));
          setRateError(false);
        } else {
          setRateError(true);
        }
      } catch(e) {
        // Fallback to another free API
        try {
          const res2 = await fetch("https://api.frankfurter.app/latest?from=USD&to=ZAR");
          const data2 = await res2.json();
          if (data2 && data2.rates && data2.rates.ZAR) {
            setUsdZar(data2.rates.ZAR.toFixed(2));
            setRateError(false);
          } else { setRateError(true); }
        } catch { setRateError(true); }
      }
      setRateLoading(false);
    };
    fetchRate();
  }, []);

  // Risk inputs
  const [riskPips, setRiskPips] = React.useState("");
  const [riskLots, setRiskLots] = React.useState("");

  // Profit inputs
  const [profitPips, setProfitPips] = React.useState("");
  const [profitLots, setProfitLots] = React.useState("");

  const INSTRUMENTS = {
    "NAS/US30":  { multiplier: 1,   label: "NAS / US30",  pip: "index points", color: "#6B9FFF", icon: "📊" },
    "Gold":      { multiplier: 100, label: "Gold (XAUUSD)", pip: "pips",        color: "#E6C86A", icon: "🥇" },
    "Currency":  { multiplier: 1,   label: "Currency Pairs", pip: "pips",       color: "#4CB880", icon: "💱", isCurrency: true },
  };

  const inst = INSTRUMENTS[instrument];
  const acc  = parseFloat(accountSize) || 0;
  const rate = parseFloat(usdZar)      || 18.5;
  const rP   = parseFloat(riskPips)    || 0;
  const rL   = parseFloat(riskLots)    || 0;
  const prP  = parseFloat(profitPips)  || 0;
  const prL  = parseFloat(profitLots)  || 0;

  // Calculations — Currency pairs: risk = pips * lots * 10 (per standard lot = $10/pip)
  const isFunded = accountType === "Funded";
  const riskUSD  = inst.isCurrency ? rP * rL : rP * rL * inst.multiplier;
  const riskZAR  = riskUSD * rate;
  const riskAmt  = isFunded ? riskUSD : riskZAR;
  const riskPct  = acc > 0 ? (riskAmt / acc) * 100 : 0;
  const accAfterSL = acc - riskAmt;

  const profitUSD = inst.isCurrency ? prP * prL : prP * prL * inst.multiplier;
  const profitZAR = profitUSD * rate;
  const profitAmt = isFunded ? profitUSD : profitZAR;
  const profitPct = acc > 0 ? (profitAmt / acc) * 100 : 0;
  const accAfterTP = acc + profitAmt;

  const rrRatio = riskZAR > 0 ? (profitZAR / riskZAR).toFixed(2) : "—";
  const riskColor = accountType === "HFM"
    ? (riskPct > 10 ? C.red : riskPct > 5 ? C.gold : C.green)
    : (riskPct > 1.5 ? C.red : riskPct > 1 ? C.gold : C.green);

  const fmt = (n, decimals = 2) => n.toLocaleString("en-ZA", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  return (
    <div style={{ maxWidth: window.__tafxLayout==="wide" ? "100%" : 820, margin: "0 auto", padding: window.__tafxLayout==="wide" ? "28px 60px 80px" : "28px 16px 80px" }}>

        <h2 style={{ fontFamily: S, fontSize: 28, fontWeight: 700, marginBottom: 6 }}>Risk Calculator</h2>
        <p style={{ color: C.grey, fontSize: 14 }}>Calculate your risk and reward before entering a trade.</p>
      </div>

      {/* Account Type Toggle */}
      <div style={{ marginBottom: 20 }}>
        <label style={{ marginBottom: 10, display: "block" }}>Account Type</label>
        <div style={{ display: "flex", background: C.bg, borderRadius: 12, padding: 4, gap: 4, border: "1px solid " + C.border, maxWidth: 360 }}>
          {[
            { key: "HFM", label: "🏦 HFM Account", color: "#6B9FFF", limit: "Max 10% risk" },
            { key: "Funded", label: "🏆 Funded Account", color: C.gold, limit: "Max 1.5% risk" },
          ].map(t => (
            <button key={t.key} onClick={() => setAccountType(t.key)} style={{

        </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
        {Object.entries(INSTRUMENTS).map(([key, val]) => (
          <button key={key} onClick={() => setInstrument(key)} style={{
            flex: 1, minWidth: 120, padding: "12px 16px", borderRadius: 12, fontSize: 13, fontWeight: 700, cursor: "pointer", transition: "all .2s", border: "1.5px solid",

          {riskUSD > 0 && (

              <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 14px", background: C.bg, borderRadius: 9, border: "1px solid " + C.border }}>
                <span style={{ fontSize: 12, color: C.grey }}>Risk (USD)</span>

          {accountType === "HFM" && riskPct > 5 && riskPct <= 10 && <div style={{ marginTop: 14, padding: "10px 16px", background: "rgba(201,168,76,.1)", border: "1px solid " + C.gold + "40", borderRadius: 9, fontSize: 13, color: C.gold, textAlign: "center" }}>⚡ Risk is above 5% — be cautious with your HFM account.</div>}
          {accountType === "Funded" && riskPct > 1.5 && <div style={{ marginTop: 14, padding: "10px 16px", background: "rgba(217,96,96,.12)", border: "1px solid " + C.red + "40", borderRadius: 9, fontSize: 13, color: C.red, textAlign: "center" }}>🚨 DANGER — Over 1.5% risk on a funded account. You risk breaching your drawdown rules.</div>}
          {accountType === "Funded" && riskPct > 1 && riskPct <= 1.5 && <div style={{ marginTop: 14, padding: "10px 16px", background: "rgba(201,168,76,.1)", border: "1px solid " + C.gold + "40", borderRadius: 9, fontSize: 13, color: C.gold, textAlign: "center" }}>⚡ Approaching 1.5% funded account risk limit. Consider reducing size.</div>}
          {parseFloat(rrRatio) > 0 && parseFloat(rrRatio) < 1.5 && <div style={{ marginTop: 10, padding: "10px 16px", background: "rgba(201,168,76,.1)", border: "1px solid " + C.gold + "40", borderRadius: 9, fontSize: 13, color: C.gold, textAlign: "center" }}>⚡ Risk:Reward is below 1:1.5. Look for a better setup.</div>}

function CoursesPanel({ user, courses, sections, videos, onSelectCourse }) {

  return (

        </div>

                borderRadius: 12, padding: "22px 24px", cursor: "pointer",
                display: "flex", alignItems: "center", gap: 20,
                transition: "all .2s", transform: isHov ? "translateX(4px)" : "none" }}>
              <div style={{ width: 2, height: 40, background: isHov ? C.gold : C.border, borderRadius: 1, flexShrink: 0, transition: "background .2s" }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 16, fontWeight: 600, color: C.white, marginBottom: 5, letterSpacing: "-.01em" }}>{c.title}</div>
                {c.desc && <div style={{ fontSize: 13, color: C.grey, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.desc}</div>}
                <div style={{ display: "flex", gap: 16, marginTop: 8, fontSize: 12, color: C.faint }}>
                  <span>{sects} section{sects !== 1 ? "s" : ""}</span>
                  <span>·</span>
                  <span>{total} lesson{total !== 1 ? "s" : ""}</span>

              <span style={{ color: isHov ? C.gold : C.faint, fontSize: 18, transition: "color .2s" }}>→</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}


function Portal({ layout, toggleLayout, user, courses, sections, videos, comments, addComment, deleteComment, homework, hwSubmits, addHwSubmit, reviews, addReviewDB, weeklyPrompts, trackWatch, toggleWatched, onLogout }) {

  const [showReview, setShowReview] = React.useState(false);

  const toggleComplete = (videoId) => { const n = { ...completed, [videoId]: !completed[videoId] }; setCompleted(n); try { localStorage.setItem("tafx_completed_" + user.id, JSON.stringify(n)); } catch {} };
  const userLevels = user.levels || [];
  const hasPM = userLevels.includes("Private Mentorship");

  const pendingHW = homework.filter(h => {
    const due = h.dueDate ? new Date(h.dueDate + "T" + (h.dueTime||"23:59") + ":00").getTime() : null;
    const submitted = hwSubmits.some(s => s.homeworkId === h.id && s.userId === user.id);
    return (user.levels||[]).includes("Private Mentorship") && !submitted && due && due > Date.now();
  });
  const overdueHW = homework.filter(h => {
    const due = h.dueDate ? new Date(h.dueDate + "T" + (h.dueTime||"23:59") + ":00").getTime() : null;
    const submitted = hwSubmits.some(s => s.homeworkId === h.id && s.userId === user.id);
    return (user.levels||[]).includes("Private Mentorship") && !submitted && due && due < Date.now();
  });

          {/* Nav links */}

                            textDecoration: completed[v.id] && !active ? "line-through" : "none",
                            opacity: completed[v.id] && !active ? 0.5 : 1 }}>{v.title}</span>
                          {!active && (
                            <div onClick={e => { e.stopPropagation(); toggleComplete(v.id); }}
                              style={{ width: 16, height: 16, borderRadius: 4, flexShrink: 0, cursor: "pointer",
                                border: "1.5px solid " + (completed[v.id] ? C.green : C.faint),
                                background: completed[v.id] ? C.green : "transparent",
                                display: "flex", alignItems: "center", justifyContent: "center" }}>
                              {completed[v.id] && <span style={{ color: "#fff", fontSize: 9, fontWeight: 900 }}>✓</span>}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      })()}
    </div>
  );
}



/* ── VIDEO COMMENTS / Q&A ───────────────────────────────────────────────── */
function VideoComments({ videoId, videoTitle, user, comments, addComment, deleteComment }) {
  const [text, setText] = React.useState("");
  const [timestamp, setTimestamp] = React.useState("");
  const [replyTo, setReplyTo] = React.useState(null);
  const [replyText, setReplyText] = React.useState("");
  const [activeTab, setActiveTab] = React.useState("all"); // all | timestamped
  const [saving, setSaving] = React.useState(false);

  const videoComments = comments.filter(c => c.videoId === videoId && !c.parentId)
    .sort((a, b) => a.createdAt - b.createdAt);

  const getReplies = (parentId) => comments.filter(c => c.videoId === videoId && c.parentId === parentId)
    .sort((a, b) => a.createdAt - b.createdAt);

  const submit = async () => {
    if (!text.trim()) return;
    setSaving(true);
    await addComment({ id: uid(), videoId, userId: user.id, userName: user.name, text: text.trim(), parentId: null, isAdmin: false, timestamp: timestamp.trim() || null, createdAt: Date.now() });
    setText(""); setTimestamp(""); setSaving(false);
  };

  const submitReply = async () => {
    if (!replyText.trim() || !replyTo) return;
    setSaving(true);
    await addComment({ id: uid(), videoId, userId: user.id, userName: user.name, text: replyText.trim(), parentId: replyTo.id, isAdmin: false, createdAt: Date.now() });
    setReplyText(""); setReplyTo(null); setSaving(false);
  };

  const timeAgo = (ts) => {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return "just now";
    if (s < 3600) return Math.floor(s/60) + "m ago";
    if (s < 86400) return Math.floor(s/3600) + "h ago";
    return Math.floor(s/86400) + "d ago";
  };

  const Avatar = ({ name, isAdmin, size = 36 }) => (
    <div style={{ width: size, height: size, borderRadius: "50%", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: size * .38,
      background: isAdmin ? `linear-gradient(135deg,${C.goldLt},${C.gold})` : `linear-gradient(135deg,${C.goldLt},${C.gold})`,
      color: isAdmin ? "#08090E" : C.white, border: isAdmin ? "none" : "1px solid " + C.border }}>
      {name.charAt(0).toUpperCase()}
    </div>
  );

  return (
    <div style={{ margin: "36px 20px 0", borderTop: "1px solid " + C.border, paddingTop: 28 }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 24 }}>
        <div style={{ fontSize: 18 }}>💬</div>
        <div>
          <h3 style={{ fontFamily: S, fontSize: 18, fontWeight: 700, color: C.white }}>Questions & Discussion</h3>
          <p style={{ fontSize: 12, color: C.grey, marginTop: 2 }}>{videoComments.length} question{videoComments.length !== 1 ? "s" : ""} · Ask anything about this lesson</p>
        </div>
      </div>

      {/* Post a question */}
      <div style={{ display: "flex", gap: 12, marginBottom: 28 }}>
        <Avatar name={user.name} isAdmin={false} />
        <div style={{ flex: 1 }}>
          <textarea value={text} onChange={e => setText(e.target.value)}
            placeholder={"Ask a question or share your thoughts about this lesson…"}
            style={{ width: "100%", background: "#FFFFFF", border: "1.5px solid " + C.border, borderRadius: 10, padding: "12px 14px", color: C.white, fontFamily: D, fontSize: 13, lineHeight: 1.6, resize: "vertical", minHeight: 72, outline: "none" }}
            onFocus={e => e.target.style.borderColor = C.gold}
            onBlur={e => e.target.style.borderColor = C.border}
          />
          <div style={{ display: "flex", gap: 8, marginTop: 6, alignItems: "center" }}>
            <input value={timestamp} onChange={e => setTimestamp(e.target.value)} placeholder="Timestamp (e.g. 2:45)" style={{ width: 120, padding: "7px 10px", borderRadius: 8, fontSize: 12, flexShrink: 0 }} />
            <span style={{ fontSize: 11, color: C.faint }}>optional</span>
          </div>
          {text.trim() && (
            <div style={{ display: "flex", gap: 8, marginTop: 8, justifyContent: "flex-end" }}>
              <button onClick={() => setText("")} style={{ background: "transparent", color: C.grey, border: "1px solid " + C.border, borderRadius: 8, padding: "7px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Cancel</button>
              <Btn onClick={submit} disabled={saving} sz="sm">{saving ? "Posting..." : "Post Question"}</Btn>
            </div>
          )}
        </div>
      </div>

      {/* Tab selector */}
      <div style={{ display: "flex", gap: 4, marginBottom: 20, background: C.bg, borderRadius: 9, padding: 3 }}>
        {[["all", "All Comments"], ["timestamped", "⏱ Timestamped"]].map(([k, l]) => (
          <button key={k} onClick={() => setActiveTab(k)} style={{ flex: 1, padding: "7px 0", borderRadius: 7, fontSize: 12, fontWeight: 700, background: activeTab === k ? C.goldDim : "transparent", color: activeTab === k ? C.gold : C.grey, border: "none", cursor: "pointer" }}>{l}</button>
        ))}
      </div>

      {/* Comments list */}
      {videoComments.filter(c => activeTab === "timestamped" ? c.timestamp : true).length === 0 && (
        <div style={{ textAlign: "center", padding: "32px 0", color: C.faint, fontSize: 13 }}>
          No questions yet. Be the first to ask!
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
        {videoComments.filter(c => activeTab === "timestamped" ? c.timestamp : true).map(c => {
          const replies = getReplies(c.id);
          const isOwn = c.userId === user.id;
          return (
            <div key={c.id}>
              {/* Main comment */}
              <div style={{ display: "flex", gap: 12 }}>
                <Avatar name={c.userName} isAdmin={c.isAdmin} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5, flexWrap: "wrap" }}>
                    <span style={{ fontWeight: 700, fontSize: 14, color: c.isAdmin ? C.gold : C.white }}>{c.userName}</span>
                    {c.isAdmin && <span style={{ fontSize: 10, background: C.goldDim, color: C.gold, border: "1px solid " + C.gold + "40", padding: "2px 8px", borderRadius: 20, fontWeight: 700, letterSpacing: ".06em" }}>COACH</span>}
                    <span style={{ fontSize: 11, color: C.faint }}>{timeAgo(c.createdAt)}</span>
                    {c.timestamp && <span style={{ fontSize: 11, background: C.goldDim, color: C.gold, border: "1px solid " + C.gold + "40", padding: "1px 8px", borderRadius: 20, fontWeight: 700, cursor: "pointer" }}>⏱ {c.timestamp}</span>}
                  </div>
                  <p style={{ fontSize: 14, color: C.dim, lineHeight: 1.75, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{c.text}</p>
                  <div style={{ display: "flex", gap: 12, marginTop: 8 }}>
                    <button onClick={() => { setReplyTo(c); setReplyText(""); }}
                      style={{ background: "transparent", color: C.grey, border: "none", fontSize: 12, fontWeight: 600, cursor: "pointer", padding: 0, letterSpacing: ".03em" }}>
                      ↩ Reply
                    </button>
                    {isOwn && <button onClick={() => deleteComment(c.id)}
                      style={{ background: "transparent", color: C.faint, border: "none", fontSize: 12, cursor: "pointer", padding: 0 }}>Delete</button>}
                  </div>

                  {/* Reply box */}
                  {replyTo?.id === c.id && (
                    <div style={{ marginTop: 12, display: "flex", gap: 10 }}>
                      <Avatar name={user.name} isAdmin={false} size={28} />
                      <div style={{ flex: 1 }}>
                        <textarea value={replyText} onChange={e => setReplyText(e.target.value)}
                          placeholder={"Reply to " + c.userName + "…"}
                          autoFocus
                          style={{ width: "100%", background: "#FFFFFF", border: "1.5px solid " + C.gold, borderRadius: 9, padding: "10px 12px", color: C.white, fontFamily: D, fontSize: 13, lineHeight: 1.5, resize: "vertical", minHeight: 56, outline: "none" }}
                        />
                        <div style={{ display: "flex", gap: 8, marginTop: 6, justifyContent: "flex-end" }}>
                          <button onClick={() => { setReplyTo(null); setReplyText(""); }} style={{ background: "transparent", color: C.grey, border: "1px solid " + C.border, borderRadius: 8, padding: "6px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Cancel</button>
                          <Btn onClick={submitReply} disabled={saving || !replyText.trim()} sz="sm">{saving ? "..." : "Reply"}</Btn>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Replies */}
                  {replies.length > 0 && (
                    <div style={{ marginTop: 14, paddingLeft: 16, borderLeft: "2px solid " + C.border, display: "flex", flexDirection: "column", gap: 14 }}>
                      {replies.map(r => (
                        <div key={r.id} style={{ display: "flex", gap: 10 }}>
                          <Avatar name={r.userName} isAdmin={r.isAdmin} size={28} />
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                              <span style={{ fontWeight: 700, fontSize: 13, color: r.isAdmin ? C.gold : C.white }}>{r.userName}</span>
                              {r.isAdmin && <span style={{ fontSize: 10, background: C.goldDim, color: C.gold, border: "1px solid " + C.gold + "40", padding: "2px 8px", borderRadius: 20, fontWeight: 700 }}>COACH</span>}
                              <span style={{ fontSize: 11, color: C.faint }}>{timeAgo(r.createdAt)}</span>
                            </div>
                            <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.7, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{r.text}</p>
                            {(r.userId === user.id) && (
                              <button onClick={() => deleteComment(r.id)} style={{ background: "transparent", color: C.faint, border: "none", fontSize: 11, cursor: "pointer", padding: 0, marginTop: 4 }}>Delete</button>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── STUDENT HOMEWORK ───────────────────────────────────────────────────── */
function StudentHomework({ user, homework, hwSubmits = [], addHwSubmit }) {
  const [selected, setSelected] = React.useState(null);
  const [text, setText] = React.useState("");
  const [images, setImages] = React.useState([]);
  const [uploading, setUploading] = React.useState(0);
  const [saving, setSaving] = React.useState(false);
  const [err, setErr] = React.useState("");

  const mySubmissions = (hwSubmits||[]).filter(s => s.userId === user.id);
  const hasSubmitted = (hwId) => mySubmissions.some(s => s.homeworkId === hwId);
  const getSubmission = (hwId) => mySubmissions.find(s => s.homeworkId === hwId);

  const submit = async (hw) => {
    if (!text.trim()) { setErr("Please write your answer before submitting."); return; }
    if (uploading > 0) { setErr("Please wait for images to finish uploading."); return; }
    setSaving(true);
    await addHwSubmit({ id: uid(), homeworkId: hw.id, userId: user.id, userName: user.name, text: text.trim(), image: (images&&images.length)?images[0]:null, images: images||[], createdAt: Date.now() });
    setText(""); setImages([]); setErr(""); setSelected(null); setSaving(false);
  };

  const compressImage = (file, cb) => compressAndUpload(file, cb);

  return (
    <div style={{ maxWidth: window.__tafxLayout==="wide" ? "100%" : 720, margin: "0 auto", padding: window.__tafxLayout==="wide" ? "28px 48px 80px" : "28px 16px 80px" }}>
      <div style={{ marginBottom: 24 }}>
        <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".25em", color: "#FF7096", textTransform: "uppercase", marginBottom: 6 }}>Private Mentorship</p>
        <h2 style={{ fontFamily: S, fontSize: 26, fontWeight: 700 }}>📚 Homework</h2>
        <p style={{ color: C.grey, fontSize: 13, marginTop: 4 }}>Complete your assigned homework before the due date.</p>
      </div>

      {homework.length === 0 && (
        <div style={{ textAlign: "center", padding: "60px 0", color: C.grey }}>
          <div style={{ fontSize: 48, opacity: .3, marginBottom: 12 }}>📝</div>
          <p>No homework assigned yet. Check back soon.</p>
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        {homework.map(hw => {
          const submitted = hasSubmitted(hw.id);
          const sub = getSubmission(hw.id);
          const isOverdue = hw.dueDate && new Date(hw.dueDate + "T" + (hw.dueTime||"23:59") + ":00") < new Date() && !submitted;
          const isOpen = selected === hw.id;
          return (
            <div key={hw.id} style={{ background: C.card, border: "1.5px solid " + (submitted ? C.green + "40" : isOverdue ? C.red + "40" : C.border), borderRadius: 14, overflow: "hidden" }}>
              <div onClick={() => setSelected(isOpen ? null : hw.id)} style={{ padding: "18px 20px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: S, fontSize: 17, fontWeight: 700, color: C.white, marginBottom: 4 }}>{hw.title}</div>
                  {hw.dueDate && <div style={{ fontSize: 12, color: isOverdue ? C.red : C.grey }}>Due: {new Date(hw.dueDate + "T" + (hw.dueTime||"23:59") + ":00").toLocaleString("en-ZA", { weekday:"long", day:"numeric", month:"long", year:"numeric", hour:"2-digit", minute:"2-digit" })}</div>}
                </div>
                <div style={{ flexShrink: 0 }}>
                  {submitted
                    ? <span style={{ background: C.green + "20", color: C.green, border: "1px solid " + C.green + "40", padding: "4px 12px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>✓ Submitted</span>
                    : isOverdue
                    ? <span style={{ background: C.red + "20", color: C.red, border: "1px solid " + C.red + "40", padding: "4px 12px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>Overdue</span>
                    : <span style={{ background: "#FF709620", color: "#FF7096", border: "1px solid #FF709640", padding: "4px 12px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>Pending</span>
                  }
                </div>
              </div>

              {isOpen && (
                <div style={{ padding: "0 20px 20px", borderTop: "1px solid " + C.border }}>
                  <p style={{ fontSize: 14, color: C.dim, lineHeight: 1.8, padding: "16px 0" }}>{hw.description}</p>

                  {submitted && sub ? (
                    <div>
                      <div style={{ background: C.bg, border: "1px solid " + C.border, borderRadius: 10, padding: "14px 16px", marginBottom: 12 }}>
                        <div style={{ fontSize: 11, color: C.grey, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 8 }}>Your Submission</div>
                        <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.7 }}>{sub.text}</p>
                        {(() => { const imgs = (sub.images&&sub.images.length)?sub.images:(sub.image?[sub.image]:[]); return imgs.length>0 && (
                          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))", gap:8, marginTop:10 }}>
                            {imgs.map((im,i) => <img key={i} src={im} alt={"submission "+(i+1)} style={{ width:"100%", borderRadius:8, border:"1px solid "+C.border, display:"block" }} />)}
                          </div>
                        ); })()}
                      </div>
                      {sub.adminFeedback && (
                        <div style={{ background: "rgba(201,168,76,.06)", border: "1px solid rgba(201,168,76,.25)", borderRadius: 10, padding: "14px 16px" }}>
                          <div style={{ fontSize: 11, fontWeight: 700, color: C.gold, marginBottom: 6 }}>💬 Coach Taaha — Feedback</div>
                          <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.7 }}>{sub.adminFeedback}</p>
                        </div>
                      )}
                    </div>
                  ) : !isOverdue ? (
                    <div>
                      <label>Your Answer</label>
                      <textarea value={text} onChange={e => setText(e.target.value)} placeholder="Write your homework answer here..."
                        style={{ width: "100%", height: 120, background: "#FFFFFF", border: "1.5px solid " + C.border, borderRadius: 10, padding: "12px 14px", color: C.white, fontFamily: D, fontSize: 13, lineHeight: 1.6, resize: "vertical", outline: "none", marginBottom: 10 }} />
                      <div style={{ marginBottom: 12 }}>
                        <label>Attach Images (optional)</label>
                        <div onClick={() => document.getElementById("hw-img-" + hw.id).click()}
                          style={{ border: "2px dashed " + (images.length ? C.gold : C.border), borderRadius: 10, padding: "14px", textAlign: "center", cursor: "pointer", background: "#FFFFFF" }}>
                          <input id={"hw-img-" + hw.id} type="file" accept="image/*" multiple style={{ display: "none" }}
                            onChange={e => { const files = Array.from(e.target.files); setUploading(n => n + files.length); files.forEach(f => compressImage(f, im => { setImages(prev => [...(prev||[]), im]); setUploading(n => Math.max(0, n-1)); })); e.target.value = ""; }} />
                          {images.length > 0
                            ? <div><div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))", gap:8, marginBottom:8 }}>{images.map((im,i) => <div key={i} style={{ position:"relative" }}><img src={im} alt="" style={{ width:"100%", borderRadius:6, display:"block" }} /><button onClick={e => { e.stopPropagation(); setImages(prev => prev.filter((_,idx) => idx!==i)); }} style={{ position:"absolute", top:4, right:4, background:C.red, color:"#fff", border:"none", borderRadius:"50%", width:20, height:20, fontSize:12, cursor:"pointer", lineHeight:1 }}>×</button></div>)}</div><span style={{ color:C.grey, fontSize:12 }}>{uploading>0 ? "Uploading "+uploading+"…" : "Click to add more"}</span></div>
                            : <span style={{ color: C.grey, fontSize: 13 }}>{uploading>0 ? "Uploading "+uploading+" image"+(uploading!==1?"s":"")+"…" : "📸 Click to add photos (you can select multiple)"}</span>
                          }
                        </div>
                      </div>
                      {err && <div style={{ color: C.red, fontSize: 12, marginBottom: 8 }}>{err}</div>}
                      <Btn onClick={() => submit(hw)} disabled={saving || uploading>0} full>{uploading>0 ? "Waiting for uploads…" : saving ? "Submitting..." : "Submit Homework"}</Btn>
                    </div>
                  ) : (
                    <div style={{ padding: "14px", background: C.red+"10", border: "1px solid "+C.red+"30", borderRadius: 10, color: C.red, fontSize: 13 }}>This homework is overdue and can no longer be submitted.</div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── ADMIN HOMEWORK TAB ─────────────────────────────────────────────────── */
function AdminHomeworkTab({ homework, addHomework, patchHomework, deleteHomework, hwSubmits, patchHwSubmit, users }) {
  const [title, setTitle] = React.useState("");
  const [desc, setDesc] = React.useState("");
  const [dueDate, setDueDate] = React.useState("");
  const [dueTime, setDueTime] = React.useState("23:59");
  const [editId, setEditId] = React.useState(null); // homework id being edited (null = creating new)
  const [selected, setSelected] = React.useState(null); // homework id to view submissions
  const [feedback, setFeedback] = React.useState("");
  const [feedbackSub, setFeedbackSub] = React.useState(null);

  const startEdit = (h) => {
    setEditId(h.id); setTitle(h.title); setDesc(h.description||"");
    setDueDate(h.dueDate||""); setDueTime(h.dueTime||"23:59");
    if (typeof window !== "undefined") window.scrollTo({ top: 0, behavior: "smooth" });
  };
  const cancelEdit = () => { setEditId(null); setTitle(""); setDesc(""); setDueDate(""); setDueTime("23:59"); };

  const doAdd = () => {
    if (!title.trim() || !desc.trim()) return;
    if (editId) {
      patchHomework(editId, { title: title.trim(), description: desc.trim(), dueDate: dueDate||null, dueTime: dueDate ? (dueTime||"23:59") : null });
    } else {
      addHomework({ id: uid(), title: title.trim(), description: desc.trim(), dueDate: dueDate||null, dueTime: dueDate ? (dueTime||"23:59") : null, createdAt: Date.now() });
    }
    cancelEdit();
  };

  const hw = selected ? homework.find(h => h.id === selected) : null;
  const subs = selected ? hwSubmits.filter(s => s.homeworkId === selected) : [];

  if (hw) return (
    <div>
      <button onClick={() => { setSelected(null); setFeedbackSub(null); setFeedback(""); }} style={{ background: "transparent", color: C.gold, fontSize: 13, fontWeight: 700, cursor: "pointer", border: "none", marginBottom: 20 }}>← Back to Homework</button>
      <h3 style={{ fontFamily: S, fontSize: 20, fontWeight: 700, marginBottom: 4 }}>{hw.title}</h3>
      <p style={{ fontSize: 13, color: C.grey, marginBottom: 20 }}>{subs.length} submission{subs.length !== 1 ? "s" : ""}</p>
      {subs.length === 0 && <p style={{ color: C.faint, fontSize: 13 }}>No submissions yet.</p>}
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {subs.map(s => {
          const uname = users.find(u => u.id === s.userId)?.name || s.userName;
          return (
            <div key={s.id} style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 12, padding: "18px 20px" }}>
              <div style={{ fontWeight: 700, color: C.gold, fontSize: 13, marginBottom: 4 }}>{uname}</div>
              <div style={{ fontSize: 11, color: C.grey, marginBottom: 10 }}>{new Date(s.createdAt).toLocaleDateString("en-ZA", { day:"numeric", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" })}</div>
              <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.7, marginBottom: 10 }}>{s.text}</p>
              {(() => { const imgs = (s.images&&s.images.length)?s.images:(s.image?[s.image]:[]); return imgs.length>0 && (
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 11, color: C.grey, marginBottom: 6 }}>{imgs.length} image{imgs.length!==1?"s":""} — click to zoom</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(160px,1fr))", gap: 8 }}>
                    {imgs.map((im,i) => (
                      <img key={i} src={im} alt={"submission "+(i+1)} style={{ width: "100%", maxHeight: 220, objectFit: "cover", borderRadius: 8, border: "1px solid " + C.border, cursor: "zoom-in", display: "block" }}
                        onClick={() => {
                          const ov = document.createElement("div");
                          ov.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.93);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;";
                          const el = document.createElement("img");

const LEVELS = ["Advanced", "Private Mentorship", "1v1", "Beginner", "Free"];
const LEVEL_COLORS = {
  "Advanced":           { bg: "rgba(41,98,255,.15)",  border: "rgba(41,98,255,.4)",  text: "#6B9FFF" },

function MembershipTab({ users, patchUser, courses, patchCourse, lastWatch }) {
  const [search, setSearch] = React.useState("");
  const approved = users.filter(u => u.status === "approved").filter(u => !search.trim() || u.name.toLowerCase().includes(search.toLowerCase()) || u.email.toLowerCase().includes(search.toLowerCase()));

  const toggleLevel = (userId, level) => {
    const u = users.find(x => x.id === userId);
    if (!u) return;
    const levels = u.levels || [];
    const newLevels = levels.includes(level) ? levels.filter(l => l !== level) : [...levels, level];
    patchUser(userId, { levels: newLevels });
  };

  const setCourseLevel = (courseId, level) => {
    patchCourse(courseId, { level: level || null });
  };

  return (
    <div style={{ display: "grid", gap: 24 }}>
      {/* Course level assignment */}
      <Card style={{ padding: 24 }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase", marginBottom: 6 }}>Course Access Levels</div>
        <p style={{ fontSize: 13, color: C.grey, marginBottom: 20, lineHeight: 1.6 }}>Assign a membership level to each course. Only students with that level can see and access it.</p>
        {courses.length === 0 && <p style={{ color: C.faint, fontSize: 13 }}>No courses yet.</p>}
        {courses.map(c => (
          <div key={c.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px", borderRadius: 10, background: C.bg, border: "1px solid " + C.border, marginBottom: 8, flexWrap: "wrap", gap: 12 }}>
            <div>
              <div style={{ fontFamily: S, fontSize: 16, fontWeight: 700, color: C.white }}>{c.title}</div>
              <div style={{ fontSize: 12, color: C.grey, marginTop: 2 }}>
                {c.level
                  ? <span style={{ background: LEVEL_COLORS[c.level]?.bg, color: LEVEL_COLORS[c.level]?.text, border: "1px solid " + LEVEL_COLORS[c.level]?.border, padding: "2px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>{c.level}</span>
                  : <span style={{ color: C.faint, fontSize: 11 }}>No level — visible to all approved members</span>}
              </div>
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {LEVELS.map(l => (
                <button key={l} onClick={() => setCourseLevel(c.id, c.level === l ? null : l)} style={{
                  padding: "6px 12px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                  background: c.level === l ? LEVEL_COLORS[l]?.bg : "transparent",
                  color: c.level === l ? LEVEL_COLORS[l]?.text : C.faint,
                  border: "1px solid " + (c.level === l ? LEVEL_COLORS[l]?.border : C.border),
                }}>{l}</button>
              ))}
              {c.level && <button onClick={() => setCourseLevel(c.id, null)} style={{ padding: "6px 10px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", background: "transparent", color: C.red, border: "1px solid " + C.red + "40" }}>✕ Remove</button>}
            </div>
          </div>
        ))}
      </Card>

      {/* Student level assignment */}
      <Card style={{ padding: 24 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10, marginBottom: 6 }}>
          <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase" }}>Student Memberships</div>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by name or email..." style={{ width: 220, padding: "8px 12px", borderRadius: 9, fontSize: 13 }} />
        </div>
        <p style={{ fontSize: 13, color: C.grey, marginBottom: 20, lineHeight: 1.6 }}>Toggle which membership levels each student has. A student can hold multiple levels.</p>
        {approved.length === 0 && <p style={{ color: C.faint, fontSize: 13 }}>No approved students yet.</p>}
        {approved.map(u => (
          <div key={u.id} style={{ padding: "16px", borderRadius: 12, background: C.bg, border: "1px solid " + C.border, marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10, marginBottom: 12 }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15, color: C.white }}>{u.name}</div>
                <div style={{ fontSize: 12, color: C.grey }}>{u.email}</div>
                <div style={{ display: "flex", gap: 16, marginTop: 4, flexWrap: "wrap" }}>
                  {lastWatch && lastWatch[u.id] && (() => { const [ts, vid] = lastWatch[u.id].split("|"); const d = new Date(ts); const valid = !isNaN(d.getTime()) && d.getFullYear() > 1971; return valid ? <span style={{ fontSize: 11, color: C.grey }}>▶ Last watched: <strong style={{ color: C.dim }}>{vid}</strong> · {d.toLocaleDateString("en-ZA")}</span> : null; })()}
                </div>
                {lastWatch[u.id] && (() => {
                  const [ts, vid] = lastWatch[u.id].split("|");
                  const d = new Date(ts); const valid = !isNaN(d.getTime()) && d.getFullYear() > 1971; return valid ? <div style={{ fontSize: 11, color: C.faint, marginTop: 2 }}>Last watched: <span style={{ color: C.gold }}>{vid}</span> — {d.toLocaleDateString("en-ZA", { day:"numeric", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" })}</div> : null;
                })()}
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {(u.levels || []).length === 0
                  ? <span style={{ fontSize: 11, color: C.faint }}>No levels assigned</span>
                  : (u.levels || []).map(l => (
                    <span key={l} style={{ background: LEVEL_COLORS[l]?.bg, color: LEVEL_COLORS[l]?.text, border: "1px solid " + LEVEL_COLORS[l]?.border, padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>{l}</span>
                  ))
                }
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {LEVELS.map(l => {
                const has = (u.levels || []).includes(l);
                return (
                  <button key={l} onClick={() => toggleLevel(u.id, l)} style={{
                    padding: "8px 16px", borderRadius: 9, fontSize: 12, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                    background: has ? LEVEL_COLORS[l]?.bg : C.card,
                    color: has ? LEVEL_COLORS[l]?.text : C.grey,
                    border: "1px solid " + (has ? LEVEL_COLORS[l]?.border : C.border),
                  }}>
                    {has ? "✓ " : "+ "}{l}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </Card>
    </div>
  );
}
