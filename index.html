/* ── PRE-TRADE CHECKLIST ─────────────────────────────────────────────────── */
const CHECKLIST_ITEMS = [
  { id: "setup", icon: "🎯", text: "My model setup has fully formed — I am not forcing it" },
  { id: "rr", icon: "⚖️", text: "My Risk:Reward is at least 1:2 before I enter" },
  { id: "levels", icon: "📍", text: "I have marked my entry, stop loss, and take profit BEFORE entering" },
  { id: "emotion", icon: "🧠", text: "I am NOT revenge trading, FOMO trading, or emotionally compromised" },
  { id: "session", icon: "🕐", text: "I am trading during the correct session for this setup" },
  { id: "news", icon: "📰", text: "I have checked the economic calendar — no major news in next 30 min" },
  { id: "size", icon: "💰", text: "My position size is within my risk rules (no over-leveraging)" },
  { id: "model", icon: "📘", text: "This is a valid model trade — not a random setup I invented" },
];

function PreTradeChecklist() {
  const [checked, setChecked] = React.useState({});
  const [submitted, setSubmitted] = React.useState(false);
  const [note, setNote] = React.useState("");
  const [history, setHistory] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("tafx_checklist_history") || "[]"); } catch { return []; }
  });

  const toggle = (id) => {
    if (submitted) return;
    setChecked(prev => ({ ...prev, [id]: !prev[id] }));
  };

  const allChecked = CHECKLIST_ITEMS.every(item => checked[item.id]);
  const checkedCount = Object.values(checked).filter(Boolean).length;
  const pct = Math.round((checkedCount / CHECKLIST_ITEMS.length) * 100);

  const submit = () => {
    if (!allChecked) return;
    const entry = { date: new Date().toISOString(), note: note.trim(), score: 100 };
    const newHistory = [entry, ...history].slice(0, 30);
    setHistory(newHistory);
    try { localStorage.setItem("tafx_checklist_history", JSON.stringify(newHistory)); } catch {}
    setSubmitted(true);
  };

  const reset = () => {
    setChecked({});
    setSubmitted(false);
    setNote("");
  };

  return (
    <div style={{ maxWidth: 700, margin: "0 auto", padding: "28px 16px 80px" }}>
      {/* Header */}
      <div style={{ marginBottom: 28 }}>
        <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".25em", color: C.gold, textTransform: "uppercase", marginBottom: 6 }}>Discipline First</p>
        <h2 style={{ fontFamily: S, fontSize: 28, fontWeight: 700, marginBottom: 6 }}>Pre-Trade Checklist</h2>
        <p style={{ color: C.grey, fontSize: 14 }}>Complete every check before you enter. No shortcuts. No exceptions.</p>
      </div>

      {submitted ? (
        <div style={{ textAlign: "center", padding: "40px 20px" }}>
          <div style={{ fontSize: 72, marginBottom: 16 }}>🟢</div>
          <h3 style={{ fontFamily: S, fontSize: 26, fontWeight: 700, color: C.green, marginBottom: 8 }}>You are clear to trade.</h3>
          <p style={{ color: C.grey, fontSize: 14, marginBottom: 24, lineHeight: 1.7 }}>All 8 checks passed. You have done the work. Now execute with confidence and trust your model.</p>
          <div style={{ background: "rgba(76,184,128,.08)", border: "1px solid rgba(76,184,128,.3)", borderRadius: 14, padding: "16px 20px", marginBottom: 24, maxWidth: 400, margin: "0 auto 24px" }}>
            <div style={{ fontSize: 11, color: C.grey, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 4 }}>Cleared at</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: C.green }}>{new Date().toLocaleTimeString("en-ZA", { hour: "2-digit", minute: "2-digit" })} — {new Date().toLocaleDateString("en-ZA", { weekday: "long", day: "numeric", month: "long" })}</div>
          </div>
          <Btn onClick={reset} v="outline">Run Checklist Again</Btn>
        </div>
      ) : (
        <div>
          {/* Progress bar */}
          <div style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 14, padding: "16px 20px", marginBottom: 24 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: C.white }}>{checkedCount}/{CHECKLIST_ITEMS.length} checks complete</span>
              <span style={{ fontFamily: S, fontSize: 22, fontWeight: 700, color: allChecked ? C.green : pct > 50 ? C.gold : C.grey }}>{pct}%</span>
            </div>
            <div style={{ height: 8, background: C.bg, borderRadius: 8, overflow: "hidden" }}>
              <div style={{ height: "100%", width: pct + "%", background: allChecked ? "linear-gradient(90deg,#2ecc71,#1a9e50)" : pct > 50 ? "linear-gradient(90deg," + C.goldLt + "," + C.gold + ")" : "linear-gradient(90deg,#6B9FFF,#3B6FFF)", borderRadius: 8, transition: "width .4s cubic-bezier(.22,1,.36,1)" }} />
            </div>
          </div>

          {/* Checklist items */}
          <div style={{ display: "grid", gap: 10, marginBottom: 24 }}>
            {CHECKLIST_ITEMS.map((item, i) => {
              const done = checked[item.id];
              return (
                <div key={item.id} onClick={() => toggle(item.id)}
                  style={{ display: "flex", gap: 14, alignItems: "center", padding: "16px 20px", background: done ? "rgba(76,184,128,.08)" : C.card,
                    border: "1.5px solid " + (done ? "rgba(76,184,128,.4)" : C.border), borderRadius: 14, cursor: "pointer",
                    transition: "all .2s", transform: done ? "translateX(4px)" : "translateX(0)" }}
                  onMouseEnter={e => { if (!done) e.currentTarget.style.borderColor = C.gold + "60"; }}
                  onMouseLeave={e => { if (!done) e.currentTarget.style.borderColor = C.border; }}>
                  <span style={{ fontSize: 22, flexShrink: 0 }}>{done ? "✅" : item.icon}</span>
                  <span style={{ fontSize: 13, color: done ? C.green : C.dim, lineHeight: 1.5, fontWeight: done ? 600 : 400, flex: 1, textDecoration: done ? "line-through" : "none", textDecorationColor: "rgba(76,184,128,.4)" }}>{item.text}</span>
                  <div style={{ width: 24, height: 24, borderRadius: "50%", border: "2px solid " + (done ? C.green : C.border), background: done ? C.green : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all .2s" }}>
                    {done && <span style={{ color: "#fff", fontSize: 13, fontWeight: 700 }}>✓</span>}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Optional note */}
          <div style={{ marginBottom: 20 }}>
            <label>Setup notes (optional)</label>
            <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="Describe your setup briefly before you enter... what do you see? Why is this valid?"
              style={{ height: 80, resize: "vertical", background: "#FFFFFF", border: "1.5px solid " + C.border, borderRadius: 10, padding: "12px 14px", color: C.white, width: "100%", outline: "none", fontFamily: D, fontSize: 13, lineHeight: 1.6 }} />
          </div>

          {!allChecked && (
            <div style={{ padding: "12px 16px", background: "rgba(217,96,96,.08)", border: "1px solid rgba(217,96,96,.25)", borderRadius: 10, fontSize: 13, color: C.red, marginBottom: 16 }}>
              ⚠️ Complete all {CHECKLIST_ITEMS.length} checks before you can proceed to trade.
            </div>
          )}

          <Btn onClick={submit} disabled={!allChecked} full sz="lg" style={{ background: allChecked ? "linear-gradient(135deg,#2ecc71,#1a9e50)" : undefined, color: allChecked ? "#fff" : undefined }}>
            {allChecked ? "✅ I am ready — clear to trade" : `Complete all checks (${CHECKLIST_ITEMS.length - checkedCount} remaining)`}
          </Btn>
        </div>
      )}

      {/* History */}
      {history.length > 0 && (
        <div style={{ marginTop: 40, borderTop: "1px solid " + C.border, paddingTop: 28 }}>
          <h4 style={{ fontFamily: S, fontSize: 16, fontWeight: 700, marginBottom: 16 }}>Recent Checklist History</h4>
          <div style={{ display: "grid", gap: 8 }}>
            {history.slice(0, 5).map((h, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 16px", background: C.card, borderRadius: 10, border: "1px solid " + C.border }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: C.green }}>✅ All checks passed</div>
                  {h.note && <div style={{ fontSize: 11, color: C.grey, marginTop: 2 }}>{h.note.slice(0, 60)}{h.note.length > 60 ? "…" : ""}</div>}
                </div>
                <div style={{ fontSize: 11, color: C.faint }}>{new Date(h.date).toLocaleDateString("en-ZA", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── WEEKLY REVIEW ───────────────────────────────────────────────────────── */
function WeeklyReview({ user, reviews, addReview, weeklyPrompts }) {
  const [view, setView] = React.useState("list");
  const [answers, setAnswers] = React.useState({});
  const [saving, setSaving] = React.useState(false);
  const [err, setErr] = React.useState("");

  const myReviews = (reviews || []).filter(r => r.userId === user.id).sort((a,b) => b.createdAt - a.createdAt);
  const activePrompts = (weeklyPrompts || []).filter(p => p.active !== false);

  const getWeekLabel = () => {
    const now = new Date();
    const day = now.getDay();
    const monday = new Date(now);
    monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
    return monday.toLocaleDateString("en-ZA", { day: "numeric", month: "long" }) + " week";
  };

  const submit = async () => {
    const required = activePrompts.filter(p => p.required !== false);
    const missing = required.find(p => !answers[p.id]?.trim());
    if (missing) { setErr("Please answer all required questions."); return; }
    setSaving(true);
    await addReview({ id: uid(), userId: user.id, userName: user.name, answers, weekLabel: getWeekLabel(), createdAt: Date.now(), coachFeedback: null });
    setAnswers({});
    setSaving(false);
    setErr("");
    setView("list");
  };

  if (view === "new") return (
    <div style={{ maxWidth: 700, margin: "0 auto", padding: "28px 16px 80px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 28 }}>
        <button onClick={() => setView("list")} style={{ background: "transparent", color: C.gold, fontSize: 13, fontWeight: 700, cursor: "pointer", border: "none" }}>← Back</button>
        <div>
          <h2 style={{ fontFamily: S, fontSize: 24, fontWeight: 700 }}>Weekly Review</h2>
          <p style={{ fontSize: 12, color: C.grey, marginTop: 2 }}>{getWeekLabel()}</p>
        </div>
      </div>
      {activePrompts.length === 0 && <p style={{ color: C.grey, textAlign: "center", padding: "40px 0" }}>No review prompts set yet. Coach Taaha will add them soon.</p>}
      <div style={{ display: "grid", gap: 20 }}>
        {activePrompts.map((p, i) => (
          <div key={p.id} style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 14, padding: "20px 22px" }}>
            <div style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 12 }}>
              <span style={{ background: C.goldDim, color: C.gold, width: 28, height: 28, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>{i + 1}</span>
              <div>
                <p style={{ fontSize: 14, fontWeight: 600, color: C.white, lineHeight: 1.5 }}>{p.question}</p>
                {p.required === false && <span style={{ fontSize: 10, color: C.faint }}>Optional</span>}
              </div>
            </div>
            <textarea value={answers[p.id] || ""} onChange={e => setAnswers(prev => ({ ...prev, [p.id]: e.target.value }))}
              placeholder="Be honest with yourself..."
              style={{ height: 100, resize: "vertical", background: "#FFFFFF", border: "1.5px solid " + (answers[p.id]?.trim() ? C.gold + "50" : C.border), borderRadius: 10, padding: "12px 14px", color: C.white, width: "100%", outline: "none", fontFamily: D, fontSize: 13, lineHeight: 1.6 }} />
          </div>
        ))}
      </div>
      {err && <div style={{ color: C.red, fontSize: 12, marginTop: 12, textAlign: "center" }}>{err}</div>}
      {activePrompts.length > 0 && <Btn onClick={submit} disabled={saving} full sz="lg" style={{ marginTop: 20 }}>{saving ? "Submitting..." : "Submit Weekly Review"}</Btn>}
    </div>
  );

  return (
    <div style={{ maxWidth: 700, margin: "0 auto", padding: "28px 16px 80px" }}>
      <div style={{ marginBottom: 24 }}>
        <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".25em", color: C.gold, textTransform: "uppercase", marginBottom: 6 }}>Growth Mindset</p>
        <h2 style={{ fontFamily: S, fontSize: 28, fontWeight: 700, marginBottom: 6 }}>Weekly Review</h2>
        <p style={{ color: C.grey, fontSize: 14 }}>Reflect. Learn. Improve. The traders who review are the traders who grow.</p>
      </div>
      <div style={{ background: "linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04))", border: "1px solid " + C.gold + "40", borderRadius: 16, padding: "20px 24px", marginBottom: 24, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
        <div>
          <div style={{ fontFamily: S, fontSize: 16, fontWeight: 700, marginBottom: 4 }}>Current week: {getWeekLabel()}</div>
          <div style={{ fontSize: 13, color: C.grey }}>Complete your review before Sunday midnight</div>
        </div>
        <Btn onClick={() => setView("new")} disabled={activePrompts.length === 0}>+ Write This Week</Btn>
      </div>
      {myReviews.length === 0 && <div style={{ textAlign: "center", padding: "60px 0" }}><div style={{ fontSize: 48, opacity: .3, marginBottom: 12 }}>📝</div><p style={{ color: C.grey }}>No reviews yet. Start your first one above.</p></div>}
      <div style={{ display: "grid", gap: 12 }}>
        {myReviews.map(r => (
          <div key={r.id} style={{ background: C.card, border: "1.5px solid " + (r.coachFeedback ? C.gold + "50" : C.border), borderRadius: 14, overflow: "hidden" }}>
            <div style={{ padding: "16px 20px", borderBottom: "1px solid " + C.border, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontFamily: S, fontSize: 15, fontWeight: 700 }}>{r.weekLabel}</div>
                <div style={{ fontSize: 11, color: C.grey, marginTop: 2 }}>{new Date(r.createdAt).toLocaleDateString("en-ZA", { day: "numeric", month: "short", year: "numeric" })}</div>
              </div>
              {r.coachFeedback && <span style={{ background: C.goldDim, color: C.gold, border: "1px solid " + C.gold + "40", padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>💬 Coach feedback</span>}
            </div>
            <div style={{ padding: "16px 20px" }}>
              {Object.entries(r.answers || {}).slice(0, 2).map(([pid, ans]) => {
                const prompt = (weeklyPrompts || []).find(p => p.id === pid);

}

/* ── SECURITY TAB ────────────────────────────────────────────────────────── */
function SecurityTab({ loginSessions, users }) {
  const [selectedUser, setSelectedUser] = React.useState("all");
  const approvedUsers = users.filter(u => u.status === "approved");

  const getDeviceLabel = (ua) => {
    if (!ua) return "Unknown";
    if (/iPhone|iPad|iPod/i.test(ua)) return "📱 iOS";
    if (/Android/i.test(ua)) return "📱 Android";
    if (/Windows/i.test(ua)) return "💻 Windows";
    if (/Macintosh|Mac OS/i.test(ua)) return "💻 Mac";
    return "💻 Device";
  };

  const getBrowser = (ua) => {
    if (!ua) return "";
    if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) return "Chrome";
    if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) return "Safari";
    if (/Firefox/i.test(ua)) return "Firefox";
    if (/Edg/i.test(ua)) return "Edge";
    return "";
  };

  const getFlagEmoji = (code) => {
    if (!code) return "🌐";
    return code.toUpperCase().replace(/./g, c => String.fromCodePoint(c.charCodeAt(0) + 127397));
  };

  // Group sessions by user
  const byUser = {};
  (loginSessions || []).forEach(s => {
    if (!byUser[s.userId]) byUser[s.userId] = { name: s.userName, sessions: [] };
    byUser[s.userId].sessions.push(s);
  });

  // Flag: multiple different countries in last 24h
  const isSuspicious = (sessions) => {
    const recent = sessions.filter(s => Date.now() - s.createdAt < 24 * 60 * 60 * 1000);
    const countries = [...new Set(recent.map(s => s.country).filter(Boolean))];
    return countries.length > 1;
  };

  // Flag: two logins from different countries within 30 minutes
  const hasImpossibleTravel = (sessions) => {
    const sorted = [...sessions].sort((a,b) => a.createdAt - b.createdAt);
    for (let i = 1; i < sorted.length; i++) {
      const diff = sorted[i].createdAt - sorted[i-1].createdAt;
      if (diff < 30 * 60 * 1000 && sorted[i].country && sorted[i-1].country && sorted[i].country !== sorted[i-1].country) {
        return { from: sorted[i-1], to: sorted[i] };
      }
    }
    return null;
  };

  const suspicious = Object.entries(byUser).filter(([, v]) => isSuspicious(v.sessions));
  const impossibleTravels = Object.entries(byUser).map(([uid, v]) => ({ uid, name: v.name, travel: hasImpossibleTravel(v.sessions) })).filter(x => x.travel);

  return (
    <div style={{ display: "grid", gap: 20 }}>

      {/* Impossible travel alerts */}
      {impossibleTravels.length > 0 && (
        <div style={{ background: "rgba(217,96,96,.1)", border: "2px solid rgba(217,96,96,.5)", borderRadius: 14, padding: "18px 20px" }}>
          <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 12 }}>
            <span style={{ fontSize: 22 }}>🚨</span>
            <span style={{ fontFamily: S, fontSize: 16, fontWeight: 700, color: C.red }}>Impossible Travel Detected</span>
          </div>
          <p style={{ fontSize: 13, color: C.dim, marginBottom: 14, lineHeight: 1.6 }}>
            The following students logged in from two different countries within 30 minutes — physically impossible. This almost certainly means the account is being shared.
          </p>
          {impossibleTravels.map(({ name, travel }) => (
            <div style={{ background: "rgba(217,96,96,.08)", border: "1px solid rgba(217,96,96,.3)", borderRadius: 10, padding: "12px 16px", marginBottom: 8 }}>
              <div style={{ fontWeight: 700, color: C.red, marginBottom: 6, fontSize: 13 }}>⚠ {name}</div>
              <div style={{ fontSize: 12, color: C.dim, display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                <span>{getFlagEmoji(travel.from.countryCode)} {travel.from.city ? travel.from.city + ", " : ""}{travel.from.country || "Unknown"}</span>
                <span style={{ color: C.faint }}>→ {Math.round((travel.to.createdAt - travel.from.createdAt) / 60000)} min later →</span>
                <span>{getFlagEmoji(travel.to.countryCode)} {travel.to.city ? travel.to.city + ", " : ""}{travel.to.country || "Unknown"}</span>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Multi-country in 24h */}
      {suspicious.length > 0 && impossibleTravels.length === 0 && (
        <div style={{ background: "rgba(201,168,76,.08)", border: "1.5px solid rgba(201,168,76,.4)", borderRadius: 14, padding: "16px 20px" }}>
          <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 10 }}>
            <span style={{ fontSize: 18 }}>⚠️</span>
            <span style={{ fontFamily: S, fontSize: 15, fontWeight: 700, color: C.gold }}>Multiple Countries — 24h</span>
          </div>
          {suspicious.map(([uid, v]) => {
            const countries = [...new Set(v.sessions.filter(s => Date.now()-s.createdAt < 86400000).map(s => s.country).filter(Boolean))];
            return (
              <div key={uid} style={{ fontSize: 13, color: C.dim, marginBottom: 4 }}>
                <strong style={{ color: C.gold }}>{v.name}</strong> — logged in from: {countries.join(", ")}
              </div>
            );
          })}
        </div>
      )}

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(140px,1fr))", gap: 12 }}>
        {[
          { label: "Total Logins", value: (loginSessions||[]).length, color: C.gold },
          { label: "Active Students", value: Object.keys(byUser).length, color: C.green },
          { label: "Flagged", value: Math.max(suspicious.length, impossibleTravels.length), color: suspicious.length > 0 ? C.red : C.green },
          { label: "Countries Today", value: [...new Set((loginSessions||[]).filter(s=>Date.now()-s.createdAt<86400000).map(s=>s.country).filter(Boolean))].length, color: "#6B9FFF" },
        ].map(s => (
          <div key={s.label} style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 12, padding: "16px", textAlign: "center" }}>
            <div style={{ fontSize: 10, color: C.grey, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 6 }}>{s.label}</div>
            <div style={{ fontFamily: S, fontSize: 26, fontWeight: 700, color: s.color }}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* Per-student breakdown */}
      <Card style={{ padding: 24 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
          <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase" }}>Login History by Student</div>
          <select value={selectedUser} onChange={e => setSelectedUser(e.target.value)} style={{ width: "auto", padding: "8px 12px", fontSize: 12 }}>
            <option value="all">All Students</option>
            {approvedUsers.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </div>

        {Object.entries(byUser)
          .filter(([uid]) => selectedUser === "all" || uid === selectedUser)
          .sort((a,b) => (b[1].sessions[0]?.createdAt||0) - (a[1].sessions[0]?.createdAt||0))
          .map(([uid, v]) => {
            const flagged = isSuspicious(v.sessions);
            const travel = hasImpossibleTravel(v.sessions);
            const uniqueCountries = [...new Set(v.sessions.map(s=>s.country).filter(Boolean))];
            return (
              <div key={uid} style={{ marginBottom: 16, background: travel ? "rgba(217,96,96,.05)" : C.bg, border: "1px solid " + (travel ? C.red+"50" : C.border), borderRadius: 12, overflow: "hidden" }}>
                {/* Header */}
                <div style={{ padding: "12px 16px", borderBottom: "1px solid " + C.border, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: travel ? C.red : flagged ? C.gold : C.gold }}>{v.name}</span>
                    {travel && <span style={{ background: C.red+"20", color: C.red, border: "1px solid "+C.red+"40", padding: "2px 8px", borderRadius: 20, fontSize: 10, fontWeight: 700 }}>🚨 IMPOSSIBLE TRAVEL</span>}
                    {flagged && !travel && <span style={{ background: C.goldDim, color: C.gold, border: "1px solid "+C.gold+"40", padding: "2px 8px", borderRadius: 20, fontSize: 10, fontWeight: 700 }}>⚠ MULTI-COUNTRY</span>}
                  </div>
                  <div style={{ fontSize: 11, color: C.grey, display: "flex", gap: 12 }}>
                    <span>🌍 {uniqueCountries.length > 0 ? uniqueCountries.map(c => getFlagEmoji(v.sessions.find(s=>s.country===c)?.countryCode) + " " + c).join(", ") : "No geo data yet"}</span>
                    <span>🔑 {v.sessions.length} login{v.sessions.length!==1?"s":""}</span>
                  </div>
                </div>
                {/* Sessions */}
                <div style={{ maxHeight: 260, overflowY: "auto" }}>
                  {v.sessions.slice(0, 10).map((s, i) => {
                    const prevSession = v.sessions[i + 1];
                    const timeDiff = prevSession ? Math.round((s.createdAt - prevSession.createdAt) / 60000) : null;
                    const diffCountry = prevSession && s.country && prevSession.country && s.country !== prevSession.country;
                    return (
                      <div key={i} style={{ padding: "10px 16px", borderBottom: i < Math.min(v.sessions.length,10)-1 ? "1px solid "+C.border+"50" : "none",
                        background: diffCountry && timeDiff < 30 ? "rgba(217,96,96,.06)" : "transparent",
                        display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                          <div>
                            <div style={{ fontSize: 12, fontWeight: 600, color: C.dim }}>
                              {getFlagEmoji(s.countryCode)} {s.city ? s.city + ", " : ""}<span style={{ color: diffCountry && timeDiff < 30 ? C.red : C.white }}>{s.country || "Unknown location"}</span>
                            </div>
                            <div style={{ fontSize: 11, color: C.grey, marginTop: 2 }}>
                              {getDeviceLabel(s.device)} {getBrowser(s.device) ? "· " + getBrowser(s.device) : ""} · <span style={{ fontFamily: "monospace", fontSize: 10 }}>{s.ip}</span>
                            </div>
                            {diffCountry && timeDiff < 30 && (
                              <div style={{ fontSize: 10, color: C.red, fontWeight: 700, marginTop: 2 }}>⚠ Different country from previous login ({timeDiff} min gap)</div>
                            )}
                          </div>
                        </div>
                        <div style={{ fontSize: 11, color: C.faint, flexShrink: 0 }}>
                          {new Date(s.createdAt).toLocaleDateString("en-ZA", { day: "numeric", month: "short" })} {new Date(s.createdAt).toLocaleTimeString("en-ZA", { hour: "2-digit", minute: "2-digit" })}
                        </div>
                      </div>
                    );
                  })}
                  {v.sessions.length > 10 && <div style={{ padding: "8px 16px", fontSize: 11, color: C.faint, textAlign: "center" }}>+ {v.sessions.length - 10} older sessions</div>}
                </div>
              </div>
            );
          })}
        {Object.keys(byUser).length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 0" }}>
            <div style={{ fontSize: 40, opacity: .3, marginBottom: 10 }}>🔐</div>
            <p style={{ color: C.grey, fontSize: 13 }}>No logins recorded yet. Sessions appear here once students log in.</p>
          </div>
        )}
      </Card>
    </div>
  );
}

  const [editId, setEditId] = React.useState(null);
  const [editData, setEditData] = React.useState({});

  // From the student list - name match (case insensitive partial)
  const KNOWN = [

    { name: "SHAHEEN",          dueDay: 14, price: 800,  plan: "PM" },
    { name: "ACHMAT",           dueDay: 7,  price: 800,  plan: "PM" },
    { name: "SAFWAAN",          dueDay: 15, price: 1500, plan: "1v1" },
    { name: "LIAM",             dueDay: 13, price: 2000, plan: "1v1" },
    { name: "JAYDEE",           dueDay: 13, price: 2000, plan: "1v1" },
    { name: "LORELEI",          dueDay: 22, price: 1500, plan: "1v1" },
    { name: "TASNEEM",          dueDay: 4,  price: 2000, plan: "1v1" },
  ];

  const getKnown = (u) => {
    const n = (u.name||"").toUpperCase();
    return KNOWN.find(k => n.includes(k.name));
  };

  const getDueDay = (u) => {
    if (u.pmDueDate) return parseInt(u.pmDueDate);
    const k = getKnown(u);
    return k ? k.dueDay : null;
  };

  const getPrice = (u) => {
    if (u.pmPrice) return parseInt(u.pmPrice);
    const k = getKnown(u);
    return k ? k.price : 800;
  };

  const getPlan = (u) => {
    if ((u.levels||[]).includes("1v1")) return "1V1";
    const k = getKnown(u);
    return k && k.plan === "1v1" ? "1V1" : "Private Mentorship";
  };

  const getNextDue = (u) => {
    const day = getDueDay(u);
    if (!day) return null;
    const today = new Date();
    const thisMonth = new Date(today.getFullYear(), today.getMonth(), day);
    return thisMonth >= today ? thisMonth : new Date(today.getFullYear(), today.getMonth() + 1, day);
  };

  const formatDate = (d) => {
    if (!d) return null;
    const date = d instanceof Date ? d : new Date(d);
    return date.toLocaleDateString("en-ZA", { day: "numeric", month: "long" });
  };

  const daysUntil = (d) => {
    if (!d) return null;
    const date = d instanceof Date ? d : new Date(d);
    return Math.ceil((date - new Date()) / (1000*60*60*24));
  };

  const getStatus = (u) => {
    if (u.pmPaid) return "active"; // marked as paid = always active
    const next = getNextDue(u);
    if (!next) return "none";
    const days = daysUntil(next);
    if (days < 0) return "overdue";
    if (days <= 5) return "due-soon";
    return "active";
  };

  const approved = users.filter(u => u.status === "approved");
  const pm = approved.filter(u => (u.levels||[]).includes("Private Mentorship") || (u.levels||[]).includes("1v1"));

  // Financial totals for current month
  const today = new Date();
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const monthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);

  const totalMonthly = pm.reduce((sum, u) => sum + getPrice(u), 0);

  const paidThisMonth = pm.filter(u => {
    const day = getDueDay(u);
    if (!day) return false;
    const dueThisMonth = new Date(today.getFullYear(), today.getMonth(), day);
    return dueThisMonth <= today;
  }).reduce((sum, u) => sum + getPrice(u), 0);

  const stillExpected = pm.filter(u => {
    const day = getDueDay(u);
    if (!day) return false;
    const dueThisMonth = new Date(today.getFullYear(), today.getMonth(), day);
    return dueThisMonth > today;
  }).reduce((sum, u) => sum + getPrice(u), 0);

  const overdue = pm.filter(u => getStatus(u) === "overdue");
  const dueSoon = pm.filter(u => getStatus(u) === "due-soon");

  const filtered = filter === "overdue" ? pm.filter(u => getStatus(u) === "overdue")
    : filter === "due-soon" ? pm.filter(u => ["overdue","due-soon"].includes(getStatus(u)))
    : pm;

  const display = search.trim()
    ? filtered.filter(u => u.name.toLowerCase().includes(search.toLowerCase()) || (u.phone||"").includes(search))
    : filtered;

  const openEdit = (u) => {
    setEditId(u.id);
    setEditData({ phone: u.phone||"", pmDueDate: u.pmDueDate||String(getDueDay(u)||""), pmPrice: String(getPrice(u)), pmStartDate: u.pmStartDate||"" });
  };

  const saveEdit = (u) => {
    patchUser(u.id, { phone: editData.phone, pmDueDate: editData.pmDueDate, pmPrice: editData.pmPrice, pmStartDate: editData.pmStartDate });
    setEditId(null);
  };

                </div>
                <button onClick={() => saveEdit(u)}
                  style={{ padding: "8px 16px", borderRadius: 8, background: "linear-gradient(135deg,"+C.goldLt+","+C.gold+")", border: "none", color: "#08090E", fontWeight: 700, fontSize: 13, cursor: "pointer", whiteSpace: "nowrap" }}>

              </div>
            )}

      {display.length === 0 && (
        <div style={{ padding: "40px", textAlign: "center", color: C.grey, fontSize: 13, background: C.card, borderRadius: 12 }}>
          {pm.length === 0 ? "No PM members yet. Grant access from the Users tab." : "No members match your search."}
        </div>
      )}
    </div>
  );
}

    if (patch.pdfUrl !== undefined) dbPatch.pdf_url = patch.pdfUrl;
    if (patch.pdfName !== undefined) dbPatch.pdf_name = patch.pdfName;
    await sb("videos?id=eq." + id, { method: "PATCH", prefer: "return=minimal", body: dbPatch });
    setVideos(prev => prev.map(v => v.id === id ? { ...v, ...patch } : v));
  };
  const addVideoDB = async (v) => {
    await sb("videos", { method: "POST", prefer: "return=minimal", body: { id:v.id, course_id:v.courseId, section_id:v.sectionId, title:v.title, url:v.url, description:v.desc||"", created_at:v.createdAt } });
    setVideos(prev => [...prev, v]);
  };
  const deleteVideoDB = async (id) => {
    await sb("videos?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setVideos(prev => prev.filter(v => v.id !== id));
  };
  const addHomeworkDB = async (h) => {
    await sb("homework", { method: "POST", prefer: "return=minimal", body: { id:h.id, title:h.title, description:h.description, due_date:h.dueDate, due_time:h.dueTime||null, created_at:h.createdAt } });
    setHomework(prev => [h, ...prev]);
  };
  const patchHomeworkDB = async (id, patch) => {
    const body = {};
    if (patch.title !== undefined) body.title = patch.title;
    if (patch.description !== undefined) body.description = patch.description;
    if (patch.dueDate !== undefined) body.due_date = patch.dueDate;
    if (patch.dueTime !== undefined) body.due_time = patch.dueTime;
    await sb("homework?id=eq." + id, { method: "PATCH", prefer: "return=minimal", body });
    setHomework(prev => prev.map(h => h.id === id ? { ...h, ...patch } : h));
  };
  const deleteHomeworkDB = async (id) => {
    await sb("hw_submissions?homework_id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    await sb("homework?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setHomework(prev => prev.filter(h => h.id !== id));
  };
  const addHwSubmitDB = async (s) => {
    await sb("hw_submissions", { method: "POST", prefer: "return=minimal", body: { id:s.id, homework_id:s.homeworkId, user_id:s.userId, user_name:s.userName, text:s.text, image:s.image||null, images:s.images||[], admin_feedback:null, created_at:s.createdAt } });
    setHwSubmits(prev => [s, ...prev]);
  };
  const patchHwSubmit = async (id, patch) => {
    await sb("hw_submissions?id=eq." + id, { method: "PATCH", prefer: "return=minimal", body: { admin_feedback: patch.adminFeedback } });
    setHwSubmits(prev => prev.map(s => s.id === id ? { ...s, ...patch } : s));
  };
  const trackVideoWatch = async (userId, videoTitle, videoId) => {
    const ts = new Date().toISOString();
    // last_watched keeps "timestamp|title" (admin view parses this); we append the
    // video id so the student portal can link straight back to it for "Continue watching".
    const value = ts + "|" + videoTitle + (videoId ? "|" + videoId : "");
    await sb("users?id=eq." + userId, { method: "PATCH", prefer: "return=minimal", body: { last_watched: value } });
    setLastWatch(prev => ({ ...prev, [userId]: value }));
    setMe(prev => prev && prev.id === userId ? { ...prev, lastWatched: value } : prev);
  };

  // Toggle a video's "watched" state for a user. Stored as a small array of video
  // ids on the user row — written only on click, so it's egress-safe.
  const toggleWatched = async (userId, videoId) => {
    const u = users.find(x => x.id === userId) || (me && me.id === userId ? me : null);
    const current = (u && u.watchedVideos) || [];
    const next = current.includes(videoId) ? current.filter(id => id !== videoId) : [...current, videoId];
    setUsers(prev => prev.map(x => x.id === userId ? { ...x, watchedVideos: next } : x));
    setMe(prev => prev && prev.id === userId ? { ...prev, watchedVideos: next } : prev);
    await sb("users?id=eq." + userId, { method: "PATCH", prefer: "return=minimal", body: { watched_videos: next } });
  };

  const addReviewDB = async (r) => {
    await sb("weekly_reviews", { method: "POST", prefer: "return=minimal", body: { id:r.id, user_id:r.userId, user_name:r.userName, week_label:r.weekLabel, answers:r.answers, coach_feedback:null, created_at:r.createdAt } });
    setReviews(prev => [r, ...prev]);
  };
  const patchReviewDB = async (id, patch) => {
    const dbPatch = {};
    if (patch.coachFeedback !== undefined) dbPatch.coach_feedback = patch.coachFeedback;
    await sb("weekly_reviews?id=eq." + id, { method: "PATCH", prefer: "return=minimal", body: dbPatch });
    setReviews(prev => prev.map(r => r.id === id ? { ...r, ...patch } : r));
  };
  const addPromptDB = async (p) => {
    await sb("weekly_prompts", { method: "POST", prefer: "return=minimal", body: { id:p.id, question:p.question, required:p.required!==false, active:true, created_at:p.createdAt } });
    setWeeklyPrompts(prev => [...prev, p]);
  };
  const deletePromptDB = async (id) => {
    await sb("weekly_prompts?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setWeeklyPrompts(prev => prev.filter(p => p.id !== id));
  };
  const togglePromptDB = async (id, active) => {
    await sb("weekly_prompts?id=eq." + id, { method: "PATCH", prefer: "return=minimal", body: { active } });
    setWeeklyPrompts(prev => prev.map(p => p.id === id ? { ...p, active } : p));
  };
  const addCommentDB = async (c) => {
    await sb("comments", { method: "POST", prefer: "return=minimal", body: { id:c.id, video_id:c.videoId, user_id:c.userId, user_name:c.userName, text:c.text, parent_id:c.parentId||null, is_admin:c.isAdmin||false, timestamp:c.timestamp||null, created_at:c.createdAt } });
    setComments(prev => [...prev, c]);
  };
  const deleteCommentDB = async (id) => {
    await sb("comments?id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    // Also delete replies
    await sb("comments?parent_id=eq." + id, { method: "DELETE", prefer: "return=minimal" });
    setComments(prev => prev.filter(c => c.id !== id && c.parentId !== id));
  };

  const login = async (email, pass, setMsg) => {
    const u = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === pass);
    if (!u) { setMsg("Incorrect email or password."); return; }

    setMe(u);
    setScreen(u.status === "approved" ? "portal" : u.status === "declined" ? "declined" : "pending");
  };

  const register = async (name, email, pass, setMsg) => {
    if (!name || !email || !pass) { setMsg("All fields are required."); return; }
    if (users.find(u => u.email.toLowerCase() === email.toLowerCase())) { setMsg("An account with this email already exists."); return; }
    const u = { id: uid(), name, email, password: pass, status: "pending", levels: [], createdAt: Date.now() };
    await addUser(u); setMe(u); setScreen("pending");
  };

  const logout = () => { setMe(null); setScreen("login"); };

  useEffect(() => {
    if (me && screen === "pending") {
      const u = users.find(u => u.id === me.id);
      if (u?.status === "approved") setScreen("portal");
      if (u?.status === "declined") setScreen("declined");
    }
  }, [users]);

  if (loading) return (
    <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
      <style>{GS}</style>
      <Logo h={120} />
      <div style={{ width:40, height:40, border:"3px solid " + C.border, borderTop:"3px solid " + C.gold, borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
      <p style={{ color:C.grey, fontSize:13, letterSpacing:".1em" }}>Loading portal...</p>
    </div>
  );

  return (
    <>
      <style>{GS}</style>
      {screen === "login"     && <LoginScreen onLogin={login} onRegister={register} onAdmin={() => setScreen("adminAuth")} />}
      {screen === "adminAuth" && <AdminAuthScreen onBack={() => setScreen("login")} onEnter={() => setScreen("admin")} />}
      {screen === "admin"     && <AdminPanel users={users} patchUser={patchUser} deleteUser={deleteUserDB} courses={courses} addCourse={addCourseDB} patchCourse={patchCourse} deleteCourse={deleteCourseDB} sections={sections} addSection={addSectionDB} patchSection={patchSectionDB} deleteSection={deleteSectionDB} videos={videos} addVideo={addVideoDB} deleteVideo={deleteVideoDB} patchVideo={patchVideo} homework={homework} addHomework={addHomeworkDB} patchHomework={patchHomeworkDB} deleteHomework={deleteHomeworkDB} hwSubmits={hwSubmits} patchHwSubmit={patchHwSubmit} lastWatch={lastWatch} reviews={reviews} patchReview={patchReviewDB} weeklyPrompts={weeklyPrompts} addPrompt={addPromptDB} deletePrompt={deletePromptDB} togglePrompt={togglePromptDB} onLogout={logout} loadAll={loadAll} />}
      {screen === "portal"    && me && <Portal layout={layout} toggleLayout={toggleLayout} user={me} courses={courses} sections={sections} videos={videos} comments={comments} addComment={addCommentDB} deleteComment={deleteCommentDB} homework={homework} hwSubmits={hwSubmits} addHwSubmit={addHwSubmitDB} reviews={reviews} addReviewDB={addReviewDB} weeklyPrompts={weeklyPrompts} trackWatch={trackVideoWatch} toggleWatched={toggleWatched} onLogout={logout} />}
      {screen === "pending"   && me && <StatusScreen icon="⏳" title="Pending Approval" color={C.gold} onLogout={logout} msg={`Hi ${me.name}, your registration is under review. You'll be granted access once the admin approves your account.`} />}
      {screen === "declined"  && <StatusScreen icon="✕" title="Access Declined" color={C.red} onLogout={logout} msg="Your access request has been declined. Please contact the administrator for assistance." />}
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
