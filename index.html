          <div style={{ display:"flex", background:C.bg, borderRadius:10, padding:3, gap:3, border:"1px solid "+C.border }}>
            {["ZAR","USD"].map(c => (
              <button key={c} onClick={() => setCurrency(c)} style={{ flex:1, padding:"10px 0", borderRadius:8, fontSize:13, fontWeight:700, border:"none", cursor:"pointer",
                background: currency===c ? C.goldDim : "transparent", color: currency===c ? C.gold : C.grey }}>
                {c==="ZAR" ? "🇿🇦 ZAR" : "🇺🇸 USD"}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div><label>Trade Title</label><input value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. XAUUSD Long — NYC Open" /></div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
        <div><label>Pair</label><input value={pair} onChange={e => setPair(e.target.value)} placeholder="XAUUSD, EURUSD…" /></div>
        <div><label>Direction</label><select value={direction} onChange={e => setDirection(e.target.value)}><option>Long</option><option>Short</option></select></div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
        <div><label>Risk (Pips)</label><input value={risk} onChange={e => setRisk(e.target.value)} placeholder="e.g. 20" /></div>
        <div><label>Gain (Pips)</label><input value={gain} onChange={e => setGain(e.target.value)} placeholder="e.g. 60" /></div>
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
            <label style={{ margin:0 }}>P&L</label>
            <div style={{ display:"flex", background:C.bg, borderRadius:7, padding:2, gap:2 }}>
              {["ZAR","USD"].map(c => <button key={c} onClick={() => setPnlCurrency(c)} style={{ padding:"3px 10px", borderRadius:5, fontSize:10, fontWeight:700, border:"none", cursor:"pointer", background:pnlCurrency===c?C.gold:"transparent", color:pnlCurrency===c?"#08090E":C.grey }}>{c}</button>)}
            </div>
          </div>
          <input value={pnl} onChange={e => setPnl(e.target.value)} placeholder={pnlCurrency==="ZAR" ? "+R500" : "+$28"} />
        </div>
      </div>
      <div><label>Result</label><select value={result} onChange={e => setResult(e.target.value)}><option>Win</option><option>Loss</option><option>Break Even</option></select></div>
      <div><label>Analysis</label>
        <textarea value={analysis} onChange={e => setAnalysis(e.target.value)} placeholder="Describe your setup, confluences, entry reasoning…"
          style={{ height:130, resize:"vertical", background:C.navy, border:"1.5px solid "+C.border, borderRadius:10, padding:"12px 14px", color:C.white, width:"100%", outline:"none", fontFamily:D, fontSize:13, lineHeight:1.6 }} />
      </div>
      <div><label>Lesson Learned</label>
        <textarea value={lesson} onChange={e => setLesson(e.target.value)} placeholder="What did this trade teach you?"
          style={{ height:80, resize:"vertical", background:C.navy, border:"1.5px solid "+C.border, borderRadius:10, padding:"12px 14px", color:C.white, width:"100%", outline:"none", fontFamily:D, fontSize:13, lineHeight:1.6 }} />
      </div>
      <div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
          <label style={{ margin:0 }}>Chart Screenshots</label>
          <span style={{ fontSize:11, color:C.grey }}>{(image||[]).length} image{(image||[]).length!==1?"s":""} added</span>
        </div>
        <div style={{ border:"2px dashed "+(image&&image.length?C.gold:C.border), borderRadius:12, padding:"20px", textAlign:"center", background:C.navy, cursor:"pointer", transition:"border-color .2s" }}
          onClick={() => document.getElementById("chart-upload-"+userId).click()}>
          <input id={"chart-upload-"+userId} type="file" accept="image/*" multiple style={{ display:"none" }}
            onChange={e => {
              const files = Array.from(e.target.files);
              files.forEach(f => compressImage(f, img => setImage(prev => [...(prev||[]), img])));
              e.target.value = "";
            }} />
          <div style={{ fontSize:28, marginBottom:6 }}>📸</div>
          <div style={{ color:C.white, fontSize:13, fontWeight:600, marginBottom:4 }}>Click to add screenshots</div>
          <div style={{ color:C.grey, fontSize:11 }}>You can select multiple images at once — click again to add more</div>
        </div>
        {image && image.length > 0 && (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))", gap:10, marginTop:12 }}>
            {image.map((img, i) => (
              <div key={i} style={{ position:"relative", borderRadius:10, overflow:"hidden", border:"1.5px solid "+C.border, background:C.bg }}>
                <img src={img} alt={"chart "+(i+1)} style={{ width:"100%", height:130, objectFit:"cover", display:"block" }} />
                <button onClick={ev => { ev.stopPropagation(); setImage(prev => prev.filter((_,j)=>j!==i)); }}
                  style={{ position:"absolute", top:6, right:6, background:"rgba(0,0,0,.75)", color:"#fff", border:"none", borderRadius:"50%", width:24, height:24, fontSize:14, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700 }}>✕</button>
                <div style={{ position:"absolute", bottom:0, left:0, right:0, background:"rgba(0,0,0,.5)", fontSize:10, color:C.grey, textAlign:"center", padding:"3px 0" }}>Photo {i+1}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      {err && <div style={{ color:err==="Saving..."?C.gold:err==="saved"?C.green:C.red, fontSize:13, textAlign:"center", fontWeight:700 }}>{err==="saved" ? "✓ Entry saved!" : err}</div>}
      <div style={{ display:"flex", gap:10 }}><Btn onClick={onSubmit} full sz="lg">{submitLabel}</Btn></div>
    </div>
  );
}

function StudentJournal({ user, journals, addJournal, deleteJournal }) {
  const [view, setView] = React.useState("list");
  const [selected, setSelected] = React.useState(null);
  const [editing, setEditing] = React.useState(null);
  const [zoomImg, setZoomImg] = React.useState(null);
  const [title, setTitle] = React.useState("");
  const [pair, setPair] = React.useState("");
  const [direction, setDirection] = React.useState("Long");
  const [risk, setRisk] = React.useState("");
  const [gain, setGain] = React.useState("");
  const [result, setResult] = React.useState("Win");
  const [pnl, setPnl] = React.useState("");
  const [pnlCurrency, setPnlCurrency] = React.useState("ZAR");
  const [analysis, setAnalysis] = React.useState("");
  const [lesson, setLesson] = React.useState("");
  const [chartImg, setChartImg] = React.useState([]);
  const [tradeType, setTradeType] = React.useState("Live Trade");
  const [tradeModel, setTradeModel] = React.useState("");
  const [killZone, setKillZone] = React.useState("");
  const [confluences, setConfluences] = React.useState([]);
  const [filterModel, setFilterModel] = React.useState("All");
  const [showAnalytics, setShowAnalytics] = React.useState(false);
  const [analyticsType, setAnalyticsType] = React.useState("All");
  const [tradeDate, setTradeDate] = React.useState(() => new Date().toISOString().split("T")[0]);
  const [currency, setCurrency] = React.useState("ZAR");
  const [err, setErr] = React.useState("");

  const myJournals = (journals||[]).filter(j => j.userId === user.id).sort((a,b) => b.createdAt - a.createdAt);
  const resultColor = r => r === "Win" ? C.green : r === "Loss" ? C.red : C.gold;

  const compressImage = (file, cb) => {
    const r = new FileReader();
    r.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const MAX = 1200; let w = img.width, h = img.height;
        if (w > MAX) { h = h*MAX/w; w = MAX; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        cb(canvas.toDataURL("image/jpeg", 0.7));
      };
      img.src = ev.target.result;
    };
    r.readAsDataURL(file);
  };

  const resetForm = () => {
    setTitle(""); setPair(""); setDirection("Long"); setRisk(""); setGain("");
    setResult("Win"); setPnl(""); setPnlCurrency("ZAR"); setAnalysis(""); setLesson("");
    setChartImg([]); setTradeType("Live Trade"); setTradeDate(new Date().toISOString().split("T")[0]);
    setCurrency("ZAR"); setErr("");
  };

  const submitNew = async () => {
    if (!title.trim() || !pair.trim() || !analysis.trim() || !tradeModel) { setErr(!tradeModel ? "Please select a Trading Model." : "Title, pair and analysis are required."); return; }
    setErr("Saving...");
    const tradeDateTs = tradeDate ? new Date(tradeDate + "T12:00:00").getTime() : Date.now();
    const entry = { id: uid(), userId: user.id, userName: user.name, title: title.trim(), pair: pair.trim(), direction, risk: risk.trim(), gain: gain.trim(), result, pnl: pnl.trim(), analysis: analysis.trim(), lesson: lesson.trim(), image: (chartImg&&chartImg.length)?chartImg[0]:null, images: chartImg||[], tradeType, tradeModel, killZone, confluences, tradeDate, currency, createdAt: tradeDateTs, adminComment: null, adminCommentAt: null, adminSeen: false };
    try { await addJournal(entry); resetForm(); setErr("saved"); setTimeout(() => setView("list"), 800); }
    catch(e) { setErr("Failed to save. Please try again."); }
  };

  const submitEdit = async () => {
    if (!editing) return;
    if (!title.trim() || !pair.trim() || !analysis.trim() || !tradeModel) { setErr(!tradeModel ? "Please select a Trading Model." : "Title, pair and analysis are required."); return; }
    setErr("Saving...");
    const updated = { ...editing, title: title.trim(), pair: pair.trim(), direction, risk: risk.trim(), gain: gain.trim(), result, pnl: pnl.trim(), analysis: analysis.trim(), lesson: lesson.trim(), image: (chartImg&&chartImg.length)?chartImg[0]:null, images: chartImg||[], tradeType, tradeModel, killZone, confluences, tradeDate, currency };
    try {
      await deleteJournal(editing.id);
      await addJournal(updated);
      resetForm(); setEditing(null); setSelected(updated.id); setView("detail");
    } catch(e) { setErr("Failed to save. Please try again."); }
  };

  const openEdit = (j) => {
    try {
    if (!j) { console.error("openEdit: j is null/undefined"); return; }
    console.log("openEdit called", j.id, j.title);
    setTitle(j.title||""); setPair(j.pair||""); setDirection(j.direction||"Long");
    setRisk(j.risk||""); setGain(j.gain||""); setResult(j.result||"Win");
    setPnl(j.pnl||""); setAnalysis(j.analysis||""); setLesson(j.lesson||"");
    setTradeType(j.tradeType||"Live Trade");
    setTradeModel(j.tradeModel||"");
    setKillZone(j.killZone||"");
    setConfluences(j.confluences||[]);
    setTradeDate(j.tradeDate || new Date(j.createdAt).toISOString().split("T")[0]);
    setCurrency(j.currency||"ZAR"); setChartImg(j.images&&j.images.length?j.images:(j.image?[j.image]:[])); setErr("");
    setEditing(j); setView("edit");
    console.log("openEdit: view set to edit, editing:", j.id);
    } catch(e) { console.error("openEdit error:", e); }
  };

  const formProps = { tradeType, setTradeType, tradeModel, setTradeModel, killZone, setKillZone, confluences, setConfluences, tradeDate, setTradeDate, currency, setCurrency,
    title, setTitle, pair, setPair, direction, setDirection, risk, setRisk, gain, setGain,
    pnl, setPnl, pnlCurrency, setPnlCurrency, result, setResult, analysis, setAnalysis,
    lesson, setLesson, image: chartImg||[], setImage: setChartImg, err, userId: user.id, compressImage };

  if (zoomImg) return (
    <div onClick={() => setZoomImg(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.92)", zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center", cursor:"zoom-out", padding:20 }}>
      <img src={zoomImg} alt="zoom" style={{ maxWidth:"100%", maxHeight:"90vh", borderRadius:12, objectFit:"contain" }} />
      <button onClick={() => setZoomImg(null)} style={{ position:"absolute", top:20, right:20, background:"rgba(255,255,255,.15)", border:"none", color:"#fff", width:40, height:40, borderRadius:"50%", fontSize:20, cursor:"pointer" }}>✕</button>
    </div>
  );

  // Chart effect — must be BEFORE early returns (Rules of Hooks)
  useEffect(() => {
    if (!showAnalytics || view !== "list") return;
    const C4 = window.Chart;
    if (!C4) return;
    const colors = { gold:"#C9A84C", green:"#2ecc71", red:"#e74c3c", blue:"#6B9FFF", purple:"#C96BFF" };
    setTimeout(() => {
      const allE = myJournals.filter(j => filterModel==="All" || j.tradeModel===filterModel);
      const entries = analyticsType==="Live" ? allE.filter(j=>(j.tradeType||"Live Trade")==="Live Trade") : analyticsType==="Backtest" ? allE.filter(j=>j.tradeType==="Backtest") : allE;
      const countBy = (key, fw) => {
        const m = {};
        (fw ? entries.filter(j=>j.result==="Win") : entries).forEach(j=>{ const v=j[key]; if(v) m[v]=(m[v]||0)+1; });
        return Object.entries(m).sort((a,b)=>b[1]-a[1]);
      };
      const pnlByDay = (() => {
        const m = {};
        entries.forEach(j=>{ if(!j.pnl||!j.tradeDate) return; const n=parseFloat(String(j.pnl).replace(/[^0-9.-]/g,"")); if(!isNaN(n)) m[j.tradeDate]=(m[j.tradeDate]||0)+n; });
        return Object.entries(m).sort((a,b)=>a[0]>b[0]?1:-1).slice(-30);
      })();
      ["analyticsChartPnl","analyticsChartPair","analyticsChartKZ"].forEach(id => {
        const el = document.getElementById(id);
        if (el && el._chartInst) { el._chartInst.destroy(); el._chartInst = null; }
      });
      const pnlEl = document.getElementById("analyticsChartPnl");
      if (pnlEl && pnlByDay.length > 1) {
        const cum=[]; let s=0; pnlByDay.forEach(([d,v])=>{ s+=v; cum.push({x:d,y:Math.round(s*100)/100}); });
        pnlEl._chartInst = new C4(pnlEl, { type:"line", data:{ datasets:[{ label:"P&L", data:cum, borderColor:colors.gold, backgroundColor:"rgba(201,168,76,.08)", fill:true, tension:0.3, pointRadius:3 }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{type:"category",ticks:{color:"#7A8099",maxRotation:45,font:{size:10}}}, y:{ticks:{color:"#7A8099",font:{size:10},callback:v=>(v>=0?"+":"")+v}} } } });
      }
      const pairEl = document.getElementById("analyticsChartPair");
      if (pairEl && countBy("pair",false).length) {
        const top=countBy("pair",false).slice(0,8); const winsMap={}; countBy("pair",true).forEach(([k,v])=>winsMap[k]=v);
        pairEl._chartInst = new C4(pairEl, { type:"bar", data:{ labels:top.map(([k])=>k), datasets:[{ label:"Trades", data:top.map(([,v])=>v), backgroundColor:colors.blue+"99" },{ label:"Wins", data:top.map(([k])=>winsMap[k]||0), backgroundColor:colors.green+"99" }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ticks:{color:"#7A8099",font:{size:10}}}, y:{ticks:{color:"#7A8099",font:{size:10}}} } } });
      }
      const kzEl = document.getElementById("analyticsChartKZ");
      const kzData=countBy("killZone",false);
      if (kzEl && kzData.length) {
        kzEl._chartInst = new C4(kzEl, { type:"doughnut", data:{ labels:kzData.map(([k])=>k), datasets:[{ data:kzData.map(([,v])=>v), backgroundColor:[colors.blue,colors.gold,colors.purple,colors.green].slice(0,kzData.length), borderWidth:0 }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:true,position:"right",labels:{color:"#7A8099",boxWidth:10,font:{size:11}}} } } });
      }
    }, 150);
  }, [showAnalytics, view, filterModel, tradeType, analyticsType, myJournals.length]);

  if (view === "new") return (
    <div style={{ maxWidth:700, margin:"0 auto", padding:"28px 16px 80px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:28 }}>
        <button onClick={() => { resetForm(); setView("list"); }} style={{ background:"transparent", color:C.gold, fontSize:13, fontWeight:700, cursor:"pointer", border:"none" }}>← Back</button>
        <h2 style={{ fontFamily:S, fontSize:24, fontWeight:700 }}>New Trade Journal</h2>
      </div>
      <TradeForm {...formProps} onSubmit={submitNew} submitLabel="Save Journal Entry" />
    </div>
  );

  if (view === "edit") return (
    <div style={{ maxWidth:700, margin:"0 auto", padding:"28px 16px 80px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:28 }}>
        <button onClick={() => { resetForm(); setEditing(null); setView("detail"); }} style={{ background:"transparent", color:C.gold, fontSize:13, fontWeight:700, cursor:"pointer", border:"none" }}>← Cancel</button>
        <h2 style={{ fontFamily:S, fontSize:24, fontWeight:700 }}>Edit Journal Entry</h2>
      </div>
      <TradeForm {...formProps} onSubmit={submitEdit} submitLabel="Save Changes" />
    </div>
  );

  if (view === "detail" && selected) {
    const j = (journals||[]).find(x => x.id === selected);
    if (!j) return null;
    return (
      <div style={{ maxWidth:700, margin:"0 auto", padding:"28px 16px 80px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <button onClick={() => setView("list")} style={{ background:"transparent", color:C.gold, fontSize:13, fontWeight:700, cursor:"pointer", border:"none" }}>← Back to Journal</button>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={() => openEdit(j)} style={{ background:C.goldDim, color:C.gold, border:"1px solid "+C.gold+"40", borderRadius:8, padding:"7px 14px", fontSize:12, fontWeight:700, cursor:"pointer" }}>✏ Edit</button>
            <button onClick={() => { deleteJournal(j.id); setView("list"); }} style={{ background:C.red+"15", color:C.red, border:"1px solid "+C.red+"40", borderRadius:8, padding:"7px 14px", fontSize:12, fontWeight:700, cursor:"pointer" }}>🗑 Delete</button>
          </div>
        </div>
        <div style={{ background:C.card, border:"1.5px solid "+C.border, borderRadius:16, padding:"28px 24px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:12, marginBottom:20 }}>
            <div>
              <h2 style={{ fontFamily:S, fontSize:22, fontWeight:700, marginBottom:6 }}>{j.title}</h2>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:6 }}>
                {j.tradeType && <span style={{ background:j.tradeType==="Backtest"?C.goldDim:"rgba(46,204,113,.12)", color:j.tradeType==="Backtest"?C.gold:C.green, border:"1px solid "+(j.tradeType==="Backtest"?C.gold:C.green)+"40", padding:"2px 10px", borderRadius:20, fontSize:11, fontWeight:700 }}>{j.tradeType}</span>}
                {j.tradeModel && <span style={{ background:"rgba(107,159,255,.12)", color:"#6B9FFF", border:"1px solid rgba(107,159,255,.3)", padding:"2px 10px", borderRadius:20, fontSize:11, fontWeight:700 }}>{j.tradeModel}</span>}
                {j.currency && <span style={{ background:"rgba(201,168,76,.1)", color:C.gold, border:"1px solid "+C.gold+"30", padding:"2px 10px", borderRadius:20, fontSize:11, fontWeight:700 }}>{j.currency}</span>}
              </div>
              <div style={{ fontSize:12, color:C.grey }}>{j.tradeDate ? new Date(j.tradeDate+"T12:00:00").toLocaleDateString("en-ZA",{weekday:"long",year:"numeric",month:"long",day:"numeric"}) : new Date(j.createdAt).toLocaleDateString("en-ZA",{year:"numeric",month:"long",day:"numeric"})}</div>
            </div>
            <span style={{ background:resultColor(j.result)+"20", color:resultColor(j.result), border:"1px solid "+resultColor(j.result)+"40", padding:"6px 16px", borderRadius:20, fontSize:13, fontWeight:700 }}>{j.result}</span>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))", gap:10, marginBottom:22 }}>
            {[["Pair",j.pair],["Direction",j.direction],["Risk",j.risk||"—"],["Gain",j.gain||"—"],["P&L",j.pnl||"—"]].map(([k,v]) => (
              <div key={k} style={{ background:C.bg, border:"1px solid "+C.border, borderRadius:10, padding:"12px 14px" }}>
                <div style={{ fontSize:10, color:C.grey, letterSpacing:".1em", textTransform:"uppercase", marginBottom:4 }}>{k}</div>
                <div style={{ fontSize:16, fontWeight:700 }}>{v}</div>
              </div>
            ))}
          </div>
          {j.analysis && <div style={{ marginBottom:18 }}><div style={{ fontSize:11, color:C.grey, letterSpacing:".1em", textTransform:"uppercase", marginBottom:8 }}>Analysis</div><p style={{ fontSize:14, lineHeight:1.8, color:C.dim }}>{j.analysis}</p></div>}
          {j.lesson && <div style={{ marginBottom:18 }}><div style={{ fontSize:11, color:C.grey, letterSpacing:".1em", textTransform:"uppercase", marginBottom:8 }}>Lesson Learned</div><p style={{ fontSize:14, lineHeight:1.8, color:C.dim }}>{j.lesson}</p></div>}
          {((j.images&&j.images.length>0)||j.image) && (
            <div>
              <div style={{ fontSize:11, color:C.grey, letterSpacing:".1em", textTransform:"uppercase", marginBottom:8 }}>Charts</div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))", gap:8 }}>
                {(j.images&&j.images.length>0 ? j.images : [j.image]).filter(Boolean).map((img,i) => (
                  <img key={i} src={img} alt={"chart "+i} onClick={() => setZoomImg(img)}
                    style={{ width:"100%", borderRadius:10, border:"1px solid "+C.border, display:"block", cursor:"zoom-in", objectFit:"cover", maxHeight:200 }} />
                ))}
              </div>
            </div>
          )}
          {j.adminComment && <div style={{ marginTop:20, background:"rgba(201,168,76,.06)", border:"1px solid rgba(201,168,76,.25)", borderRadius:10, padding:"14px 16px" }}><div style={{ fontSize:11, fontWeight:700, color:C.gold, marginBottom:6 }}>Coach Taaha — Feedback</div><p style={{ fontSize:14, lineHeight:1.7, color:C.dim }}>{j.adminComment}</p></div>}
        </div>
      </div>
    );
  }

  return (
    <div style={{ maxWidth:700, margin:"0 auto", padding:"28px 16px 80px" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:28, flexWrap:"wrap", gap:12 }}>
        <div>
          <p style={{ fontSize:11, fontWeight:700, letterSpacing:".25em", color:C.white, textTransform:"uppercase", marginBottom:4 }}>Trade Journal</p>
          <h2 style={{ fontFamily:S, fontSize:26, fontWeight:700 }}>My Entries</h2>
        </div>
        <Btn onClick={() => { resetForm(); setView("new"); }}>+ New Entry</Btn>
        <Btn v={showAnalytics ? "gold" : "outline"} onClick={() => setShowAnalytics(p=>!p)}>📊 Analytics</Btn>
      </div>
      {/* Model filter */}
      <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:16 }}>
        {["All","TA MODEL","FOREVER MODEL","PM SESSION MODEL","TA 2.0 MODEL","TA MMXM MODEL"].map(m => (
          <button key={m} onClick={() => setFilterModel(m)} style={{ padding:"5px 12px", borderRadius:20, fontSize:11, fontWeight:700, border:"1.5px solid", cursor:"pointer", transition:"all .2s",
            background:filterModel===m?(m==="All"?C.gold:"rgba(107,159,255,.15)"):"transparent",
            color:filterModel===m?(m==="All"?"#08090E":"#6B9FFF"):C.grey,
            borderColor:filterModel===m?(m==="All"?C.gold:"rgba(107,159,255,.5)"):C.border }}>{m==="All"?"All Models":m}</button>
        ))}
      </div>
      {myJournals.length === 0 && (
        <div style={{ textAlign:"center", padding:"60px 0" }}>
          <div style={{ fontSize:48, marginBottom:16, opacity:.3 }}>📓</div>
          <p style={{ color:C.grey, fontSize:14 }}>No journal entries yet.</p>
          <Btn onClick={() => { resetForm(); setView("new"); }} style={{ marginTop:20 }}>Log Your First Trade</Btn>
        </div>
      )}
      {/* Analytics Panel */}
      {showAnalytics && (() => {
        const allEntries = myJournals.filter(j => filterModel==="All" || j.tradeModel===filterModel);
        const entries = analyticsType==="Live" ? allEntries.filter(j=>(j.tradeType||"Live Trade")==="Live Trade") : analyticsType==="Backtest" ? allEntries.filter(j=>j.tradeType==="Backtest") : allEntries;
        const live = allEntries.filter(j => (j.tradeType||"Live Trade")==="Live Trade");
        const bt = allEntries.filter(j => j.tradeType==="Backtest");
        const wins = entries.filter(j=>j.result==="Win").length;
        const losses = entries.filter(j=>j.result==="Loss").length;
        const be = entries.filter(j=>j.result==="BE").length;
        const wr = entries.length ? Math.round((wins/entries.length)*100) : 0;

        const avgRR = (() => {
          const v = entries.filter(j=>j.risk&&j.gain&&parseFloat(j.risk)>0);
          if (!v.length) return "—";
          return "1:" + (v.reduce((s,j)=>s+parseFloat(j.gain)/parseFloat(j.risk),0)/v.length).toFixed(2);
        })();

        const totalPnl = entries.reduce((s,j)=>{
          if (!j.pnl) return s;
          const n = parseFloat(String(j.pnl).replace(/[^0-9.\-]/g,""));
          return isNaN(n) ? s : s + n;
        }, 0);

        const countBy = (key, filterWin) => {
          const m = {};
          (filterWin ? entries.filter(j=>j.result==="Win") : entries).forEach(j=>{
            const v = j[key]; if (v) m[v]=(m[v]||0)+1;
          });
          return Object.entries(m).sort((a,b)=>b[1]-a[1]);
        };

        const countConf = (filterWin) => {
          const m = {};
          (filterWin ? entries.filter(j=>j.result==="Win") : entries).forEach(j=>{
            (j.confluences||[]).forEach(c=>{ m[c]=(m[c]||0)+1; });
          });
          return Object.entries(m).sort((a,b)=>b[1]-a[1]);
        };

        const pairData = countBy("pair", false);
        const kzData = countBy("killZone", false);
        const modelData = countBy("tradeModel", false);
        const confData = countConf(true);

        const pnlByDay = (() => {
          const m = {};
          entries.forEach(j=>{
            if (!j.pnl||!j.tradeDate) return;
            const n = parseFloat(String(j.pnl).replace(/[^0-9.\-]/g,""));
            if (!isNaN(n)) m[j.tradeDate]=(m[j.tradeDate]||0)+n;
          });
          return Object.entries(m).sort((a,b)=>a[0]>b[0]?1:-1).slice(-30);
        })();

        const chartId = "analyticsChartPnl";
        const pairChartId = "analyticsChartPair";
        const kzChartId = "analyticsChartKZ";

        const colors = { gold:"#C9A84C", green:"#2ecc71", red:"#e74c3c", blue:"#6B9FFF", purple:"#C96BFF", grey:"#4A5066" };

        const statCard = (label, value, color) => (
          <div style={{ background:C.surf, border:"1px solid "+C.border, borderRadius:10, padding:"14px 16px" }}>
            <div style={{ fontSize:10, fontWeight:700, letterSpacing:".12em", color:C.grey, textTransform:"uppercase", marginBottom:6 }}>{label}</div>
            <div style={{ fontSize:22, fontWeight:700, color:color||C.white }}>{value}</div>
          </div>
        );

        const rankList = (data, title, winData, colorFn) => (
          <div style={{ background:C.surf, border:"1px solid "+C.border, borderRadius:10, padding:"14px 16px" }}>
            <div style={{ fontSize:10, fontWeight:700, letterSpacing:".12em", color:C.grey, textTransform:"uppercase", marginBottom:10 }}>{title}</div>
            {data.slice(0,6).map(([k,v],i)=>{
              const winsMap = {}; (winData||[]).forEach(([wk,wv])=>winsMap[wk]=wv);
              const maxV = data[0]?.[1]||1;
              const wr2 = v > 0 ? Math.round(((winsMap[k]||0)/v)*100) : 0;
              return (
                <div key={k} style={{ marginBottom:8 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:3 }}>
                    <span style={{ color:i===0?C.gold:C.dim, fontWeight:i===0?700:400 }}>{i===0?"🏆 ":i===data.length-1&&data.length>1?"📉 ":""}{k||"—"}</span>
                    <span style={{ color:C.grey }}>{v} trades · {wr2}% wr</span>
                  </div>
                  <div style={{ height:4, background:C.bg, borderRadius:2, overflow:"hidden" }}>
                    <div style={{ height:"100%", width:(v/maxV*100)+"%", background:i===0?C.gold:i===data.length-1&&data.length>1?colors.red:colors.blue, borderRadius:2, transition:"width .4s" }} />
                  </div>
                </div>
              );
            })}
            {data.length===0 && <div style={{ fontSize:12, color:C.faint }}>No data yet</div>}
          </div>
        );

        return (
          <div style={{ background:C.card, border:"1px solid "+C.gold+"30", borderRadius:14, padding:"20px", marginBottom:20 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div style={{ fontSize:12, fontWeight:700, letterSpacing:".15em", color:C.gold, textTransform:"uppercase" }}>
                Analytics — {entries.length} entries
              </div>
              <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                {["All","Live","Backtest"].map(t => (
                  <button key={t} onClick={() => setAnalyticsType(t)}
                    style={{ padding:"4px 12px", borderRadius:20, fontSize:11, fontWeight:600, cursor:"pointer", border:"1px solid",
                      background: analyticsType===t ? (t==="Live" ? "rgba(76,184,128,.15)" : t==="Backtest" ? "rgba(107,159,255,.15)" : C.goldDim) : "transparent",
                      color: analyticsType===t ? (t==="Live" ? C.green : t==="Backtest" ? "#6B9FFF" : C.gold) : C.grey,
                      borderColor: analyticsType===t ? (t==="Live" ? C.green+"50" : t==="Backtest" ? "#6B9FFF50" : C.gold+"50") : C.border }}>
                    {t} {t==="Live" ? "("+live.length+")" : t==="Backtest" ? "("+bt.length+")" : "("+allEntries.length+")"}
                  </button>
                ))}
              </div>
            </div>

            {/* Stat cards */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))", gap:8, marginBottom:16 }}>
              {statCard("Win Rate", wr+"%", wr>=60?C.green:wr>=40?C.gold:C.red)}
              {statCard("Wins", wins, C.green)}
              {statCard("Losses", losses, C.red)}
              {statCard("BE", be, C.grey)}
              {statCard("Avg RR", avgRR, C.gold)}
              {statCard("Total P&L", (totalPnl>=0?"+":"")+totalPnl.toFixed(0), totalPnl>=0?C.green:C.red)}
            </div>

            {/* P&L Chart */}
            {pnlByDay.length > 1 && (
              <div style={{ marginBottom:16 }}>
                <div style={{ fontSize:10, fontWeight:700, letterSpacing:".12em", color:C.grey, textTransform:"uppercase", marginBottom:8 }}>Cumulative P&L</div>
                <div style={{ height:160, background:C.surf, border:"1px solid "+C.border, borderRadius:10, padding:"10px" }}>
                  <canvas id={chartId} role="img" aria-label="Cumulative P&L over time" />
                </div>
              </div>
            )}

            {/* Pair + Kill Zone */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
              <div>
                <div style={{ fontSize:10, fontWeight:700, letterSpacing:".12em", color:C.grey, textTransform:"uppercase", marginBottom:8 }}>Pairs (Trades vs Wins)</div>
                <div style={{ height:160, background:C.surf, border:"1px solid "+C.border, borderRadius:10, padding:"10px" }}>
                  {pairData.length > 0
                    ? <canvas id={pairChartId} role="img" aria-label="Trade count by pair" />
                    : <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100%", color:C.faint, fontSize:12 }}>No pair data yet</div>}
                </div>
              </div>
              <div>
                <div style={{ fontSize:10, fontWeight:700, letterSpacing:".12em", color:C.grey, textTransform:"uppercase", marginBottom:8 }}>Kill Zone Breakdown</div>
                <div style={{ height:160, background:C.surf, border:"1px solid "+C.border, borderRadius:10, padding:"10px" }}>
                  {kzData.length > 0
                    ? <canvas id={kzChartId} role="img" aria-label="Trades by kill zone" />
                    : <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100%", color:C.faint, fontSize:12 }}>No kill zone data yet</div>}
                </div>
              </div>
            </div>

            {/* Rankings */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              {rankList(pairData, "Best vs Worst Pair", countBy("pair",true))}
              {rankList(kzData, "Best vs Worst Kill Zone", countBy("killZone",true))}
              {rankList(modelData, "Best vs Worst Model", countBy("tradeModel",true))}
              {rankList(confData.slice(0,6), "Best Entry Confluences", confData)}
            </div>

            {/* Chart.js loader */}
            <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js" />
          </div>
        );
      })()}

      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {myJournals.filter(j => filterModel==="All" || j.tradeModel===filterModel).map(j => (
          <div key={j.id} style={{ background:C.card, border:"1.5px solid "+(j.adminComment?"rgba(201,168,76,.35)":C.border), borderRadius:12, padding:"16px 18px", cursor:"pointer" }}
            onClick={() => { setSelected(j.id); setView("detail"); }}
            onMouseEnter={e => e.currentTarget.style.borderColor = C.gold}
            onMouseLeave={e => e.currentTarget.style.borderColor = j.adminComment?"rgba(201,168,76,.35)":C.border}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12 }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontFamily:S, fontSize:16, fontWeight:700, marginBottom:4, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{j.title}</div>
                <div style={{ display:"flex", gap:8, fontSize:12, color:C.grey, flexWrap:"wrap", alignItems:"center" }}>
                  {j.tradeType && <span style={{ background:j.tradeType==="Backtest"?C.goldDim:"rgba(46,204,113,.12)", color:j.tradeType==="Backtest"?C.gold:C.green, border:"1px solid "+(j.tradeType==="Backtest"?C.gold:C.green)+"40", padding:"1px 8px", borderRadius:20, fontSize:10, fontWeight:700 }}>{j.tradeType}</span>}
                  {j.tradeModel && <span style={{ background:"rgba(107,159,255,.12)", color:"#6B9FFF", border:"1px solid rgba(107,159,255,.3)", padding:"1px 8px", borderRadius:20, fontSize:10, fontWeight:700 }}>{j.tradeModel}</span>}
                  {j.currency && <span style={{ background:"rgba(201,168,76,.1)", color:C.gold, border:"1px solid "+C.gold+"30", padding:"1px 8px", borderRadius:20, fontSize:10, fontWeight:700 }}>{j.currency}</span>}
                  <span>{j.pair}</span><span>·</span><span>{j.direction}</span>
                  {j.pnl && <><span>·</span><span style={{ color:j.result==="Win"?C.green:j.result==="Loss"?C.red:C.gold }}>{j.pnl}</span></>}
                  <span>·</span><span>{j.tradeDate ? new Date(j.tradeDate+"T12:00:00").toLocaleDateString("en-ZA",{day:"numeric",month:"short",year:"numeric"}) : new Date(j.createdAt).toLocaleDateString()}</span>
                </div>
              </div>
              <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6, flexShrink:0 }}>
                <span style={{ background:resultColor(j.result)+"20", color:resultColor(j.result), border:"1px solid "+resultColor(j.result)+"40", padding:"3px 10px", borderRadius:20, fontSize:11, fontWeight:700 }}>{j.result}</span>
                {j.adminComment && <span style={{ fontSize:10, color:C.gold, fontWeight:700 }}>COACH FEEDBACK</span>}
              </div>
            </div>
          </div>
        ))}
      </div>
      <PnlCalendar journals={journals} userId={user.id} />
    </div>
  );
}

function AdminJournalTab({ users, journals, patchJournal, loadAll }) {
  const [selected, setSelected] = React.useState(null);
  const [comment, setComment] = React.useState("");
  const [filterUser, setFilterUser] = React.useState("all");
  const [refreshing, setRefreshing] = React.useState(false);
  const [showCalendar, setShowCalendar] = React.useState(false);
  const doRefresh = async () => { setRefreshing(true); await loadAll(false); setRefreshing(false); };

  const approvedUsers = users.filter(u => u.status === "approved");
  const filtered = (filterUser === "all" ? journals : journals.filter(j => j.userId === filterUser))
    .sort((a,b) => b.createdAt - a.createdAt);

  const j = selected ? journals.find(x => x.id === selected) : null;
  const userName = j ? (users.find(u => u.id === j.userId)?.name || "Unknown") : "";

  const submitComment = () => {
    if (!comment.trim()) return;
    patchJournal(selected, { adminComment: comment.trim(), adminCommentAt: Date.now(), adminSeen: true });
    setComment(""); setSelected(null);
  };

  const markSeen = id => patchJournal(id, { adminSeen: true });

  const resultColor = r => r === "Win" ? C.green : r === "Loss" ? C.red : C.gold;

  if (j) return (
    <div>
      <button onClick={() => { setSelected(null); setComment(""); }} style={{ background: "transparent", color: C.gold, fontSize: 13, fontWeight: 700, cursor: "pointer", border: "none", marginBottom: 20, display: "block" }}>← Back to All Journals</button>
      <div style={{ background: C.card, border: "1.5px solid " + C.border, borderRadius: 16, padding: "24px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 10, marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 11, color: C.white, fontWeight: 700, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 4 }}>Entry by {userName}</div>
            <h3 style={{ fontFamily: S, fontSize: 20, fontWeight: 700 }}>{j.title}</h3>
            <div style={{ fontSize: 12, color: C.grey, marginTop: 2 }}>{new Date(j.createdAt).toLocaleDateString("en-ZA", { year:"numeric", month:"long", day:"numeric" })}</div>
          </div>
          <span style={{ background: resultColor(j.result) + "20", color: resultColor(j.result), border: "1px solid " + resultColor(j.result) + "40", padding: "5px 14px", borderRadius: 20, fontSize: 13, fontWeight: 700 }}>{j.result}</span>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(120px,1fr))", gap: 8, marginBottom: 18 }}>
          {[["Pair", j.pair], ["Direction", j.direction], ["Risk (Pips)", j.risk||"—"], ["Gain (Pips)", j.gain||"—"], ["P&L", j.pnl||"—"]].map(([k,v]) => (
            <div key={k} style={{ background: C.bg, border: "1px solid " + C.border, borderRadius: 9, padding: "10px 12px" }}>
              <div style={{ fontSize: 10, color: C.grey, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 3 }}>{k}</div>
              <div style={{ fontSize: 14, fontWeight: 700 }}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase", marginBottom: 6 }}>Analysis</div>
          <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.8, whiteSpace: "pre-wrap" }}>{j.analysis}</p>
        </div>
        {((j.images && j.images.length > 0) || j.image) && (
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase", marginBottom: 8 }}>Charts ({(j.images && j.images.length) || 1})</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(160px,1fr))", gap: 8 }}>
              {(j.images && j.images.length > 0 ? j.images : [j.image]).map((img, idx) => (
                <img key={idx} src={img} alt={"chart "+(idx+1)} style={{ width: "100%", height: 130, objectFit: "cover", borderRadius: 8, border: "1px solid " + C.border, cursor: "zoom-in" }}
                  onClick={() => window.open(img, "_blank")} />
              ))}
            </div>
          </div>
        )}
        {j.lesson && <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase", marginBottom: 6 }}>Lesson Learned</div>
          <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.7 }}>{j.lesson}</p>
        </div>}
        {j.adminComment && (
          <div style={{ background: "rgba(201,168,76,.06)", border: "1px solid rgba(201,168,76,.2)", borderRadius: 10, padding: "14px 16px", marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.gold, marginBottom: 6 }}>Your Previous Comment:</div>
            <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.7 }}>{j.adminComment}</p>
          </div>
        )}
        <div style={{ marginTop: 20 }}>
          <label>{j.adminComment ? "Update Your Comment" : "Add Coach Comment (only visible to this student)"}</label>
          <textarea value={comment || j.adminComment || ""} onChange={e => setComment(e.target.value)}
            placeholder="Write your feedback, advice or encouragement for this trade…"
            style={{ height: 100, resize: "vertical", background: C.navy, border: "1.5px solid " + C.border, borderRadius: 10, padding: "12px 14px", color: C.white, width: "100%", outline: "none", fontFamily: D, fontSize: 13, lineHeight: 1.6, marginBottom: 12 }} />

  );

        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          <button onClick={doRefresh} style={{ background: "transparent", color: refreshing ? C.faint : C.gold, border: "1px solid " + (refreshing ? C.faint : C.gold) + "50", borderRadius: 8, padding: "6px 14px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>{refreshing ? "Refreshing..." : "↻ Refresh"}</button>
          <select value={filterUser} onChange={e => { setFilterUser(e.target.value); setShowCalendar(false); }} style={{ width: "auto", padding: "8px 12px", fontSize: 12 }}>
            <option value="all">All Students</option>
            {approvedUsers.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
          {filterUser !== "all" && (
            <button onClick={() => setShowCalendar(p => !p)} style={{ background: showCalendar ? C.goldDim : "transparent", color: C.gold, border: "1px solid " + C.gold + "50", borderRadius: 8, padding: "6px 14px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
              📅 {showCalendar ? "Hide Calendar" : "View P&L Calendar"}
            </button>
          )}
        </div>
      </div>
      {showCalendar && filterUser !== "all" && (
        <div style={{ marginBottom: 28, background: C.card, border: "1.5px solid " + C.border, borderRadius: 16, padding: "24px" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.gold, marginBottom: 4 }}>
            {approvedUsers.find(u => u.id === filterUser)?.name || ""} — P&L Calendar
          </div>
          <PnlCalendar journals={journals} userId={filterUser} />
        </div>
      )}
      {filtered.length === 0 && <p style={{ color: C.grey, textAlign: "center", padding: "40px 0" }}>No journal entries yet.</p>}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {filtered.map(j => {
          const uname = users.find(u => u.id === j.userId)?.name || "Unknown";
          return (
            <div key={j.id} style={{ background: C.card, border: "1.5px solid " + (!j.adminSeen ? C.gold + "50" : C.border), borderRadius: 12, padding: "14px 16px", cursor: "pointer" }}
              onClick={() => { setSelected(j.id); markSeen(j.id); setComment(j.adminComment || ""); }}
              onMouseEnter={e => e.currentTarget.style.borderColor = C.gold}
              onMouseLeave={e => e.currentTarget.style.borderColor = !j.adminSeen ? C.gold + "50" : C.border}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                    {!j.adminSeen && <span style={{ width: 7, height: 7, borderRadius: "50%", background: C.gold, display: "inline-block", flexShrink: 0 }} />}
                    <span style={{ fontSize: 11, fontWeight: 700, color: C.gold, letterSpacing: ".08em" }}>{uname}</span>
                  </div>
                  <div style={{ fontFamily: S, fontSize: 15, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{j.title}</div>
                  <div style={{ fontSize: 11, color: C.grey, marginTop: 2 }}>{j.pair} · {j.direction} · {new Date(j.createdAt).toLocaleDateString()}</div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4, flexShrink: 0 }}>
                  <span style={{ background: (j.result==="Win"?C.green:j.result==="Loss"?C.red:C.gold) + "20", color: (j.result==="Win"?C.green:j.result==="Loss"?C.red:C.gold), border: "1px solid " + (j.result==="Win"?C.green:j.result==="Loss"?C.red:C.gold) + "40", padding: "2px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>{j.result}</span>
                  {j.adminComment && <span style={{ fontSize: 10, color: C.grey }}>✓ Commented</span>}
                  {!j.adminComment && <span style={{ fontSize: 10, color: C.gold, fontWeight: 700 }}>Needs review</span>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function MembershipTab({ users, patchUser, courses, patchCourse, lastWatch, journals }) {
  const [search, setSearch] = React.useState("");
  const approved = users.filter(u => u.status === "approved").filter(u => !search.trim() || u.name.toLowerCase().includes(search.toLowerCase()) || u.email.toLowerCase().includes(search.toLowerCase()));

  const toggleLevel = (userId, level) => {
    const u = users.find(x => x.id === userId);
    if (!u) return;
    const levels = u.levels || [];
    const newLevels = levels.includes(level) ? levels.filter(l => l !== level) : [...levels, level];
    patchUser(userId, { levels: newLevels });
  };

  const setCourseLevel = (courseId, level) => {
    patchCourse(courseId, { level: level || null });
  };

  return (
    <div style={{ display: "grid", gap: 24 }}>
      {/* Course level assignment */}
      <Card style={{ padding: 24 }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase", marginBottom: 6 }}>Course Access Levels</div>
        <p style={{ fontSize: 13, color: C.grey, marginBottom: 20, lineHeight: 1.6 }}>Assign a membership level to each course. Only students with that level can see and access it.</p>
        {courses.length === 0 && <p style={{ color: C.faint, fontSize: 13 }}>No courses yet.</p>}
        {courses.map(c => (
          <div key={c.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px", borderRadius: 10, background: C.bg, border: "1px solid " + C.border, marginBottom: 8, flexWrap: "wrap", gap: 12 }}>
            <div>
              <div style={{ fontFamily: S, fontSize: 16, fontWeight: 700, color: C.white }}>{c.title}</div>
              <div style={{ fontSize: 12, color: C.grey, marginTop: 2 }}>
                {c.level
                  ? <span style={{ background: LEVEL_COLORS[c.level]?.bg, color: LEVEL_COLORS[c.level]?.text, border: "1px solid " + LEVEL_COLORS[c.level]?.border, padding: "2px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>{c.level}</span>
                  : <span style={{ color: C.faint, fontSize: 11 }}>No level — visible to all approved members</span>}
              </div>
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {LEVELS.map(l => (
                <button key={l} onClick={() => setCourseLevel(c.id, c.level === l ? null : l)} style={{
                  padding: "6px 12px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                  background: c.level === l ? LEVEL_COLORS[l]?.bg : "transparent",
                  color: c.level === l ? LEVEL_COLORS[l]?.text : C.faint,
                  border: "1px solid " + (c.level === l ? LEVEL_COLORS[l]?.border : C.border),
                }}>{l}</button>
              ))}
              {c.level && <button onClick={() => setCourseLevel(c.id, null)} style={{ padding: "6px 10px", borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: "pointer", background: "transparent", color: C.red, border: "1px solid " + C.red + "40" }}>✕ Remove</button>}
            </div>
          </div>
        ))}
      </Card>

      {/* Student level assignment */}
      <Card style={{ padding: 24 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10, marginBottom: 6 }}>
          <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase" }}>Student Memberships</div>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by name or email..." style={{ width: 220, padding: "8px 12px", borderRadius: 9, fontSize: 13 }} />
        </div>
        <p style={{ fontSize: 13, color: C.grey, marginBottom: 20, lineHeight: 1.6 }}>Toggle which membership levels each student has. A student can hold multiple levels.</p>
        {approved.length === 0 && <p style={{ color: C.faint, fontSize: 13 }}>No approved students yet.</p>}
        {approved.map(u => (
          <div key={u.id} style={{ padding: "16px", borderRadius: 12, background: C.bg, border: "1px solid " + C.border, marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10, marginBottom: 12 }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15, color: C.white }}>{u.name}</div>
                <div style={{ fontSize: 12, color: C.grey }}>{u.email}</div>
                <div style={{ display: "flex", gap: 16, marginTop: 4, flexWrap: "wrap" }}>
                  {lastWatch && lastWatch[u.id] && (() => { const [ts, vid] = lastWatch[u.id].split("|"); const d = new Date(ts); const valid = !isNaN(d.getTime()) && d.getFullYear() > 1971; return valid ? <span style={{ fontSize: 11, color: C.grey }}>▶ Last watched: <strong style={{ color: C.dim }}>{vid}</strong> · {d.toLocaleDateString("en-ZA")}</span> : null; })()}
                  {(() => { const lj = journals.filter(j => j.userId === u.id); const last = lj.length ? Math.max(...lj.map(j=>j.createdAt)) : null; return last ? <span style={{ fontSize: 11, color: C.grey }}>📓 Last journalled: <strong style={{ color: (Date.now()-last > 7*24*60*60*1000) ? C.red : C.dim }}>{new Date(last).toLocaleDateString("en-ZA")}</strong></span> : <span style={{ fontSize: 11, color: C.faint }}>📓 Never journalled</span>; })()}
                </div>
                {lastWatch[u.id] && (() => {
                  const [ts, vid] = lastWatch[u.id].split("|");
                  const d = new Date(ts); const valid = !isNaN(d.getTime()) && d.getFullYear() > 1971; return valid ? <div style={{ fontSize: 11, color: C.faint, marginTop: 2 }}>Last watched: <span style={{ color: C.gold }}>{vid}</span> — {d.toLocaleDateString("en-ZA", { day:"numeric", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" })}</div> : null;
                })()}
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {(u.levels || []).length === 0
                  ? <span style={{ fontSize: 11, color: C.faint }}>No levels assigned</span>
                  : (u.levels || []).map(l => (
                    <span key={l} style={{ background: LEVEL_COLORS[l]?.bg, color: LEVEL_COLORS[l]?.text, border: "1px solid " + LEVEL_COLORS[l]?.border, padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>{l}</span>
                  ))
                }
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {LEVELS.map(l => {
                const has = (u.levels || []).includes(l);
                return (
                  <button key={l} onClick={() => toggleLevel(u.id, l)} style={{
                    padding: "8px 16px", borderRadius: 9, fontSize: 12, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                    background: has ? LEVEL_COLORS[l]?.bg : C.card,
                    color: has ? LEVEL_COLORS[l]?.text : C.grey,
                    border: "1px solid " + (has ? LEVEL_COLORS[l]?.border : C.border),
                  }}>
                    {has ? "✓ " : "+ "}{l}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </Card>
    </div>
  );
}

          {/* Entry Model Breakdown (if extra data exists) */}
          {m.extra && (
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
                <span style={{ fontSize: 18 }}>⚡</span>
                <h4 style={{ fontFamily: S, fontSize: 15, fontWeight: 700, color: C.white }}>{m.extra.title}</h4>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                {m.extra.sections.map((sec, i) => (
                  <div key={i} style={{ background: C.bg, border: "1.5px solid " + sec.color + "40", borderRadius: 14, padding: 18 }}>
                    <div style={{ fontFamily: S, fontSize: 13, fontWeight: 700, color: sec.color, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>

                        <span style={{ fontSize: 12, color: C.dim, lineHeight: 1.6 }}>{step}</span>
                      </div>

            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
                <span style={{ fontSize: 18 }}>☑️</span>
                <h4 style={{ fontFamily: S, fontSize: 15, fontWeight: 700, color: C.white }}>Full Sequence — Top Down Checklist</h4>
              </div>
              <div style={{ background: C.bg, border: "1px solid " + C.border, borderRadius: 12, overflow: "hidden" }}>
                {m.sequence.map((step, i) => (
                  <div key={i} style={{ display: "flex", gap: 14, alignItems: "center", padding: "12px 18px", borderBottom: i < m.sequence.length-1 ? "1px solid " + C.border : "none" }}>

                    <span style={{ fontSize: 13, color: C.dim, lineHeight: 1.5 }}>{step}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Reminder */}
          <div style={{ background: C.goldDim, border: "1px solid " + C.gold + "40", borderRadius: 12, padding: "14px 18px", display: "flex", gap: 12, alignItems: "center" }}>
            <span style={{ fontSize: 20, flexShrink: 0 }}>💡</span>
            <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.6 }}>
              <strong style={{ color: C.gold }}>Remember:</strong> Consistency beats perfection. Execute your model the same way every time. The edge compounds over many trades, not one.

          </div>
        </div>
      </div>
    </div>
  );
}

/* ── PRE-TRADE CHECKLIST ─────────────────────────────────────────────────── */
const CHECKLIST_ITEMS = [
  { id: "setup", icon: "🎯", text: "My model setup has fully formed — I am not forcing it" },
  { id: "rr", icon: "⚖️", text: "My Risk:Reward is at least 1:2 before I enter" },
  { id: "levels", icon: "📍", text: "I have marked my entry, stop loss, and take profit BEFORE entering" },
  { id: "emotion", icon: "🧠", text: "I am NOT revenge trading, FOMO trading, or emotionally compromised" },
  { id: "session", icon: "🕐", text: "I am trading during the correct session for this setup" },
  { id: "news", icon: "📰", text: "I have checked the economic calendar — no major news in next 30 min" },
  { id: "size", icon: "💰", text: "My position size is within my risk rules (no over-leveraging)" },
  { id: "model", icon: "📘", text: "This is a valid model trade — not a random setup I invented" },
];

function PreTradeChecklist() {
  const [checked, setChecked] = React.useState({});
  const [submitted, setSubmitted] = React.useState(false);
  const [note, setNote] = React.useState("");
  const [history, setHistory] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("tafx_checklist_history") || "[]"); } catch { return []; }
  });

  const toggle = (id) => {
    if (submitted) return;
    setChecked(prev => ({ ...prev, [id]: !prev[id] }));
  };

  const allChecked = CHECKLIST_ITEMS.every(item => checked[item.id]);
  const checkedCount = Object.values(checked).filter(Boolean).length;
  const pct = Math.round((checkedCount / CHECKLIST_ITEMS.length) * 100);

  const submit = () => {
    if (!allChecked) return;
    const entry = { date: new Date().toISOString(), note: note.trim(), score: 100 };
    const newHistory = [entry, ...history].slice(0, 30);
    setHistory(newHistory);
    try { localStorage.setItem("tafx_checklist_history", JSON.stringify(newHistory)); } catch {}
    setSubmitted(true);
  };

  const reset = () => {
    setChecked({});
    setSubmitted(false);
    setNote("");
  };

  return (
    <div style={{ maxWidth: 700, margin: "0 auto", padding: "28px 16px 80px" }}>
      {/* Header */}
      <div style={{ marginBottom: 28 }}>
        <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".25em", color: C.gold, textTransform: "uppercase", marginBottom: 6 }}>Discipline First</p>
        <h2 style={{ fontFamily: S, fontSize: 28, fontWeight: 700, marginBottom: 6 }}>Pre-Trade Checklist</h2>
        <p style={{ color: C.grey, fontSize: 14 }}>Complete every check before you enter. No shortcuts. No exceptions.</p>
      </div>

      {submitted ? (
        <div style={{ textAlign: "center", padding: "40px 20px" }}>
          <div style={{ fontSize: 72, marginBottom: 16 }}>🟢</div>
          <h3 style={{ fontFamily: S, fontSize: 26, fontWeight: 700, color: C.green, marginBottom: 8 }}>You are clear to trade.</h3>
          <p style={{ color: C.grey, fontSize: 14, marginBottom: 24, lineHeight: 1.7 }}>All 8 checks passed. You have done the work. Now execute with confidence and trust your model.</p>
          <div style={{ background: "rgba(76,184,128,.08)", border: "1px solid rgba(76,184,128,.3)", borderRadius: 14, padding: "16px 20px", marginBottom: 24, maxWidth: 400, margin: "0 auto 24px" }}>
            <div style={{ fontSize: 11, color: C.grey, letterSpacing: ".1em", textTransform: "uppercase", marginBottom: 4 }}>Cleared at</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: C.green }}>{new Date().toLocaleTimeString("en-ZA", { hour: "2-digit", minute: "2-digit" })} — {new Date().toLocaleDateString("en-ZA", { weekday: "long", day: "numeric", month: "long" })}</div>
          </div>
          <Btn onClick={reset} v="outline">Run Checklist Again</Btn>
        </div>
      ) : (
        <div>
          {/* Progress bar */}
          <div style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 14, padding: "16px 20px", marginBottom: 24 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: C.white }}>{checkedCount}/{CHECKLIST_ITEMS.length} checks complete</span>
              <span style={{ fontFamily: S, fontSize: 22, fontWeight: 700, color: allChecked ? C.green : pct > 50 ? C.gold : C.grey }}>{pct}%</span>
            </div>
            <div style={{ height: 8, background: C.bg, borderRadius: 8, overflow: "hidden" }}>
              <div style={{ height: "100%", width: pct + "%", background: allChecked ? "linear-gradient(90deg,#2ecc71,#1a9e50)" : pct > 50 ? "linear-gradient(90deg," + C.goldLt + "," + C.gold + ")" : "linear-gradient(90deg,#6B9FFF,#3B6FFF)", borderRadius: 8, transition: "width .4s cubic-bezier(.22,1,.36,1)" }} />
            </div>
          </div>

          {/* Checklist items */}
          <div style={{ display: "grid", gap: 10, marginBottom: 24 }}>
            {CHECKLIST_ITEMS.map((item, i) => {
              const done = checked[item.id];
              return (
                <div key={item.id} onClick={() => toggle(item.id)}
                  style={{ display: "flex", gap: 14, alignItems: "center", padding: "16px 20px", background: done ? "rgba(76,184,128,.08)" : C.card,
                    border: "1.5px solid " + (done ? "rgba(76,184,128,.4)" : C.border), borderRadius: 14, cursor: "pointer",
                    transition: "all .2s", transform: done ? "translateX(4px)" : "translateX(0)" }}
                  onMouseEnter={e => { if (!done) e.currentTarget.style.borderColor = C.gold + "60"; }}
                  onMouseLeave={e => { if (!done) e.currentTarget.style.borderColor = C.border; }}>
                  <span style={{ fontSize: 22, flexShrink: 0 }}>{done ? "✅" : item.icon}</span>
                  <span style={{ fontSize: 13, color: done ? C.green : C.dim, lineHeight: 1.5, fontWeight: done ? 600 : 400, flex: 1, textDecoration: done ? "line-through" : "none", textDecorationColor: "rgba(76,184,128,.4)" }}>{item.text}</span>
                  <div style={{ width: 24, height: 24, borderRadius: "50%", border: "2px solid " + (done ? C.green : C.border), background: done ? C.green : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all .2s" }}>
                    {done && <span style={{ color: "#fff", fontSize: 13, fontWeight: 700 }}>✓</span>}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Optional note */}
          <div style={{ marginBottom: 20 }}>
            <label>Setup notes (optional)</label>
            <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="Describe your setup briefly before you enter... what do you see? Why is this valid?"
              style={{ height: 80, resize: "vertical", background: C.navy, border: "1.5px solid " + C.border, borderRadius: 10, padding: "12px 14px", color: C.white, width: "100%", outline: "none", fontFamily: D, fontSize: 13, lineHeight: 1.6 }} />
          </div>

          {!allChecked && (
            <div style={{ padding: "12px 16px", background: "rgba(217,96,96,.08)", border: "1px solid rgba(217,96,96,.25)", borderRadius: 10, fontSize: 13, color: C.red, marginBottom: 16 }}>
              ⚠️ Complete all {CHECKLIST_ITEMS.length} checks before you can proceed to trade.
            </div>
          )}

          <Btn onClick={submit} disabled={!allChecked} full sz="lg" style={{ background: allChecked ? "linear-gradient(135deg,#2ecc71,#1a9e50)" : undefined, color: allChecked ? "#fff" : undefined }}>
            {allChecked ? "✅ I am ready — clear to trade" : `Complete all checks (${CHECKLIST_ITEMS.length - checkedCount} remaining)`}
          </Btn>
        </div>
      )}

      {/* History */}
      {history.length > 0 && (
        <div style={{ marginTop: 40, borderTop: "1px solid " + C.border, paddingTop: 28 }}>
          <h4 style={{ fontFamily: S, fontSize: 16, fontWeight: 700, marginBottom: 16 }}>Recent Checklist History</h4>
          <div style={{ display: "grid", gap: 8 }}>
            {history.slice(0, 5).map((h, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 16px", background: C.card, borderRadius: 10, border: "1px solid " + C.border }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: C.green }}>✅ All checks passed</div>
                  {h.note && <div style={{ fontSize: 11, color: C.grey, marginTop: 2 }}>{h.note.slice(0, 60)}{h.note.length > 60 ? "…" : ""}</div>}
                </div>
                <div style={{ fontSize: 11, color: C.faint }}>{new Date(h.date).toLocaleDateString("en-ZA", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── WEEKLY REVIEW ───────────────────────────────────────────────────────── */
function WeeklyReview({ user, reviews, addReview, weeklyPrompts }) {
  const [view, setView] = React.useState("list");
  const [answers, setAnswers] = React.useState({});
  const [saving, setSaving] = React.useState(false);
  const [err, setErr] = React.useState("");

  const myReviews = (reviews || []).filter(r => r.userId === user.id).sort((a,b) => b.createdAt - a.createdAt);
  const activePrompts = (weeklyPrompts || []).filter(p => p.active !== false);

  const getWeekLabel = () => {
    const now = new Date();
    const day = now.getDay();
    const monday = new Date(now);
    monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
    return monday.toLocaleDateString("en-ZA", { day: "numeric", month: "long" }) + " week";
  };

  const submit = async () => {
    const required = activePrompts.filter(p => p.required !== false);
    const missing = required.find(p => !answers[p.id]?.trim());
    if (missing) { setErr("Please answer all required questions."); return; }
    setSaving(true);
    await addReview({ id: uid(), userId: user.id, userName: user.name, answers, weekLabel: getWeekLabel(), createdAt: Date.now(), coachFeedback: null });
    setAnswers({});
    setSaving(false);
    setErr("");
    setView("list");
  };

  if (view === "new") return (
    <div style={{ maxWidth: 700, margin: "0 auto", padding: "28px 16px 80px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 28 }}>
        <button onClick={() => setView("list")} style={{ background: "transparent", color: C.gold, fontSize: 13, fontWeight: 700, cursor: "pointer", border: "none" }}>← Back</button>
        <div>
          <h2 style={{ fontFamily: S, fontSize: 24, fontWeight: 700 }}>Weekly Review</h2>
          <p style={{ fontSize: 12, color: C.grey, marginTop: 2 }}>{getWeekLabel()}</p>
        </div>
      </div>
      {activePrompts.length === 0 && <p style={{ color: C.grey, textAlign: "center", padding: "40px 0" }}>No review prompts set yet. Coach Taaha will add them soon.</p>}
      <div style={{ display: "grid", gap: 20 }}>
        {activePrompts.map((p, i) => (
          <div key={p.id} style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 14, padding: "20px 22px" }}>
            <div style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 12 }}>
              <span style={{ background: C.goldDim, color: C.gold, width: 28, height: 28, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>{i + 1}</span>
              <div>
                <p style={{ fontSize: 14, fontWeight: 600, color: C.white, lineHeight: 1.5 }}>{p.question}</p>
                {p.required === false && <span style={{ fontSize: 10, color: C.faint }}>Optional</span>}
              </div>
            </div>
            <textarea value={answers[p.id] || ""} onChange={e => setAnswers(prev => ({ ...prev, [p.id]: e.target.value }))}
              placeholder="Be honest with yourself..."
              style={{ height: 100, resize: "vertical", background: C.navy, border: "1.5px solid " + (answers[p.id]?.trim() ? C.gold + "50" : C.border), borderRadius: 10, padding: "12px 14px", color: C.white, width: "100%", outline: "none", fontFamily: D, fontSize: 13, lineHeight: 1.6 }} />
          </div>
        ))}
      </div>
      {err && <div style={{ color: C.red, fontSize: 12, marginTop: 12, textAlign: "center" }}>{err}</div>}
      {activePrompts.length > 0 && <Btn onClick={submit} disabled={saving} full sz="lg" style={{ marginTop: 20 }}>{saving ? "Submitting..." : "Submit Weekly Review"}</Btn>}
    </div>
  );

  return (
    <div style={{ maxWidth: 700, margin: "0 auto", padding: "28px 16px 80px" }}>
      <div style={{ marginBottom: 24 }}>
        <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".25em", color: C.gold, textTransform: "uppercase", marginBottom: 6 }}>Growth Mindset</p>
        <h2 style={{ fontFamily: S, fontSize: 28, fontWeight: 700, marginBottom: 6 }}>Weekly Review</h2>
        <p style={{ color: C.grey, fontSize: 14 }}>Reflect. Learn. Improve. The traders who review are the traders who grow.</p>
      </div>
      <div style={{ background: "linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04))", border: "1px solid " + C.gold + "40", borderRadius: 16, padding: "20px 24px", marginBottom: 24, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
        <div>
          <div style={{ fontFamily: S, fontSize: 16, fontWeight: 700, marginBottom: 4 }}>Current week: {getWeekLabel()}</div>
          <div style={{ fontSize: 13, color: C.grey }}>Complete your review before Sunday midnight</div>
        </div>
        <Btn onClick={() => setView("new")} disabled={activePrompts.length === 0}>+ Write This Week</Btn>
      </div>
      {myReviews.length === 0 && <div style={{ textAlign: "center", padding: "60px 0" }}><div style={{ fontSize: 48, opacity: .3, marginBottom: 12 }}>📝</div><p style={{ color: C.grey }}>No reviews yet. Start your first one above.</p></div>}
      <div style={{ display: "grid", gap: 12 }}>
        {myReviews.map(r => (
          <div key={r.id} style={{ background: C.card, border: "1.5px solid " + (r.coachFeedback ? C.gold + "50" : C.border), borderRadius: 14, overflow: "hidden" }}>
            <div style={{ padding: "16px 20px", borderBottom: "1px solid " + C.border, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontFamily: S, fontSize: 15, fontWeight: 700 }}>{r.weekLabel}</div>
                <div style={{ fontSize: 11, color: C.grey, marginTop: 2 }}>{new Date(r.createdAt).toLocaleDateString("en-ZA", { day: "numeric", month: "short", year: "numeric" })}</div>
              </div>
              {r.coachFeedback && <span style={{ background: C.goldDim, color: C.gold, border: "1px solid " + C.gold + "40", padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>💬 Coach feedback</span>}
            </div>
            <div style={{ padding: "16px 20px" }}>
              {Object.entries(r.answers || {}).slice(0, 2).map(([pid, ans]) => {
                const prompt = (weeklyPrompts || []).find(p => p.id === pid);
                return (
                  <div key={pid} style={{ marginBottom: 12 }}>
                    {prompt && <div style={{ fontSize: 11, color: C.grey, marginBottom: 4 }}>{prompt.question}</div>}
                    <div style={{ fontSize: 13, color: C.dim, lineHeight: 1.6 }}>{ans.slice(0, 120)}{ans.length > 120 ? "…" : ""}</div>
                  </div>
                );
              })}
              {r.coachFeedback && (
                <div style={{ marginTop: 12, background: C.goldDim, border: "1px solid " + C.gold + "30", borderRadius: 10, padding: "12px 16px" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: C.gold, marginBottom: 6 }}>Coach Taaha — Feedback</div>
                  <p style={{ fontSize: 13, color: C.dim, lineHeight: 1.6 }}>{r.coachFeedback}</p>
                </div>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── ADMIN WEEKLY REVIEW TAB ─────────────────────────────────────────────── */
function AdminWeeklyReviewTab({ reviews, patchReview, users, weeklyPrompts, addPrompt, deletePrompt, togglePrompt }) {
  const [selUser, setSelUser] = React.useState("all");
  const [feedback, setFeedback] = React.useState("");
  const [feedbackRev, setFeedbackRev] = React.useState(null);
  const [newQ, setNewQ] = React.useState("");
  const [newRequired, setNewRequired] = React.useState(true);

  const filtered = (reviews || []).filter(r => selUser === "all" || r.userId === selUser).sort((a,b) => b.createdAt - a.createdAt);
  const approvedUsers = users.filter(u => u.status === "approved");

  return (
    <div style={{ display: "grid", gap: 24 }}>
      {/* Manage Prompts */}

        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.gold, textTransform: "uppercase", marginBottom: 16 }}>Weekly Review Questions</div>
        <div style={{ display: "grid", gap: 12, marginBottom: 16 }}>
          <div><label>New Question</label><input value={newQ} onChange={e => setNewQ(e.target.value)} placeholder="e.g. What was your biggest mistake this week?" /></div>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>

            <label htmlFor="req" style={{ margin: 0, textTransform: "none", letterSpacing: 0, fontSize: 13, color: C.dim }}>Required question</label>
          </div>
          <Btn onClick={() => { if (newQ.trim()) { addPrompt({ id: uid(), question: newQ.trim(), required: newRequired, active: true, createdAt: Date.now() }); setNewQ(""); } }} style={{ justifySelf: "start" }} disabled={!newQ.trim()}>Add Question</Btn>
        </div>
        {(weeklyPrompts || []).map(p => (
          <div key={p.id} style={{ display: "flex", gap: 10, alignItems: "center", padding: "10px 14px", background: p.active ? C.bg : "transparent", border: "1px solid " + (p.active ? C.border : C.faint + "40"), borderRadius: 9, marginBottom: 6, opacity: p.active ? 1 : 0.5 }}>
            <span style={{ flex: 1, fontSize: 13, color: C.dim }}>{p.question}</span>
            {!p.required && <span style={{ fontSize: 10, color: C.faint }}>Optional</span>}
            <Btn v="outline" onClick={() => togglePrompt(p.id, !p.active)} sz="sm">{p.active ? "Disable" : "Enable"}</Btn>

      <div>
        <div style={{ display: "flex", gap: 12, marginBottom: 16, alignItems: "center", flexWrap: "wrap" }}>
          <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".1em", color: C.white, textTransform: "uppercase" }}>Student Reviews ({filtered.length})</div>
          <select value={selUser} onChange={e => setSelUser(e.target.value)} style={{ width: "auto", padding: "8px 12px", fontSize: 12 }}>
            <option value="all">All Students</option>
            {approvedUsers.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </div>
        {filtered.map(r => {
          const uname = users.find(u => u.id === r.userId)?.name || r.userName;
          return (
            <div key={r.id} style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 14, marginBottom: 10, overflow: "hidden" }}>
              <div style={{ padding: "14px 20px", borderBottom: "1px solid " + C.border, display: "flex", justifyContent: "space-between", alignItems: "center" }}>

                  <span style={{ fontWeight: 700, color: C.gold, fontSize: 13 }}>{uname}</span>
                  <span style={{ color: C.grey, fontSize: 12, marginLeft: 10 }}>{r.weekLabel}</span>
                </div>
                <span style={{ fontSize: 11, color: C.faint }}>{new Date(r.createdAt).toLocaleDateString("en-ZA")}</span>
              </div>
              <div style={{ padding: "14px 20px" }}>
                {Object.entries(r.answers || {}).map(([pid, ans]) => {
                  const prompt = (weeklyPrompts || []).find(p => p.id === pid);
